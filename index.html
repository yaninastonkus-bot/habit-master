<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Custom</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.6);
      --accent: #3b82f6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glass: blur(12px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* --- AUTH --- */
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { 
      width: 100%; max-width: 400px; background: var(--card); backdrop-filter: var(--glass);
      border-radius: 28px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* --- UI ELEMENTS --- */
    .input { 
      width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; color: #fff; font-size: 15px; transition: 0.3s; margin-bottom: 10px; font-family: inherit;
    }
    .input:focus { border-color: var(--accent); outline: none; background: rgba(15, 23, 42, 0.8); }

    .button { 
      border: 0; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; font-family: inherit;
    }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    .button.sm { padding: 8px 12px; font-size: 11px; text-transform: uppercase; }

    /* --- LAYOUT --- */
    .app { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 20px; margin-bottom: 40px; align-items: center; overflow-x: auto; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 8px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }

    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }

    /* --- TRACKER --- */
    .category-group { margin-bottom: 40px; }
    .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 15px; }
    .tracker-container { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--border); }
    .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 38px); border-bottom: 1px solid var(--border); align-items: center; }
    .tracker-row:last-child { border: 0; }
    .tracker-cell { height: 48px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); font-size: 12px; }
    .habit-title { justify-content: space-between; padding: 0 15px; font-weight: 600; color: #f1f5f9; text-align: left; }
    
    .check-btn { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15); border-radius: 5px; cursor: pointer; transition: 0.2s; }
    .check-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
    .check-btn.disabled { opacity: 0.1; cursor: not-allowed; border-style: dashed; }

    .del-habit { font-size: 10px; color: var(--muted); opacity: 0; transition: 0.2s; cursor: pointer; }
    .tracker-row:hover .del-habit { opacity: 1; }

    /* --- CHIPS --- */
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    @media (max-width: 768px) {
      .app { padding: 15px; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .tracker-row { grid-template-columns: 150px repeat(31, 38px); }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 style="font-weight:800; letter-spacing:-1px;">EK.</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <input id="passwordInput" class="input" type="password" placeholder="Password" />
      <div id="authError" style="color:#ef4444; font-size:11px; margin-bottom:10px;"></div>
      <button class="button primary" onclick="handleSignIn()">Sign In</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="handleSignUp()">Register</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div style="font-weight: 800; color: #fff; margin-right: 15px;">EK.</div>
      <div class="tab active" data-view="dashView">Overview</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="profileView">Settings</div>
      <button class="button dark sm" style="margin-left:auto;" onclick="logout()">Exit</button>
    </nav>

    <div id="dashView" class="view active">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="dashboard-grid">
        <div class="card">
          <div style="color: var(--muted); font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Streak</div>
          <div id="streakVal" style="font-size: 48px; font-weight: 800; margin: 10px 0;">0</div>
          <div id="levelVal" style="font-size: 13px; color: var(--accent);">Novice</div>
        </div>
        <div class="card">
            <div style="color: var(--muted); font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom:15px;">Target Focus</div>
            <div id="ringsWrap" style="display: flex; gap: 10px;"></div>
        </div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerSections"></div>
    </div>

    <div id="chatView" class="view">
      <div class="card">
        <div id="postsWrap" style="height:400px; overflow-y:auto; margin-bottom:20px;"></div>
        <div style="display:flex; gap:10px;">
          <input id="postInput" class="input" style="margin:0;" placeholder="Say something..." />
          <button class="button primary" style="width:80px;" onclick="sendPost()">Post</button>
        </div>
      </div>
    </div>

    <div id="profileView" class="view">
      <div class="card" style="max-width: 500px; margin: 0 auto; text-align:center;">
        <input id="userNameInput" class="input" placeholder="Display Name" onchange="saveUserName()" />
        <p style="color:var(--muted); font-size:12px;" id="userEmailLabel"></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null, habits = [], checks = [], posts = [], profile = {};
    const categories = [
      { id: 'MOVE', color: '#3b82f6' }, { id: 'MIND', color: '#10b981' }, 
      { id: 'CREATE', color: '#f43f5e' }, { id: 'SLOW', color: '#8b5cf6' }
    ];

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user;
      if(!user) return;
      getEl('authView').classList.add('hidden');
      getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = user.email;
      await refreshData();
    }

    async function refreshData() {
      const h = await sb.from('habits').select('*').eq('user_id', user.id);
      habits = h.data || [];
      const c = await sb.from('check_ins').select('*').eq('user_id', user.id);
      checks = c.data || [];
      const p = await sb.from('community_posts').select('*').order('created_at');
      posts = p.data || [];
      const pr = await sb.from('profiles').select('*').eq('id', user.id).single();
      profile = pr.data || {};
      renderAll();
    }

    // --- LOGIC ---
    async function addHabit(catId) {
      const title = prompt(`Add new habit to ${catId}:`);
      if(!title) return;
      await sb.from('habits').insert({
        user_id: user.id,
        title: title,
        category: catId,
        created_at: new Date().toISOString()
      });
      await refreshData();
    }

    async function deleteHabit(id) {
      if(!confirm("Delete this habit?")) return;
      await sb.from('habits').delete().eq('id', id);
      await refreshData();
    }

    async function toggleCheck(habitId, day) {
      const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), day + 1).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === habitId && c.check_in_date === dateStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({ user_id: user.id, habit_id: habitId, check_in_date: dateStr });
      await refreshData();
    }

    // --- RENDERERS ---
    function renderAll() {
      renderTracker();
      renderDash();
      renderChat();
    }

    function renderTracker() {
      const now = new Date();
      getEl('trackerSections').innerHTML = categories.map(cat => {
        const catHabits = habits.filter(h => h.category === cat.id);
        return `
          <div class="category-group">
            <div class="category-header">
              <span style="font-weight:800; font-size:18px;">${cat.id}</span>
              <button class="button dark sm" onclick="addHabit('${cat.id}')">+ Add Habit</button>
            </div>
            <div class="tracker-container">
              <div class="tracker-row" style="background: rgba(255,255,255,0.02); height: 35px; color: var(--muted); font-size:10px; font-weight:800;">
                <div class="tracker-cell habit-title">Habit Name</div>
                ${Array.from({length:31}, (_,i) => `<div class="tracker-cell">${i+1}</div>`).join('')}
              </div>
              ${catHabits.map(h => {
                const habitStartDay = new Date(h.created_at).getDate();
                const habitStartMonth = new Date(h.created_at).getMonth();
                const currentMonth = now.getMonth();

                return `
                  <div class="tracker-row">
                    <div class="tracker-cell habit-title">
                      ${h.title} <span class="del-habit" onclick="deleteHabit('${h.id}')">✕</span>
                    </div>
                    ${Array.from({length:31}, (_, i) => {
                      const dayNum = i + 1;
                      const isLocked = (currentMonth === habitStartMonth && dayNum < habitStartDay);
                      const isChecked = checks.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === dayNum);
                      
                      return `
                        <div class="tracker-cell">
                          <div class="check-btn ${isChecked?'active':''} ${isLocked?'disabled':''}" 
                               onclick="${isLocked?'':`toggleCheck('${h.id}', ${i})`}"></div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderDash() {
      getEl('streakVal').innerText = calculateStreak();
      getEl('ringsWrap').innerHTML = categories.map(cat => {
        const catHabits = habits.filter(h => h.category === cat.id);
        const done = checks.filter(c => catHabits.some(h => h.id === c.habit_id)).length;
        const total = catHabits.length * 31;
        const perc = total > 0 ? Math.round((done/total)*100) : 0;
        return `<div style="width:40px; height:40px; border-radius:50%; background:conic-gradient(${cat.color} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800;">${perc}%</div>`;
      }).join('');
    }

    function renderChat() {
      getEl('postsWrap').innerHTML = posts.map(p => `
        <div class="msg ${p.user_id===user.id?'own':''}">
          <div style="font-size:10px; font-weight:800; margin-bottom:5px; opacity:0.7;">${p.user_email}</div>
          <div style="font-size:14px;">${p.body}</div>
        </div>
      `).join('');
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, checkDate = new Date().toISOString().split('T')[0];
      for(let d of dates) {
        if(d === checkDate || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) {
          s++; checkDate = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0];
        } else break;
      }
      return s;
    }

    // --- AUTH ACTIONS ---
    async function handleSignIn() {
      const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(error) getEl('authError').innerText = error.message; else bootstrap();
    }
    async function handleSignUp() {
      const { error } = await sb.auth.signUp({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(error) getEl('authError').innerText = error.message; else alert("Confirm email & login");
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    function getEl(id) { return document.getElementById(id); }

    // --- NAV ---
    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      getEl(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
