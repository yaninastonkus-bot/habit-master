<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --accent: #3b82f6; --text: #f8fafc;
      --muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); --glass: blur(15px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; }
    .hidden { display: none !important; }

    /* Auth */
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 400px; background: var(--card); backdrop-filter: var(--glass); border-radius: 28px; padding: 40px; border: 1px solid var(--border); text-align: center; }
    .input, .textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; color: #fff; font-size: 16px; transition: 0.3s; margin-bottom: 12px; outline: none; }
    .input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }
    .button { border: 0; border-radius: 14px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }

    /* Layout */
    .app { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; overflow-x: auto; padding-bottom: 10px; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 10px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 25px; }
    .view { display: none; } .view.active { display: block; }

    /* Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
    .side-block { padding: 20px; border-radius: 20px; margin-bottom: 12px; font-weight: 800; text-align: center; color: #fff; }
    .focus-chip { padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted); }
    .focus-chip.active { background: #fff; color: #000; }

    /* Tracker Squares */
    .tracker-section { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px) 60px; align-items: center; min-width: 1500px; }
    .tracker-head { height: 40px; background: rgba(255,255,255,0.03); font-size: 11px; font-weight: 800; color: var(--muted); }
    .tracker-row { height: 50px; border-top: 1px solid var(--border); }
    .tracker-cell { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid var(--border); }
    .habit-title { justify-content: flex-start; padding-left: 20px; font-weight: 600; color: #fff; }
    .checkbox { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .checkbox.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .today-cell { background: rgba(59, 130, 246, 0.1); }

    /* Chat */
    .chat-box { height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); position: relative; }
    .msg.own { align-self: flex-end; background: var(--accent); border: 0; }
    .space-btn { padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--border); white-space: nowrap; margin-right: 8px; }
    .space-btn.active { background: var(--accent); color: #fff; }

    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 style="font-weight:800; letter-spacing:-1.5px; margin:0 0 20px 0;">EK.</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <div style="position: relative;">
        <input id="passwordInput" class="input" type="password" placeholder="Password (6+ chars)" />
        <span onclick="togglePassword()" style="position:absolute; right:15px; top:13px; cursor:pointer; opacity:0.5;">👁️</span>
      </div>
      <div id="loginError" style="color:#ef4444; font-size:12px; margin-bottom:10px;"></div>
      <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="signUp()">Створити</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div style="font-weight: 900; font-size: 24px; color: #fff; margin-right: 15px;">EK.</div>
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" style="margin-left:auto; padding:8px 15px; font-size:11px;" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div class="dashboard-grid">
         <div>
            <div id="levelPanel" class="side-block" style="background:#10b981">🏆 Novice 🥚</div>
            <div id="streakPanel" class="side-block" style="background:#f59e0b">🔥 0 DAYS</div>
            <div id="motivationPanel" class="side-block" style="background:#3b82f6">✨ Let's go!</div>
            <div class="card" style="text-align:center; padding:15px;">
              <div style="color:var(--muted); font-size:11px; text-transform:uppercase;">Active Days</div>
              <div id="activeVal" style="font-size:32px; font-weight:800">0</div>
            </div>
            <div class="card" style="padding: 20px; text-align:center;">
              <div style="font-size: 11px; margin-bottom: 12px; color:var(--muted); font-weight:800;">🎯 FOCUS:</div>
              <div class="focus-chips">
                <div class="focus-chip" data-val="MOVE" onclick="toggleFocusChip('MOVE')">🏃 MOVE</div>
                <div class="focus-chip" data-val="MIND" onclick="toggleFocusChip('MIND')">🧠 MIND</div>
                <div class="focus-chip" data-val="CREATE" onclick="toggleFocusChip('CREATE')">🎨 CREATE</div>
                <div class="focus-chip" data-val="SLOW" onclick="toggleFocusChip('SLOW')">🌿 SLOW</div>
              </div>
            </div>
         </div>
         <div id="ringsWrap" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="card">
        <div id="spacesWrap" style="display:flex; overflow-x:auto; margin-bottom:20px; padding-bottom:10px;"></div>
        <div id="postsWrap" class="chat-box"></div>
        <div style="margin-top:20px; display:flex; gap:12px;">
          <textarea id="postInput" class="textarea" style="margin:0; height:50px;" placeholder="Поділися успіхом..."></textarea>
          <button class="button primary" style="width:100px;" onclick="createPost()">Send</button>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h2 style="margin-top:0">Settings</h2>
           <p>Email: <strong id="userEmailLabel"></strong></p>
           <button class="button primary" onclick="alert('Сповіщення увімкнено!')">🔔 Увімкнути сповіщення</button>
           <div id="adminSection" class="hidden" style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
              <h3 style="color:var(--accent)">👑 Admin Stats</h3>
              <div id="adminStats" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px;"></div>
           </div>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let currentUser = null, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "GENERAL", selectedFocuses = [];
    const TODAY_DAY = new Date().getDate();
    const META = { MOVE: { color: "#3b82f6", emoji: "🏃" }, MIND: { color: "#10b981", emoji: "🧠" }, CREATE: { color: "#f43f5e", emoji: "🎨" }, SLOW: { color: "#8b5cf6", emoji: "🌿" }, GENERAL: { color: "#94a3b8", emoji: "💬" } };

    async function bootstrap(){
      const { data } = await sb.auth.getSession();
      currentUser = data.session?.user; if(!currentUser) return;
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('userEmailLabel').innerText = currentUser.email;
      if(currentUser.email === OWNER_EMAIL) document.getElementById('adminSection').classList.remove('hidden');
      
      const res = await Promise.all([
        sb.from('categories').select('*').order('sort_order'),
        sb.from('habits').select('*').eq('user_id', currentUser.id),
        sb.from('check_ins').select('*').eq('user_id', currentUser.id),
        sb.from('community_posts').select('*').order('created_at'),
        sb.from('profiles').select('focus_text').eq('id', currentUser.id).single()
      ]);
      
      categories = [{slug: 'GENERAL', id: 'gen'}, ...res[0].data];
      habits = res[1].data || [];
      checkIns = res[2].data || [];
      posts = res[3].data || [];
      if(res[4].data?.focus_text) selectedFocuses = res[4].data.focus_text.split(',').filter(Boolean);

      if(habits.length === 0) {
          const def = [
              {user_id: currentUser.id, title: 'Morning Stretch', category_id: categories[1].id},
              {user_id: currentUser.id, title: 'Read 10 pages', category_id: categories[2].id}
          ];
          await sb.from('habits').insert(def);
          const fresh = await sb.from('habits').select('*').eq('user_id', currentUser.id);
          habits = fresh.data;
      }
      renderAll();
    }

    async function toggleCheck(hId, day){
      const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
      const exist = checkIns.find(c => c.habit_id === hId && c.check_in_date === dStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({user_id:currentUser.id, habit_id:hId, check_in_date:dStr});
      const fresh = await sb.from('check_ins').select('*').eq('user_id', currentUser.id);
      checkIns = fresh.data; renderAll();
    }

    async function addHabit(catId){
        const t = prompt("Назва нової звички:");
        if(t) { await sb.from('habits').insert({user_id: currentUser.id, title: t, category_id: catId}); bootstrap(); }
    }

    async function toggleFocusChip(val) {
      const idx = selectedFocuses.indexOf(val);
      if (idx > -1) selectedFocuses.splice(idx, 1); else selectedFocuses.push(val);
      await sb.from('profiles').upsert({ id: currentUser.id, focus_text: selectedFocuses.join(',') });
      renderAll();
    }

    function renderAll(){
      const streak = calculateStreak();
      document.getElementById('streakPanel').innerText = `🔥 ${streak} DAYS`;
      document.getElementById('activeVal').innerText = [...new Set(checkIns.map(c => c.check_in_date))].length;
      
      // Tracker
      document.getElementById('trackerWrap').innerHTML = categories.filter(c => c.slug !== 'GENERAL').map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        return `
          <div class="category-group">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <h3 style="margin:0; font-size:16px;">${META[cat.slug].emoji} ${cat.slug}</h3>
                <button class="button dark" style="padding:4px 10px; font-size:10px;" onclick="addHabit('${cat.id}')">+ Add</button>
            </div>
            <div class="tracker-section">
                <div class="tracker-head">
                    <div class="tracker-cell">Habit</div>
                    ${Array.from({length:31}, (_,i)=>`<div class="tracker-cell">${i+1}</div>`).join('')}
                </div>
                ${catHabits.map(h => `
                    <div class="tracker-row">
                        <div class="tracker-cell habit-title">${h.title}</div>
                        ${Array.from({length:31}, (_,i)=>{
                            const active = checkIns.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === i+1);
                            return `<div class="tracker-cell ${i+1===TODAY_DAY?'today-cell':''}"><div class="checkbox ${active?'active':''}" onclick="toggleCheck('${h.id}', ${i})"></div></div>`;
                        }).join('')}
                    </div>
                `).join('')}
            </div>
          </div>`;
      }).join('');

      // Rings
      document.getElementById('ringsWrap').innerHTML = categories.filter(c => c.slug !== 'GENERAL').map(cat => {
        const hbits = habits.filter(h => h.category_id === cat.id);
        const done = checkIns.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.min(100, Math.round((done / (hbits.length * 31)) * 100)) : 0;
        const foc = selectedFocuses.includes(cat.slug);
        return `<div class="card" style="text-align:center; padding:15px; ${foc?'border:2px solid #fff':''}">
            <div style="width:60px; height:60px; border-radius:50%; margin:0 auto 10px; background:conic-gradient(${META[cat.slug].color} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">${perc}%</div>
            <div style="font-size:10px; font-weight:800; color:var(--muted)">${cat.slug}</div>
        </div>`;
      }).join('');

      // Focus Chips
      document.querySelectorAll('.focus-chip').forEach(c => c.classList.toggle('active', selectedFocuses.includes(c.dataset.val)));

      // Community
      document.getElementById('spacesWrap').innerHTML = categories.map(cat => `<div class="space-btn ${selectedSpace===cat.slug?'active':''}" onclick="selectedSpace='${cat.slug}'; renderAll();">${META[cat.slug].emoji} ${cat.slug}</div>`).join('');
      const filtered = posts.filter(p => {
          const postCat = categories.find(c => c.id === p.category_id);
          return (postCat ? postCat.slug : 'GENERAL') === selectedSpace;
      });
      document.getElementById('postsWrap').innerHTML = filtered.map(p => `<div class="msg ${p.user_id===currentUser.id?'own':''}"><b>${p.user_email}</b><br>${p.body}</div>`).join('');
      document.getElementById('postsWrap').scrollTop = 9999;
    }

    async function createPost(){
        const b = document.getElementById('postInput').value; if(!b) return;
        const cat = categories.find(c => c.slug === selectedSpace);
        await sb.from('community_posts').insert({user_id: currentUser.id, body: b, category_id: cat.id === 'gen' ? null : cat.id, user_email: currentUser.email});
        document.getElementById('postInput').value = ""; bootstrap();
    }

    function calculateStreak() {
      const dates = [...new Set(checkIns.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date().toISOString().split('T')[0];
      for(let d of dates) { if(d === now || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) { s++; now = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    async function signIn() { const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value }); if(!error) bootstrap(); else document.getElementById('loginError').innerText = error.message; }
    async function signUp() { const { error } = await sb.auth.signUp({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value }); if(!error) alert("Check email!"); else document.getElementById('loginError').innerText = error.message; }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    function togglePassword() { const i = document.getElementById('passwordInput'); i.type = i.type==='password'?'text':'password'; }

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
