<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #000000;
      --card: #111111;
      --text: #ffffff;
      --muted: #888888;
      --border: rgba(255,255,255,0.1);
      --blue: #0024f0;
      --green: #ccff00;
      --pink: #0024f0;
      --move: #0024f0;
      --mind: #ccff00;
      --create: #0024f0;
      --slow: #ccff00;
      --today: rgba(204, 255, 0, 0.15);
      --dark: #1a1a1a;
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    *{box-sizing:border-box}
    body{margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);}
    .hidden{display:none !important}
    
    /* Auth */
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
    .auth-card{width:100%; max-width:450px; background:var(--card); border-radius:24px; padding:40px; border:1px solid var(--border); text-align:center;}
    .auth-card h1 { font-size: 38px; font-weight: 800; letter-spacing: -2px; margin-bottom: 20px; }
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:12px; padding:16px; font-size:16px; background:#1a1a1a; color:#fff; font-family: inherit; outline:none;}
    .input:focus { border-color: var(--blue); }
    .button{border:0; border-radius:100px; padding:14px 24px; font-size:16px; font-weight:700; cursor:pointer; transition:0.3s; display:inline-flex; align-items:center; justify-content:center;}
    .button.primary{background:var(--green);color:#000}
    .button.dark{background:transparent; color:#fff; border: 1px solid var(--border);}
    
    /* Layout */
    .app{max-width:1400px; margin:0 auto; padding:40px 20px;}
    .topbar{display:flex; gap:12px; margin-bottom:40px; flex-wrap: wrap; align-items:center;}
    .nav-logo { font-size: 24px; font-weight: 800; margin-right: auto; letter-spacing: -1px; }
    .tab{background:transparent; color: var(--muted); border-radius:100px; padding:12px 20px; cursor:pointer; font-weight:700; transition:0.3s;}
    .tab.active{background:#fff; color:#000; font-weight:800;}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:24px; border:1px solid var(--border); padding:32px; margin-bottom:24px;}
    
    /* Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 32px; }
    #ringsWrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .ring-card{min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; border-radius:24px; border:1px solid var(--border);}
    .ring{width:90px; height:90px; border-radius:50%; position:relative; border:2px solid #222;}
    .ring::after{content:""; position:absolute; inset:10px; background:var(--card); border-radius:50%;}
    .ring-value{font-size:20px; font-weight:800; position:absolute; z-index:10; top:50%; left:50%; transform:translate(-50%, -50%);}
    .side-block{color:#fff; min-height:70px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; font-size:18px; font-weight:800; border-radius:16px; margin-bottom:12px; text-transform: uppercase;}
    
    /* Focus Chips */
    .focus-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; }
    .focus-chip { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color:#fff; border-radius:100px; padding:10px 18px; font-size: 13px; font-weight:700; cursor:pointer; transition:0.2s; }
    .focus-chip.active { background: var(--green); color:#000; border-color:var(--green); }

    /* Tracker */
    .tracker-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 10px; }
    .add-btn { width: 28px; height: 28px; background: var(--green); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; cursor:pointer; }
    .tracker-section{overflow-x:auto; margin-bottom:30px; background:var(--card); border-radius:24px; border:1px solid var(--border); padding-bottom:5px; -webkit-overflow-scrolling: touch;}
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 240px repeat(31, 42px) 70px; align-items: center; min-width: 1600px; }
    .tracker-head { color:var(--muted); font-size:11px; font-weight:800; height:50px; background: #1a1a1a; text-transform: uppercase; }
    .tracker-row { border-bottom: 1px solid #1a1a1a; height:60px; font-size:15px; }
    .tracker-head > div, .tracker-row > div { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid rgba(255,255,255,0.02); }
    .habit-title-cell { justify-content: space-between !important; padding: 0 20px !important; font-weight: 700; }
    .del-btn { opacity: 0.2; cursor: pointer; font-size: 12px; }
    .del-btn:hover { opacity: 1; color: #ff4444; }
    .today-cell { background: var(--today) !important; color: var(--green); font-weight: 800;}
    .checkbox{width:22px; height:22px; border:2px solid #333; border-radius:6px; cursor:pointer; transition: 0.2s;}
    .checkbox.active { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }

    /* Community */
    .community-layout{display:grid; grid-template-columns: 260px 1fr; gap:32px; align-items: start;}
    .spaces-sidebar { display: flex; flex-direction: column; gap: 8px; }
    .space-btn{width:100%; border:1px solid var(--border); border-radius:12px; padding:16px; text-align:left; font-size:15px; font-weight:700; cursor:pointer; background:var(--card); color:#fff; transition:0.2s;}
    .space-btn.active { background: var(--blue); border-color: var(--blue); }
    .chat-box { height: 500px; overflow-y: auto; background: #080808; border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
    .msg { max-width: 80%; padding: 16px 20px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: var(--text); position: relative; }
    .msg.own { align-self: flex-end; background: var(--blue); border: none; }
    .chat-img { width: 100%; border-radius: 12px; margin-top: 10px; display: block; border: 1px solid rgba(255,255,255,0.1); }
    
    @media (max-width: 768px) {
      .app { padding: 20px 12px; }
      .dashboard-grid, .community-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1>EK.</h1>
      <p style="color:var(--muted); margin-bottom:30px;">Track your evolution.</p>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <div style="position: relative; margin-top:12px;">
        <input id="passwordInput" class="input" type="password" placeholder="Пароль (мін. 6 символів)" />
        <div onclick="togglePassword()" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5;">👁️</div>
      </div>
      <div id="loginError" style="color:#ff4444; font-size:12px; margin-top:10px; min-height:15px;"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
        <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
        <button class="button dark" onclick="signUp()">Створити</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="nav-logo">EK.</div>
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" style="font-size:13px; padding:10px 18px;" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div class="dashboard-grid">
         <div>
            <div id="levelPanel" class="side-block" style="background:#10b981">🏆 Novice 🥚</div>
            <div id="streakPanel" class="side-block" style="background:var(--blue)">🔥 0 DAYS STREAK</div>
            <div id="motivationPanel" class="side-block" style="background:#1a1a1a; border:1px solid var(--border);">✨ Nice start!</div>
            <div class="card" style="text-align:center;">
              <div style="color:var(--muted); font-size:12px; text-transform:uppercase; font-weight:800;">Active Days</div>
              <div id="activeVal" style="font-size:52px; font-weight:800; letter-spacing:-2px;">0</div>
            </div>
            <div class="card" style="text-align:center;">
              <div style="font-size: 12px; color:var(--muted); font-weight:800; text-transform:uppercase;">🎯 Your Focus</div>
              <div class="focus-chips">
                <div class="focus-chip" data-val="MOVE" onclick="toggleFocusChip('MOVE')">🏃 MOVE</div>
                <div class="focus-chip" data-val="MIND" onclick="toggleFocusChip('MIND')">🧠 MIND</div>
                <div class="focus-chip" data-val="CREATE" onclick="toggleFocusChip('CREATE')">🎨 CREATE</div>
                <div class="focus-chip" data-val="SLOW" onclick="toggleFocusChip('SLOW')">🌿 SLOW</div>
              </div>
            </div>
         </div>
         <div id="ringsWrap"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout">
        <div id="spacesWrap" class="spaces-sidebar"></div>
        <div>
          <div class="card" style="padding:0; background:transparent; border:none;">
            <h3 id="communityTitle" style="margin:0 0 20px 0; font-size:28px; font-weight:800;">Community</h3>
            <div id="postsWrap" class="chat-box"></div>
            <div style="margin-top:20px; display:flex; gap:12px; align-items:flex-end;">
              <label class="button dark" style="padding:15px; cursor:pointer;">📎<input type="file" id="fileInput" class="hidden" onchange="updateFileName()"></label>
              <div style="flex-grow:1;">
                <textarea id="postInput" class="textarea" style="min-height:56px;" placeholder="What's new?"></textarea>
                <div id="fileNameDisplay" style="font-size:11px; color:var(--green); margin-top:4px;"></div>
              </div>
              <button id="sendBtn" class="button primary" style="background:var(--blue); color:#fff;" onclick="createPost()">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h2 style="margin:0 0 24px 0; font-size:32px; font-weight:800;">Налаштування</h2>
           <p style="color:var(--muted)">Email: <strong style="color:#fff;" id="userEmailLabel"></strong></p>
           <button class="button primary" style="width:auto;" onclick="alert('Сповіщення активовано!')">🔔 Enable Notifications</button>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "GENERAL", selectedFocuses = [];
    const TODAY_DAY = new Date().getDate();

    const DEFAULT_HABITS = { 
        MOVE: ["10–20 min walk", "Stretching", "Short workout"], 
        MIND: ["Journaling", "Reading", "Meditation"], 
        CREATE: ["Sketching", "Drawing", "New recipe"], 
        SLOW: ["No phone tea", "Early bed", "Self-care"] 
    };

    const getEl = id => document.getElementById(id);
    function togglePassword() { const i = getEl('passwordInput'); i.type = i.type==='password'?'text':'password'; }
    function updateFileName() { const file = getEl('fileInput').files[0]; getEl('fileNameDisplay').innerText = file ? "📎 " + file.name : ''; }

    // Форматування дати без часових поясів
    function getLocalDateStr(day) {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dayStr = String(day).padStart(2, '0');
        return `${y}-${m}-${dayStr}`;
    }

    async function signIn(){
      const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(error) alert(error.message); else bootstrap();
    }
    async function signUp(){
      const { error } = await sb.auth.signUp({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(error) alert(error.message); else alert("Акаунт створено! Увійдіть.");
    }
    async function logout(){ await sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      const { data } = await sb.auth.getSession();
      currentUser = data.session?.user; if(!currentUser) return;
      getEl('authView').classList.add('hidden'); getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = currentUser.email;
      await refreshData();
    }

    async function refreshData(){
      const [c, h, ci, p, pr] = await Promise.all([
        sb.from('categories').select('*').order('sort_order'),
        sb.from('habits').select('*').eq('user_id', currentUser.id),
        sb.from('check_ins').select('*').eq('user_id', currentUser.id),
        sb.from('community_posts').select('*').order('created_at'),
        sb.from('profiles').select('*').eq('id', currentUser.id).single()
      ]);
      categories = c.data || []; habits = h.data || []; checkIns = ci.data || []; posts = p.data || [];
      if(pr.data?.focus_text) selectedFocuses = pr.data.focus_text.split(',').filter(Boolean);
      
      if(habits.length === 0){
          let ins = [];
          categories.forEach(cat => (DEFAULT_HABITS[cat.slug] || []).forEach(t => ins.push({user_id:currentUser.id, category_id:cat.id, title:t})));
          await sb.from('habits').insert(ins);
          return refreshData();
      }
      renderAll();
    }

    async function addHabit(catId){
      const t = prompt("Назва нової звички:");
      if(t) { await sb.from('habits').insert({user_id:currentUser.id, category_id:catId, title:t}); refreshData(); }
    }
    async function deleteHabit(id){
      if(confirm("Видалити звичку?")) { await sb.from('habits').delete().eq('id', id); refreshData(); }
    }
    async function toggleCheck(hId, day){
      const dStr = getLocalDateStr(day);
      const exist = checkIns.find(c => c.habit_id === hId && c.check_in_date === dStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({user_id:currentUser.id, habit_id:hId, check_in_date:dStr});
      refreshData();
    }

    async function toggleFocusChip(val) {
      const idx = selectedFocuses.indexOf(val);
      if (idx > -1) selectedFocuses.splice(idx, 1); else selectedFocuses.push(val);
      await sb.from('profiles').upsert({ id: currentUser.id, focus_text: selectedFocuses.join(',') });
      renderAll();
    }

    async function createPost(){
      const b = getEl('postInput').value; const file = getEl('fileInput').files[0];
      if(!b && !file) return;
      let url = null;
      if(file){
        const path = `${currentUser.id}/c_${Date.now()}.png`;
        const { error: upErr } = await sb.storage.from('community').upload(path, file);
        if(!upErr) url = sb.storage.from('community').getPublicUrl(path).data.publicUrl;
      }
      const cat = categories.find(c => c.slug === selectedSpace);
      await sb.from('community_posts').insert({user_id:currentUser.id, body:b, category_id:cat?cat.id:null, user_email:currentUser.email, media_url: url});
      getEl('postInput').value = ""; getEl('fileInput').value = ""; getEl('fileNameDisplay').innerText = "";
      refreshData();
    }

    function renderAll(){
      const streak = calculateStreak();
      getEl('streakPanel').innerText = `🔥 ${streak} DAYS STREAK`;
      getEl('levelPanel').innerText = streak > 10 ? `🏆 WARRIOR LEVEL` : `🏆 NOVICE LEVEL`;
      getEl('activeVal').innerText = [...new Set(checkIns.map(c => c.check_in_date))].length;
      
      // Rings
      getEl('ringsWrap').innerHTML = categories.map(cat => {
        const hbits = habits.filter(h => h.category_id === cat.id);
        const done = checkIns.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.round((done/(hbits.length*31))*100) : 0;
        return `<div class="ring-card" style="${selectedFocuses.includes(cat.slug)?'border-color:var(--green)':''}">
          <div class="ring" style="background:conic-gradient(var(--blue) ${perc*3.6}deg, #222 0deg)"><div class="ring-value">${perc}%</div></div>
          <div style="font-size:11px; font-weight:800; color:var(--muted)">${cat.slug}</div>
        </div>`;
      }).join('');

      // Tracker
      getEl('trackerWrap').innerHTML = categories.map(cat => {
        const catH = habits.filter(h => h.category_id === cat.id);
        return `<div class="tracker-header-row"><span style="font-weight:800; font-size:20px;">${cat.slug}</span><div class="add-btn" onclick="addHabit('${cat.id}')">+</div></div>
          <div class="tracker-section">
            <div class="tracker-head">
              <div class="habit-title-cell">Habit</div>
              ${Array.from({length:31}, (_,i)=>`<div class="${i+1===TODAY_DAY?'today-cell':''}">${i+1}</div>`).join('')}
              <div>%</div>
            </div>
            ${catH.map(h => {
              const hChecks = checkIns.filter(c => c.habit_id === h.id);
              const isDefault = (DEFAULT_HABITS[cat.slug] || []).includes(h.title);
              return `<div class="tracker-row">
                <div class="habit-title-cell"><span>${h.title}</span> ${!isDefault ? `<span class="del-btn" onclick="deleteHabit('${h.id}')">✕</span>` : ''}</div>
                ${Array.from({length:31}, (_, i) => {
                  const d = i+1;
                  const active = checkIns.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === d);
                  return `<div class="${d===TODAY_DAY?'today-cell':''}"><div class="checkbox ${active?'active':''}" onclick="toggleCheck('${h.id}',${d})"></div></div>`;
                }).join('')}
                <div style="font-weight:800; color:var(--blue)">${Math.round((hChecks.length/31)*100)}%</div>
              </div>`;
            }).join('')}
          </div>`;
      }).join('');

      // Community
      const spaces = [{slug:'GENERAL'}, ...categories];
      getEl('spacesWrap').innerHTML = spaces.map(s => `<button class="space-btn ${selectedSpace===s.slug?'active':''}" onclick="selectedSpace='${s.slug}'; renderAll();">${s.slug}</button>`).join('');
      const filtered = posts.filter(p => (categories.find(c => c.id === p.category_id)?.slug || 'GENERAL') === selectedSpace);
      getEl('postsWrap').innerHTML = filtered.map(p => `
        <div class="msg ${p.user_id===currentUser.id?'own':''}">
          <b>${p.user_email}</b><br>${p.body}
          ${p.media_url ? `<img src="${p.media_url}" class="chat-img">` : ''}
        </div>`).join('');
      getEl('postsWrap').scrollTop = 9999;
      
      document.querySelectorAll('.focus-chip').forEach(c => c.classList.toggle('active', selectedFocuses.includes(c.dataset.val)));
    }

    function calculateStreak() {
      const dates = [...new Set(checkIns.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = getLocalDateStr(new Date().getDate());
      for(let d of dates) { if(d === now || d === getLocalDateStr(new Date(Date.now()-86400000).getDate())) { s++; now = getLocalDateStr(new Date(new Date(d).getTime()-86400000).getDate()); } else break; }
      return s;
    }

    document.querySelectorAll('.tab[data-view]').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active'); getEl(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
