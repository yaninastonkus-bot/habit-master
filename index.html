<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Premium</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.6);
      --accent: #3b82f6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glass: blur(12px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh;
      overflow-x: hidden;
    }
    .hidden { display: none !important; }

    /* --- AUTH --- */
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { 
      width: 100%; max-width: 400px; background: var(--card); backdrop-filter: var(--glass);
      border-radius: 28px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      text-align: center;
    }
    .auth-card h1 { font-weight: 800; letter-spacing: -1.5px; margin: 0 0 30px 0; font-size: 32px; }

    /* --- UI ELEMENTS --- */
    .input { 
      width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 18px; color: #fff; font-size: 16px; transition: 0.3s; margin-bottom: 15px; font-family: inherit;
    }
    .input:focus { border-color: var(--accent); outline: none; background: rgba(15, 23, 42, 0.8); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

    .button { 
      border: 0; border-radius: 14px; padding: 14px 24px; font-size: 15px; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; font-family: inherit;
    }
    .button.primary { background: var(--accent); color: #fff; width: 100%; margin-top: 10px; }
    .button.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4); }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }

    /* --- LAYOUT --- */
    .app { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .topbar { display: flex; gap: 25px; margin-bottom: 50px; align-items: center; }
    .nav-logo { font-weight: 800; font-size: 22px; letter-spacing: -1px; background: linear-gradient(to right, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 8px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }

    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; }

    /* --- DASHBOARD --- */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
    .stat-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }
    .ring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .ring-card { text-align: center; transition: 0.3s; }
    .ring-card.focused { border-color: var(--accent); box-shadow: 0 0 30px rgba(59, 130, 246, 0.1); transform: scale(1.03); }
    .ring { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 15px; position: relative; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.05); }
    .ring-val { font-size: 20px; font-weight: 800; }

    /* --- TRACKER --- */
    .tracker-wrap { overflow-x: auto; background: var(--card); border-radius: 24px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
    .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px); align-items: center; border-bottom: 1px solid var(--border); }
    .tracker-row:last-child { border: 0; }
    .tracker-cell { height: 50px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); font-size: 13px; font-weight: 500; }
    .habit-title { justify-content: flex-start; padding-left: 20px; font-weight: 600; color: #fff; }
    .check-btn { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .check-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(59, 130, 246, 0.6); }

    /* --- COMMUNITY --- */
    .chat-box { height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding: 10px; margin-bottom: 25px; }
    .msg { max-width: 80%; padding: 16px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); position: relative; }
    .msg.own { align-self: flex-end; background: var(--accent); border: 0; box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3); }
    .msg-user { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: #334155; object-fit: cover; }
    .mention { font-weight: 800; color: #fff; text-decoration: underline; }

    /* --- FOCUS CHIPS --- */
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .chip { padding: 8px 16px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* MOBILE */
    @media (max-width: 768px) {
      .app { padding: 20px 15px; }
      .topbar { gap: 15px; }
      .nav-logo { display: none; }
      .dashboard-grid { grid-template-columns: 1fr; }
      .ring-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1>EK.</h1>
      <div id="authContent">
        <input id="emailInput" class="input" type="email" placeholder="Email Address" />
        <div style="position: relative;">
          <input id="passwordInput" class="input" type="password" placeholder="Password (6+ chars)" />
          <span onclick="togglePass()" style="position:absolute; right:15px; top:14px; cursor:pointer; opacity:0.4;">👁️</span>
        </div>
        <div id="authError" style="color:#ef4444; font-size:12px; margin-bottom:15px;"></div>
        <button id="loginBtn" class="button primary" onclick="handleSignIn()">Sign In</button>
        <button class="button dark" style="width:100%; margin-top:10px;" onclick="handleSignUp()">Create Account</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div class="nav-logo">EK.</div>
      <div class="tab active" data-view="dashView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="profileView">Profile</div>
      <button class="button dark" style="margin-left:auto; padding:8px 16px; font-size:12px;" onclick="logout()">Logout</button>
    </nav>

    <div id="dashView" class="view active">
      <div class="dashboard-grid">
        <div>
          <div class="stat-box">
            <div style="color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Current Streak</div>
            <div id="streakVal" style="font-size: 42px; font-weight: 800; color: #fff; margin: 10px 0;">0</div>
            <div id="levelVal" style="font-size: 14px; color: var(--accent); font-weight: 700;">Novice Level</div>
          </div>
          <div class="card" style="padding: 20px;">
            <div style="font-size: 13px; font-weight: 800; color: var(--muted); text-transform: uppercase;">Active Focus</div>
            <div class="chips" id="focusChips">
              <div class="chip" onclick="toggleFocus('MOVE')">MOVE</div>
              <div class="chip" onclick="toggleFocus('MIND')">MIND</div>
              <div class="chip" onclick="toggleFocus('CREATE')">CREATE</div>
              <div class="chip" onclick="toggleFocus('SLOW')">SLOW</div>
            </div>
          </div>
        </div>
        <div id="ringsWrap" class="ring-grid"></div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap" class="tracker-wrap"></div>
    </div>

    <div id="chatView" class="view">
      <div class="card" style="padding: 20px;">
        <div id="postsWrap" class="chat-box"></div>
        <div style="display:flex; gap:12px; align-items:center;">
          <textarea id="postInput" class="input" style="margin:0; height:50px; resize:none; padding-top:14px;" placeholder="Write a message..."></textarea>
          <button class="button primary" style="width:100px; margin:0;" onclick="sendPost()">Send</button>
        </div>
      </div>
    </div>

    <div id="profileView" class="view">
      <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 25px;">
          <img id="avatarImg" class="avatar-large" style="width:100px; height:100px; border-radius:50%; object-fit:cover; background:#1e293b;" src="https://ui-avatars.com/api/?name=EK">
          <label style="position:absolute; bottom:0; right:0; background:var(--accent); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:3px solid var(--bg);">
            📷<input type="file" class="hidden" id="avatarFile" onchange="uploadAvatar()">
          </label>
        </div>
        <input id="userNameInput" class="input" placeholder="Your Name" onchange="saveUserName()" />
        <p style="color: var(--muted); font-size: 13px;" id="userEmailLabel"></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null, profile = {}, habits = [], checks = [], posts = [], focuses = [];
    const cats = [
      { id: 'MOVE', color: '#3b82f6', emoji: '🏃' },
      { id: 'MIND', color: '#10b981', emoji: '🧠' },
      { id: 'CREATE', color: '#f43f5e', emoji: '🎨' },
      { id: 'SLOW', color: '#8b5cf6', emoji: '🌿' }
    ];

    // --- AUTH ---
    async function handleSignIn() {
      const email = getEl('emailInput').value;
      const password = getEl('passwordInput').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) getEl('authError').innerText = error.message; else bootstrap();
    }
    async function handleSignUp() {
      const email = getEl('emailInput').value;
      const password = getEl('passwordInput').value;
      if(password.length < 6) return getEl('authError').innerText = "Min 6 characters required";
      const { error } = await sb.auth.signUp({ email, password });
      if(error) getEl('authError').innerText = error.message; else alert("Account created! Now Sign In.");
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    function togglePass() { const i = getEl('passwordInput'); i.type = i.type==='password'?'text':'password'; }

    // --- CORE LOGIC ---
    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user;
      if(!user) return;

      getEl('authView').classList.add('hidden');
      getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = user.email;

      await Promise.all([loadProfile(), loadHabits(), loadChecks(), loadPosts()]);
      renderAll();
    }

    async function loadProfile() {
      const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
      if(data) {
        profile = data;
        getEl('userNameInput').value = data.username || "";
        focuses = (data.focus_text || "").split(',').filter(Boolean);
        if(data.avatar_url) getEl('avatarImg').src = data.avatar_url;
      }
    }

    async function loadHabits() {
      const { data } = await sb.from('habits').select('*').eq('user_id', user.id);
      if(!data || data.length === 0) {
        // Дефолтні звички (якщо нові)
        const defaults = [
          { user_id: user.id, title: 'Morning Stretch', category: 'MOVE' },
          { user_id: user.id, title: '15 min Reading', category: 'MIND' },
          { user_id: user.id, title: 'Drawing/Drafting', category: 'CREATE' },
          { user_id: user.id, title: 'No Phone Tea', category: 'SLOW' }
        ];
        await sb.from('habits').insert(defaults);
        const { data: fresh } = await sb.from('habits').select('*').eq('user_id', user.id);
        habits = fresh || [];
      } else { habits = data; }
    }

    async function loadChecks() {
      const { data } = await sb.from('check_ins').select('*').eq('user_id', user.id);
      checks = data || [];
    }

    async function toggleCheck(habitId, day) {
      const date = new Date(new Date().getFullYear(), new Date().getMonth(), day + 1).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === habitId && c.check_in_date === date);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({ user_id: user.id, habit_id: habitId, check_in_date: date });
      await loadChecks();
      renderAll();
    }

    async function toggleFocus(id) {
      const idx = focuses.indexOf(id);
      if(idx > -1) focuses.splice(idx, 1); else focuses.push(id);
      await sb.from('profiles').upsert({ id: user.id, focus_text: focuses.join(',') });
      renderAll();
    }

    async function saveUserName() {
      const username = getEl('userNameInput').value.trim();
      await sb.from('profiles').upsert({ id: user.id, username });
    }

    async function uploadAvatar() {
      const file = getEl('avatarFile').files[0];
      if(!file) return;
      const path = `${user.id}/v_${Date.now()}.png`;
      await sb.storage.from('avatars').upload(path, file);
      const url = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
      await sb.from('profiles').upsert({ id: user.id, avatar_url: url });
      getEl('avatarImg').src = url;
    }

    // --- CHAT ---
    async function loadPosts() {
      const { data } = await sb.from('community_posts').select('*').order('created_at', { ascending: true });
      posts = data || [];
      renderChat();
    }

    async function sendPost() {
      const body = getEl('postInput').value.trim();
      if(!body) return;
      await sb.from('community_posts').insert({ 
        user_id: user.id, 
        body, 
        user_email: profile.username || user.email.split('@')[0] 
      });
      getEl('postInput').value = "";
      await loadPosts();
    }

    function tagUser(name) {
      getEl('postInput').value += `@${name} `;
      getEl('postInput').focus();
    }

    // --- RENDERERS ---
    function renderAll() {
      renderDashboard();
      renderTracker();
      renderChat();
      updateChips();
    }

    function renderDashboard() {
      const streak = calculateStreak();
      getEl('streakVal').innerText = streak;
      getEl('levelVal').innerText = streak > 10 ? 'Warrior' : streak > 3 ? 'Apprentice' : 'Novice';

      getEl('ringsWrap').innerHTML = cats.map(cat => {
        const catHabits = habits.filter(h => h.category === cat.id);
        const doneCount = checks.filter(c => catHabits.some(h => h.id === c.habit_id)).length;
        const totalPossible = catHabits.length * 31;
        const perc = totalPossible > 0 ? Math.round((doneCount / totalPossible) * 100) : 0;
        const isFocused = focuses.includes(cat.id);

        return `
          <div class="card ring-card ${isFocused?'focused':''}">
            <div class="ring" style="background: conic-gradient(${cat.color} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg)">
               <div class="ring-val">${perc}%</div>
            </div>
            <div style="font-weight:800; font-size:12px; letter-spacing:1px; color:var(--muted)">${cat.emoji} ${cat.id}</div>
            ${isFocused ? '<div style="margin-top:10px; font-size:12px;">🎯 FOCUS ACTIVE</div>' : ''}
          </div>
        `;
      }).join('');
    }

    function renderTracker() {
      const today = new Date().getDate();
      const scrollPos = getEl('trackerWrap')?.scrollLeft || 0;

      getEl('trackerWrap').innerHTML = habits.map(h => {
        const hChecks = checks.filter(c => c.habit_id === h.id);
        const cat = cats.find(c => c.id === h.category);
        return `
          <div class="tracker-row">
            <div class="tracker-cell habit-title">${h.title}</div>
            ${Array.from({length:31}, (_, i) => {
              const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), i + 1).toISOString().split('T')[0];
              const isDone = hChecks.some(c => c.check_in_date === dateStr);
              return `
                <div class="tracker-cell" style="${i+1===today?'background:rgba(59,130,246,0.1)':''}">
                  <div class="check-btn ${isDone?'active':''}" onclick="toggleCheck('${h.id}', ${i})"></div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
      
      getEl('trackerWrap').scrollLeft = scrollPos;
    }

    function renderChat() {
      getEl('postsWrap').innerHTML = posts.map(p => {
        const isOwn = p.user_id === user.id;
        const bodyWithTags = p.body.replace(/@(\w+|[а-яА-ЯёЁіІїЇєЄ]+)/g, '<span class="mention">@$1</span>');
        return `
          <div class="msg ${isOwn?'own':''}">
            <div class="msg-user" onclick="tagUser('${p.user_email}')">
              <img class="avatar-sm" src="https://ui-avatars.com/api/?name=${p.user_email}&background=random">
              <span>${p.user_email}</span>
            </div>
            <div style="font-size:14px; line-height:1.5;">${bodyWithTags}</div>
          </div>
        `;
      }).join('');
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
    }

    function updateChips() {
      document.querySelectorAll('.chip').forEach(c => {
        focuses.includes(c.innerText) ? c.classList.add('active') : c.classList.remove('active');
      });
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date();
      const fmt = d => d.toISOString().split('T')[0];
      let check = fmt(now);
      if(!dates.includes(check)) {
        now.setDate(now.getDate()-1);
        check = fmt(now);
      }
      for(let d of dates) {
        if(d === check) { s++; now.setDate(now.getDate()-1); check = fmt(now); } else break;
      }
      return s;
    }

    function getEl(id) { return document.getElementById(id); }

    // --- NAVIGATION ---
    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      getEl(t.dataset.view).classList.add('active');
      if(t.dataset.view === 'trackerView') renderTracker();
    });

    bootstrap();
  </script>
</body>
</html>
