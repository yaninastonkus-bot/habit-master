<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Premium</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; /* Глибокий темно-синій як у eKreative */
      --card: rgba(30, 41, 59, 0.7);
      --accent: #3b82f6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass: blur(12px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* --- AUTH Premium Look --- */
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { 
      width: 100%; max-width: 400px; background: var(--card); backdrop-filter: var(--glass);
      border-radius: 24px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      text-align: center;
    }
    .auth-card h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; font-size: 28px; }

    /* --- Inputs & Buttons --- */
    .input { 
      width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; color: #fff; font-size: 16px; transition: 0.3s; margin-bottom: 15px;
    }
    .input:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.3); }

    .button { 
      border: 0; border-radius: 12px; padding: 14px 24px; font-size: 15px; font-weight: 600; 
      cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
    }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.primary:hover { background: #2563eb; transform: translateY(-2px); }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }

    /* --- App Layout --- */
    .app { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .topbar { display: flex; gap: 15px; margin-bottom: 40px; align-items: center; }
    .tab { 
      color: var(--muted); font-weight: 600; cursor: pointer; padding: 10px 0; 
      border-bottom: 2px solid transparent; transition: 0.3s; font-size: 15px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .view { display: none; animation: fadeIn 0.4s ease; }
    .view.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- Dashboard Premium --- */
    .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 25px; }
    
    .ring-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .ring-card { text-align: center; padding: 30px 20px; transition: 0.3s; }
    .ring-card:hover { background: rgba(255,255,255,0.03); }
    .ring-label { font-size: 12px; font-weight: 800; letter-spacing: 1px; color: var(--muted); margin-bottom: 15px; text-transform: uppercase; }

    /* --- Premium Tracker --- */
    .tracker-section { overflow-x: auto; background: var(--card); border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px; }
    .tracker-row { display: grid; grid-template-columns: 180px repeat(31, 35px); border-bottom: 1px solid var(--border); align-items: center; }
    .tracker-row:last-child { border: 0; }
    .tracker-cell { height: 45px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); font-size: 12px; }
    .habit-name { padding-left: 20px; font-weight: 600; font-size: 14px; justify-content: flex-start; }
    
    .check-box { 
      width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 5px; cursor: pointer; transition: 0.2s;
    }
    .check-box.checked { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

    /* --- Community Chat --- */
    .chat-box { height: 500px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-right: 10px; }
    .msg { max-width: 80%; padding: 15px; border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); position: relative; }
    .msg.own { align-self: flex-end; background: var(--accent); border: 0; }
    .msg-user { font-weight: 800; font-size: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
    .avatar-sm { width: 24px; height: 24px; border-radius: 50%; }

    /* Mobile */
    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .topbar { overflow-x: auto; padding-bottom: 10px; gap: 20px; }
      .app { padding: 20px 15px; }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1>🔥 EK TRACKER</h1>
      <input id="emailInput" class="input" type="email" placeholder="Електронна пошта" />
      <div style="position: relative;">
        <input id="passwordInput" class="input" type="password" placeholder="Пароль (6+ символів)" />
        <span onclick="togglePass()" style="position:absolute; right:15px; top:14px; cursor:pointer; opacity:0.5;">👁️</span>
      </div>
      <button class="button primary" onclick="signIn()">Увійти</button>
      <p style="font-size: 13px; color: var(--muted); margin-top: 20px;">Немає акаунту? <a href="#" onclick="signUp()" style="color: var(--accent); text-decoration: none;">Створити</a></p>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div style="font-weight: 800; font-size: 20px; margin-right: auto;">EK.</div>
      <div class="tab active" onclick="switchView('dashboardView', this)">Dashboard</div>
      <div class="tab" onclick="switchView('trackerView', this)">Tracker</div>
      <div class="tab" onclick="switchView('communityView', this)">Community</div>
      <div class="tab" onclick="switchView('settingsView', this)">Profile</div>
      <button class="button dark" style="padding: 8px 15px; font-size: 12px;" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
      <div class="dashboard-grid">
        <div class="card">
          <h3 style="margin-top:0">Overview</h3>
          <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
            <div style="color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 800;">Current Streak</div>
            <div id="streakVal" style="font-size: 36px; font-weight: 800; color: var(--accent);">0 Days</div>
          </div>
          <div style="font-size: 14px; color: var(--muted);">
            Ваш рівень: <strong id="levelVal" style="color: #fff;">Novice</strong>
          </div>
        </div>
        <div id="ringsWrap" class="ring-container">
          </div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="card">
        <div id="postsWrap" class="chat-box"></div>
        <div style="display:flex; gap:12px;">
          <textarea id="postInput" class="input" style="margin:0; resize:none; height:50px;" placeholder="Message..."></textarea>
          <button class="button primary" style="width:120px;" onclick="createPost()">Send</button>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
          <div id="avatarPlaceholder" style="width:100px; height:100px; border-radius:50%; background:var(--accent); margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:800;">?</div>
          <input id="usernameInput" class="input" placeholder="Display Name">
          <button class="button primary" onclick="saveProfile()">Save Profile</button>
       </div>
    </div>

  </div>

  <script>
    // Тут залишається твоя логіка з Supabase, яку ми писали раніше.
    // Я лише додав функцію перемикання вкладок у новому стилі.

    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function switchView(viewId, el) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      el.classList.add('active');
    }

    function togglePass() {
      const p = document.getElementById('passwordInput');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    // Решту функцій (signIn, signUp, loadData) встав сюди зі свого попереднього коду.
    // Вони працюватимуть так само, але в новому дизайні.
  </script>
</body>
</html>
