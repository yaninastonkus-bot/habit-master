<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Professional</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; /* Колір як на сайті eKreative */
      --card: rgba(30, 41, 59, 0.7);
      --accent: #3b82f6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass: blur(15px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* --- UI ELEMENTS --- */
    .input, .textarea { 
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 16px;
      padding: 14px 18px; color: #fff; font-size: 16px; transition: 0.3s; margin-bottom: 12px; outline: none;
    }
    .input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }

    .button { 
      border: 0; border-radius: 14px; padding: 12px 24px; font-size: 14px; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
    }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.primary:hover { background: #2563eb; transform: translateY(-2px); }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    
    /* --- LAYOUT --- */
    .app { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; overflow-x: auto; padding-bottom: 10px; }
    .nav-logo { font-weight: 800; font-size: 24px; letter-spacing: -1.5px; color: #fff; margin-right: 15px; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 10px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 25px; }
    .view { display: none; } .view.active { display: block; }

    /* --- DASHBOARD --- */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 800; margin-bottom: 10px; }
    .ring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .focus-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .chip { padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* --- TRACKER --- */
    .category-group { margin-bottom: 40px; }
    .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .tracker-box { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 22px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
    .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px); border-bottom: 1px solid var(--border); align-items: center; }
    .tracker-cell { height: 50px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
    .habit-title { justify-content: space-between; padding: 0 15px; font-weight: 600; color: #fff; font-size: 14px; }
    
    .square { 
      width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; 
      cursor: pointer; transition: 0.15s; background: rgba(255,255,255,0.02);
    }
    .square.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .square.today { border-color: var(--accent); border-style: dashed; }

    /* --- COMMUNITY --- */
    .chat-box { height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
    .msg { max-width: 80%; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); position: relative; }
    .msg.own { align-self: flex-end; background: var(--accent); border: 0; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
    .space-nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
    .space-tab { padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--border); white-space: nowrap; }
    .space-tab.active { background: var(--accent); border-color: var(--accent); }

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .tracker-row { grid-template-columns: 150px repeat(31, 40px); }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 class="nav-logo" style="font-size: 36px; margin-bottom: 10px;">EK Habit Tracker</h1>
      <p style="color:var(--muted); margin-bottom: 30px;">Premium Access</p>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <input id="passwordInput" class="input" type="password" placeholder="Password" />
      <button class="button primary" onclick="signIn()">Sign In</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="signUp()">Register</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div class="nav-logo">EK.</div>
      <div class="tab active" data-view="dashView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="profileView">Settings</div>
      <button class="button dark" style="margin-left:auto; padding:8px 15px; font-size:11px;" onclick="logout()">Logout</button>
    </nav>

    <div id="dashView" class="view active">
      <div class="dashboard-grid">
        <div>
          <div class="card" style="text-align: center;">
            <div class="stat-label">Current Streak</div>
            <p style="font-size: 56px; font-weight: 800; margin: 10px 0;" id="streakVal">0</p>
            <div id="levelVal" style="color:var(--accent); font-weight:800; font-size:14px; text-transform: uppercase;">Novice 🥚</div>
          </div>
          <div class="card">
            <div class="stat-label">Focus Areas</div>
            <div class="focus-chips" id="focusChipsContainer">
              <div class="chip" onclick="toggleFocusChip('MOVE')">🏃 MOVE</div>
              <div class="chip" onclick="toggleFocusChip('MIND')">🧠 MIND</div>
              <div class="chip" onclick="toggleFocusChip('CREATE')">🎨 CREATE</div>
              <div class="chip" onclick="toggleFocusChip('SLOW')">🌿 SLOW</div>
            </div>
          </div>
        </div>
        <div id="ringsGrid" class="ring-grid"></div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerSections"></div>
    </div>

    <div id="chatView" class="view">
      <div class="card">
        <div class="space-nav" id="spaceNav">
          <div class="space-tab active" onclick="setSpace('GENERAL')">💬 General</div>
          <div class="space-tab" onclick="setSpace('MOVE')">🏃 MOVE</div>
          <div class="space-tab" onclick="setSpace('MIND')">🧠 MIND</div>
          <div class="space-tab" onclick="setSpace('CREATE')">🎨 CREATE</div>
          <div class="space-tab" onclick="setSpace('SLOW')">🌿 SLOW</div>
        </div>
        <div id="postsWrap" class="chat-box"></div>
        <div style="display:flex; gap:12px; margin-top:20px;">
          <textarea id="postInput" class="textarea" style="margin:0; height:50px; padding-top:14px;" placeholder="Write a message..."></textarea>
          <button class="button primary" style="width:100px;" onclick="createPost()">Send</button>
        </div>
      </div>
    </div>

    <div id="profileView" class="view">
      <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <h2 style="margin-top:0">Settings</h2>
        <p style="color: var(--muted); font-size: 13px;" id="userEmailLabel"></p>
        <button id="notifBtn" class="button primary" onclick="enableNotifications()">🔔 Enable Notifications</button>
        <div id="adminSection" class="hidden" style="margin-top:30px; border-top: 1px solid var(--border); padding-top:20px;">
           <h3 style="color:var(--accent)">👑 Admin Stats</h3>
           <div id="adminStats"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let user = null, habits = [], checks = [], posts = [], curSpace = "GENERAL", selectedFocuses = [];
    const cats = [
      { id: 'MOVE', color: '#3b82f6', emoji: '🏃' },
      { id: 'MIND', color: '#10b981', emoji: '🧠' },
      { id: 'CREATE', color: '#f43f5e', emoji: '🎨' },
      { id: 'SLOW', color: '#8b5cf6', emoji: '🌿' }
    ];

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user;
      if(!user) return;
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('userEmailLabel').innerText = user.email;
      if(user.email === OWNER_EMAIL) document.getElementById('adminSection').classList.remove('hidden');
      await refreshData();
    }

    async function refreshData() {
      const [h, c, p, profile] = await Promise.all([
        sb.from('habits').select('*').eq('user_id', user.id),
        sb.from('check_ins').select('*').eq('user_id', user.id),
        sb.from('community_posts').select('*').order('created_at'),
        sb.from('profiles').select('*').eq('id', user.id).single()
      ]);
      habits = h.data || [];
      checks = c.data || [];
      posts = p.data || [];
      if(profile.data?.focus_text) selectedFocuses = profile.data.focus_text.split(',').filter(Boolean);
      
      // Створення початкових звичок, якщо їх немає
      if(habits.length === 0) {
        let ins = [];
        cats.forEach(cat => ins.push({user_id:user.id, title:`Daily ${cat.id}`, category:cat.id}));
        await sb.from('habits').insert(ins);
        const { data: fresh } = await sb.from('habits').select('*').eq('user_id', user.id);
        habits = fresh;
      }
      renderAll();
    }

    // --- TRACKER LOGIC ---
    async function addHabit(catId) {
      const title = prompt(`Додати нову звичку для ${catId}:`);
      if(!title) return;
      await sb.from('habits').insert({ user_id: user.id, title, category: catId });
      await refreshData();
    }

    async function toggleCheck(hId, day) {
      const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), day + 1).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === hId && c.check_in_date === dStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({ user_id: user.id, habit_id: hId, check_in_date: dStr });
      await refreshData();
    }

    // --- RENDERERS ---
    function renderAll() {
      renderTracker();
      renderDash();
      renderChat();
    }

    function renderTracker() {
      const today = new Date().getDate();
      document.getElementById('trackerSections').innerHTML = cats.map(cat => {
        const catH = habits.filter(h => h.category === cat.id);
        return `
          <div class="category-group">
            <div class="category-header">
              <span style="font-weight:800; font-size:18px;">${cat.emoji} ${cat.id}</span>
              <button class="button dark" style="padding:5px 12px; font-size:11px" onclick="addHabit('${cat.id}')">+ Add Habit</button>
            </div>
            <div class="tracker-box">
              ${catH.map(h => `
                <div class="tracker-row">
                  <div class="tracker-cell habit-title">${h.title}</div>
                  ${Array.from({length:31}, (_, i) => {
                    const active = checks.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === i+1);
                    return `<div class="tracker-cell"><div class="square ${active?'active':''} ${i+1===today?'today':''}" onclick="toggleCheck('${h.id}',${i})"></div></div>`;
                  }).join('')}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderDash() {
      const streak = calculateStreak();
      document.getElementById('streakVal').innerText = streak;
      document.getElementById('levelVal').innerText = streak > 10 ? 'Warrior ⚔️' : streak > 3 ? 'Apprentice 🌱' : 'Novice 🥚';
      
      document.getElementById('ringsGrid').innerHTML = cats.map(cat => {
        const hbits = habits.filter(h => h.category === cat.id);
        const done = checks.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.round((done / (hbits.length * 31)) * 100) : 0;
        const isFoc = selectedFocuses.includes(cat.id);
        return `
          <div class="card" style="text-align:center; padding:20px; ${isFoc?'border-color:var(--accent)':''}">
            <div style="width:60px; height:60px; border-radius:50%; margin:0 auto 10px; background:conic-gradient(${cat.color} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg); display:flex; align-items:center; justify-content:center; font-weight:800;">
              ${perc}%
            </div>
            <div class="stat-label" style="margin:0">${cat.id}</div>
          </div>
        `;
      }).join('');
    }

    function renderChat() {
      const filtered = posts.filter(p => (p.space || 'GENERAL') === curSpace);
      document.getElementById('postsWrap').innerHTML = filtered.map(p => `
        <div class="msg ${p.user_id===user.id?'own':''}">
          <div style="font-size:10px; opacity:0.5; margin-bottom:5px;">${p.user_email}</div>
          <div style="font-size:14px; line-height:1.4;">${p.body}</div>
        </div>
      `).join('');
      document.getElementById('postsWrap').scrollTop = document.getElementById('postsWrap').scrollHeight;
    }

    // --- OTHER ---
    function setSpace(sp) {
      curSpace = sp;
      document.querySelectorAll('.space-tab').forEach(t => t.classList.toggle('active', t.innerText.includes(sp)));
      renderChat();
    }

    async function toggleFocusChip(id) {
      const idx = selectedFocuses.indexOf(id);
      if(idx > -1) selectedFocuses.splice(idx, 1); else selectedFocuses.push(id);
      await sb.from('profiles').upsert({ id: user.id, focus_text: selectedFocuses.join(',') });
      renderDash();
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', selectedFocuses.includes(c.innerText.split(' ')[1])));
    }

    async function createPost() {
      const b = document.getElementById('postInput').value.trim();
      if(!b) return;
      await sb.from('community_posts').insert({ user_id: user.id, body: b, space: curSpace, user_email: user.email });
      document.getElementById('postInput').value = "";
      await refreshData();
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date().toISOString().split('T')[0];
      for(let d of dates) { if(d === now || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) { s++; now = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    async function signIn() {
      const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value });
      if(!error) bootstrap(); else alert(error.message);
    }
    async function signUp() {
      const { error } = await sb.auth.signUp({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value });
      if(!error) alert("Перевірте пошту!"); else alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    const getEl = id => document.getElementById(id);

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      getEl(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
