<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Master</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb;
      --card:#ffffff;
      --text:#1b2433;
      --muted:#6f7f98;
      --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08);
      --blue:#2f39f6;
      --green:#8bb26a;
      --pink:#ba81a7;
      --move:#2f39f6;
      --mind:#7ea765;
      --create:#e3aed0;
      --slow:#6f87d8;
      --today:#f3e39c;
      --dark:#111827;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .hidden{display:none !important}

    .auth-shell{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .auth-card{
      width:100%;
      max-width:560px;
      background:#f7f8fc;
      border-radius:28px;
      padding:32px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .auth-title{
      font-size:30px;
      font-weight:800;
      margin-bottom:10px;
    }

    .input,.textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      background:#fff;
      color:var(--text);
    }

    .button{
      border:0;
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .button.primary{background:var(--blue);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    .button.soft{background:#eef2ff;color:var(--blue)}

    .app{
      max-width:1480px;
      margin:0 auto;
      padding:20px;
    }

    .topbar{
      display:grid;
      grid-template-columns:repeat(4,1fr) auto;
      gap:12px;
      margin-bottom:18px;
    }

    .tab{
      background:rgba(255,255,255,.72);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:16px;
      padding:16px 18px;
      text-align:center;
      color:#61708c;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
    }

    .tab.active{
      background:#fff;
      color:var(--text);
      font-weight:800;
    }

    .view{display:none}
    .view.active{display:block}

    /* Community Chat Style */
    .chat-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 600px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(255,255,255,0.4);
      border-radius: 20px;
    }

    .message {
      max-width: 80%;
      padding: 14px;
      border-radius: 18px;
      position: relative;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .message.own {
      align-self: flex-end;
      background: var(--blue);
      color: #fff;
    }

    .message-meta {
      font-size: 12px;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .message-content img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }

    .attachment-btn {
      background: #eee;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Styles for Tracker from previous version */
    .tracker-wrap{ overflow:auto; padding-bottom:10px; }
    .tracker-section{ min-width:1360px; margin-bottom:18px; }
    .tracker-head,.tracker-row{ display:grid; grid-template-columns:170px repeat(31, 34px) 104px; align-items:center; }
    .tracker-head{ color:#fff; font-size:12px; font-weight:700; border:1px solid var(--border); }
    .tracker-row{ background:#fff; border:1px solid var(--border); font-size:14px; }
    .checkbox{ width:18px; height:18px; border:1px solid #4b5563; border-radius:4px; cursor:pointer; }
    .today-cell{ background:var(--today); }
    
    .card{ background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <div class="auth-title">🔥 Habit Master</div>
      <div class="auth-grid">
        <input id="emailInput" class="input" type="email" placeholder="твій email" />
        <input id="passwordInput" class="input" type="password" placeholder="пароль" />
        <div class="auth-actions" style="display:flex; gap:10px; margin-top:20px;">
          <button class="button primary" style="flex:1" onclick="signIn()">Увійти</button>
          <button class="button soft" style="flex:1" onclick="signUp()">Зареєструватися</button>
        </div>
      </div>
      <div id="authStatus" class="status"></div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
      <div class="card">
        <h2>Вітаємо в Habit Master!</h2>
        <p>Ваш прогрес відображається тут.</p>
        <div id="ringsWrap" style="display:flex; gap:20px; flex-wrap:wrap;"></div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap" class="tracker-wrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout" style="display:grid; grid-template-columns: 250px 1fr; gap:20px;">
        <div class="card">
          <h3>Напрями</h3>
          <div id="spacesWrap" class="spaces"></div>
        </div>
        <div class="card">
          <h3 id="communityTitle">Чат</h3>
          <div id="postsWrap" class="chat-container"></div>
          
          <div class="composer" style="margin-top:20px; display:flex; gap:10px; align-items:flex-end;">
            <label class="attachment-btn">
              📎 <input type="file" id="fileInput" class="hidden" accept="image/*, .pdf, .doc">
            </label>
            <textarea id="postInput" class="textarea" style="min-height:50px;" placeholder="Напиши повідомлення..."></textarea>
            <button class="button primary" onclick="createPost()">Надіслати</button>
          </div>
          <div id="communityStatus" class="status"></div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
      <div class="card">
        <h3>Налаштування</h3>
        <button class="button soft" onclick="enableNotifications()">Увімкнути сповіщення</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let categories = [];
    let habits = [];
    let checkIns = [];
    let posts = [];
    let selectedSpace = "MOVE";

    const TODAY = new Date().getDate();

    // --- AUTH ---
    async function signIn() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) alert(error.message);
      else bootstrap();
    }

    async function signUp() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { error } = await sb.auth.signUp({ email, password });
      if(error) alert(error.message);
      else alert("Перевірте пошту для підтвердження!");
    }

    function logout() {
      sb.auth.signOut();
      location.reload();
    }

    // --- APP CORE ---
    async function bootstrap() {
      const { data: { session } } = await sb.auth.getSession();
      if(!session) return;
      currentUser = session.user;
      
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');

      await loadCategories();
      await loadHabits();
      await loadCheckIns();
      await loadPosts();
      renderAll();
    }

    async function loadCategories() {
      const { data } = await sb.from('categories').select('*').order('sort_order');
      categories = data || [];
    }

    async function loadHabits() {
      const { data } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      habits = data || [];
    }

    async function loadCheckIns() {
      const { data } = await sb.from('check_ins').select('*').eq('user_id', currentUser.id);
      checkIns = data || [];
    }

    async function loadPosts() {
      const { data } = await sb.from('community_posts')
        .select('*, profiles(full_name, email), categories(slug)')
        .order('created_at', { ascending: true });
      posts = data || [];
      renderCommunity();
    }

    // --- COMMUNITY ACTIONS ---
    async function createPost() {
      const body = document.getElementById('postInput').value.trim();
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      let fileUrl = null;

      if(!body && !file) return;

      if(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random()}.${fileExt}`;
        const { data, error } = await sb.storage.from('community').upload(fileName, file);
        if (data) {
          const { data: urlData } = sb.storage.from('community').getPublicUrl(fileName);
          fileUrl = urlData.publicUrl;
        }
      }

      const cat = categories.find(c => c.slug === selectedSpace);
      await sb.from('community_posts').insert({
        user_id: currentUser.id,
        category_id: cat.id,
        body: body,
        media_url: fileUrl
      });

      document.getElementById('postInput').value = '';
      fileInput.value = '';
      await loadPosts();
    }

    // --- RENDERING ---
    function renderAll() {
      renderTracker();
      renderCommunity();
      bindTabs();
    }

    function renderTracker() {
      const wrap = document.getElementById('trackerWrap');
      wrap.innerHTML = categories.map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        return `
          <div class="tracker-section">
            <div class="tracker-head" style="background:${cat.color}">
              <div>${cat.title}</div>
              ${Array.from({length: 31}, (_, i) => `<div class="${i+1 === TODAY ? 'today-cell' : ''}">${i+1}</div>`).join('')}
              <div>%</div>
            </div>
            ${catHabits.map(h => `
              <div class="tracker-row">
                <div class="habit-name">${h.title}</div>
                ${Array.from({length: 31}, (_, i) => `<div><input type="checkbox" class="checkbox"></div>`).join('')}
                <div class="progress">0%</div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');
    }

    function renderCommunity() {
      const spacesWrap = document.getElementById('spacesWrap');
      const postsWrap = document.getElementById('postsWrap');

      spacesWrap.innerHTML = categories.map(cat => `
        <button class="space-btn ${selectedSpace === cat.slug ? 'active' : ''}" 
                style="width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:1px solid #ddd; background:${selectedSpace === cat.slug ? cat.color : '#fff'}; color:${selectedSpace === cat.slug ? '#fff' : '#000'}"
                onclick="changeSpace('${cat.slug}')">
          ${cat.title}
        </button>
      `).join('');

      const filteredPosts = posts.filter(p => p.categories?.slug === selectedSpace);
      postsWrap.innerHTML = filteredPosts.map(p => {
        const isOwn = p.user_id === currentUser.id;
        return `
          <div class="message ${isOwn ? 'own' : ''}">
            <div class="message-meta">${p.profiles?.full_name || p.profiles?.email || 'Користувач'}</div>
            <div class="message-content">
              ${p.body ? `<div>${p.body}</div>` : ''}
              ${p.media_url ? `<img src="${p.media_url}" alt="Attachment">` : ''}
            </div>
          </div>
        `;
      }).join('');
      postsWrap.scrollTop = postsWrap.scrollHeight;
    }

    function changeSpace(slug) {
      selectedSpace = slug;
      renderCommunity();
    }

    function bindTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.view).classList.add('active');
        };
      });
    }

    bootstrap();
  </script>
</body>
</html>
