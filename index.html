<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Master</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb; --card:#ffffff; --text:#1b2433; --muted:#6f7f98; --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08); --blue:#2f39f6; --green:#8bb26a;
      --pink:#ba81a7; --move:#2f39f6; --mind:#7ea765; --create:#e3aed0; --slow:#6f87d8;
      --today:#f3e39c; --dark:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text);}
    .hidden{display:none !important}
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
    .auth-card{width:100%; max-width:560px; background:#f7f8fc; border-radius:28px; padding:32px; box-shadow:var(--shadow); text-align:center;}
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:14px; padding:14px 16px; font-size:16px; background:#fff;}
    .textarea{resize:vertical; min-height:100px; font-family:inherit;}
    .button{border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer;}
    .button.primary{background:var(--blue);color:#fff}
    .button.green{background:var(--green);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    .app{max-width:1480px; margin:0 auto; padding:20px;}
    .topbar{display:grid; grid-template-columns:repeat(4,1fr) auto; gap:12px; margin-bottom:18px;}
    .tab{background:rgba(255,255,255,.72); border:1px solid var(--border); border-radius:16px; padding:16px 18px; text-align:center; cursor:pointer; font-weight:600;}
    .tab.active{background:#fff; font-weight:800;}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; margin-bottom:20px;}
    
    /* Dashboard Rings Styles */
    .ring-card{min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center;}
    .ring{width:100px; height:100px; border-radius:50%; position:relative; border:1px solid #d2d9e4;}
    .ring::after{content:""; position:absolute; inset:10px; background:#fff; border-radius:50%;}
    .ring-value{font-size:20px; font-weight:800; position:absolute; z-index:10; top:50%; transform:translateY(-50%);}
    .side-block{color:#fff; min-height:70px; display:flex; align-items:center; justify-content:center; text-align:center; padding:15px; font-size:17px; font-weight:700; border-radius:18px; margin-bottom:10px;}

    /* Community Styles */
    .community-layout{display:grid; grid-template-columns:260px 1fr; gap:20px;}
    .space-btn{width:100%; border:0; border-radius:18px; padding:14px 16px; text-align:left; font-size:16px; font-weight:700; cursor:pointer; background:#fff; margin-bottom:8px; box-shadow:var(--shadow);}
    .post-img{max-width:100%; border-radius:14px; margin-top:10px; display:block; border:1px solid var(--border);}
    .file-link{display:inline-block; margin-top:10px; padding:8px 12px; background:#f0f4ff; color:var(--blue); border-radius:8px; text-decoration:none; font-size:14px; font-weight:600;}
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <div style="font-size:30px; font-weight:800; margin-bottom:10px;">🔥 Habit Master</div>
      <div class="auth-grid">
        <input id="emailInput" class="input" type="email" placeholder="твій email" style="margin-bottom:10px;"/>
        <input id="passwordInput" class="input" type="password" placeholder="пароль" />
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
          <button class="button primary" onclick="signIn()">Увійти</button>
          <button class="button green" onclick="signUp()">Зареєструватися</button>
        </div>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div style="display:grid; grid-template-columns:300px 1fr; gap:20px;">
         <div>
            <div id="levelPanel" class="side-block" style="background:var(--green)">🏆 LEVEL: Novice 🥚</div>
            <div id="motivationPanel" class="side-block" style="background:var(--blue)">✨ Ready for XP?</div>
            <div class="card" style="text-align:center">
              <div style="color:var(--muted)">Active Days</div>
              <div id="activeVal" style="font-size:28px; font-weight:800">0</div>
            </div>
         </div>
         <div id="ringsWrap" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:15px;"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout">
        <div id="spacesWrap"></div>
        <div>
          <div class="card">
            <h3 id="communityTitle" style="margin-top:0">Community</h3>
            <textarea id="postInput" class="textarea" placeholder="Напиши про свою перемогу..."></textarea>
            <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
               <input type="file" id="fileInput" style="font-size:12px; flex:1;">
               <button class="button primary" onclick="createPost()">Опублікувати</button>
            </div>
            <div id="uploadStatus" style="font-size:12px; color:var(--muted); margin-top:5px;"></div>
          </div>
          <div id="postsWrap"></div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h2>Settings</h2>
           <p>Email: <strong id="userEmailLabel"></strong></p>
           <button class="button dark" onclick="logout()">Logout</button>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "MOVE";

    const META = {
      MOVE: { color: "#2F39F6", emoji: "🏃" },
      MIND: { color: "#7EA765", emoji: "🧠" },
      CREATE: { color: "#E3AED0", emoji: "🎨" },
      SLOW: { color: "#6F87D8", emoji: "🌿" }
    };

    const DEFAULT_HABITS = {
      MOVE: ["10–20 min walk", "Stretching", "Short workout"],
      MIND: ["Journaling", "Reading", "Meditation"],
      CREATE: ["Sketching", "Drawing", "New recipe"],
      SLOW: ["No phone tea", "Early bed", "Self-care"]
    };

    async function signUp(){
      const { error } = await sb.auth.signUp({ email: emailInput.value, password: passwordInput.value });
      if(error) alert(error.message); else alert("Перевір пошту!");
    }
    async function signIn(){
      const { error } = await sb.auth.signInWithPassword({ email: emailInput.value, password: passwordInput.value });
      if(error) alert(error.message); else bootstrap();
    }
    function logout(){ sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      const { data } = await sb.auth.getSession();
      currentUser = data.session?.user;
      if(!currentUser) return;
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      userEmailLabel.innerText = currentUser.email;

      await loadCategories();
      await cleanHabits();
      await loadCheckIns();
      await loadPosts();
      renderAll();
    }

    async function loadCategories(){ const { data } = await sb.from('categories').select('*').order('sort_order'); categories = data || []; }

    async function cleanHabits(){
      const { data } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      let seen = new Set(), dups = [];
      data?.forEach(h => seen.has(h.title) ? dups.push(h.id) : seen.add(h.title));
      if(dups.length) await sb.from('habits').delete().in('id', dups);
      if(!data || data.length === 0){
        let ins = [];
        categories.forEach(c => (DEFAULT_HABITS[c.slug] || []).forEach(t => ins.push({ user_id:currentUser.id, category_id:c.id, title:t })));
        await sb.from('habits').insert(ins);
      }
      const { data: fresh } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      habits = fresh || [];
    }

    async function loadCheckIns(){ const { data } = await sb.from('check_ins').select('*').eq('user_id', currentUser.id); checkIns = data || []; }
    async function loadPosts(){ const { data } = await sb.from('community_posts').select('*').order('created_at', { ascending: false }); posts = data || []; }

    async function toggleCheck(habitId, day){
      const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
      const exist = checkIns.find(c => c.habit_id === habitId && c.check_in_date === dateStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({ user_id:currentUser.id, habit_id:habitId, check_in_date:dateStr });
      await loadCheckIns(); renderAll();
    }

    async function createPost(){
      const body = postInput.value.trim();
      const file = fileInput.files[0];
      let fileUrl = null;
      let fileType = null;

      if(!body && !file) return;
      uploadStatus.innerText = "Завантаження...";

      if(file){
        const fExt = file.name.split('.').pop();
        const fPath = `${currentUser.id}/${Date.now()}.${fExt}`;
        const { data: uploadData, error: uploadErr } = await sb.storage.from('community').upload(fPath, file);
        if(uploadErr) return alert("Помилка файлу: " + uploadErr.message);
        const { data: urlData } = sb.storage.from('community').getPublicUrl(fPath);
        fileUrl = urlData.publicUrl;
        fileType = file.type.startsWith('image/') ? 'image' : 'file';
      }

      await sb.from('community_posts').insert({
        user_id: currentUser.id, category_id: categories.find(c => c.slug === selectedSpace).id,
        body, file_url: fileUrl, file_type: fileType, user_email: currentUser.email
      });

      postInput.value = ''; fileInput.value = ''; uploadStatus.innerText = "";
      await loadPosts(); renderCommunity();
    }

    function renderAll(){ renderDashboard(); renderTracker(); renderCommunity(); bindTabs(); }

    function renderDashboard(){
      const totalCheckins = checkIns.length;
      levelPanel.innerText = `🏆 LEVEL: ${totalCheckins < 30 ? 'Novice 🥚' : totalCheckins < 100 ? 'Apprentice 🌱' : 'Warrior ⚔️'}`;
      motivationPanel.innerText = totalCheckins < 10 ? '✨ Nice start!' : '💪 Keep going!';
      activeVal.innerText = [...new Set(checkIns.map(c => c.check_in_date))].length;

      ringsWrap.innerHTML = categories.map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        const done = checkIns.filter(c => catHabits.some(h => h.id === c.habit_id)).length;
        const perc = Math.min(100, Math.round((done / (catHabits.length * 31)) * 100));
        const deg = perc * 3.6;
        return `
          <div class="card ring-card">
            <div style="font-weight:800; font-size:14px;">${cat.slug}</div>
            <div class="ring" style="background: conic-gradient(${cat.color} ${deg}deg, #dfe3ea 0deg);">
              <div class="ring-value">${perc}%</div>
            </div>
          </div>`;
      }).join('');
    }

    function renderTracker(){
      trackerWrap.innerHTML = categories.map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        return `
          <div class="tracker-section">
            <div class="tracker-head" style="background:${cat.color}">
              <div style="padding-left:15px">${cat.slug}</div>
              ${Array.from({length:31}, (_,i)=>`<div>${i+1}</div>`).join('')}
              <div>%</div>
            </div>
            ${catHabits.map(h => {
              const hChecks = checkIns.filter(c => c.habit_id === h.id);
              return `<div class="tracker-row">
                <div style="padding-left:15px">${h.title}</div>
                ${Array.from({length:31}, (_,i)=>{
                  const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), i+2).toISOString().split('T')[0];
                  const checked = hChecks.some(c => c.check_in_date === dStr);
                  return `<div style="display:flex; justify-content:center"><div class="checkbox" style="${checked?`background:${cat.color}`:''}" onclick="toggleCheck('${h.id}', ${i+1})"></div></div>`;
                }).join('')}
                <div style="font-weight:bold; color:${cat.color}; text-align:center">${Math.round((hChecks.length/31)*100)}%</div>
              </div>`;
            }).join('')}
          </div>`;
      }).join('');
    }

    function renderCommunity(){
      spacesWrap.innerHTML = categories.map(cat => `<button class="space-btn" style="${selectedSpace===cat.slug?`background:${cat.color}; color:#fff`:''}" onclick="selectedSpace='${cat.slug}'; renderCommunity();">${META[cat.slug].emoji} ${cat.slug}</button>`).join('');
      const filtered = posts.filter(p => categories.find(c => c.id === p.category_id)?.slug === selectedSpace);
      postsWrap.innerHTML = filtered.map(p => `
        <div class="card">
          <div class="post-meta"><strong>${p.user_email || 'Member'}</strong> <span>${new Date(p.created_at).toLocaleDateString()}</span></div>
          <div class="post-body">${p.body || ''}</div>
          ${p.file_url ? (p.file_type === 'image' ? `<img src="${p.file_url}" class="post-img">` : `<a href="${p.file_url}" target="_blank" class="file-link">📎 Відкрити документ</a>`) : ''}
        </div>`).join('');
    }

    function bindTabs(){ document.querySelectorAll('.tab').forEach(t => t.onclick = () => { document.querySelectorAll('.tab, .view').forEach(x => x.classList.remove('active')); t.classList.add('active'); document.getElementById(t.dataset.view).classList.add('active'); }); }
    bootstrap();
  </script>
</body>
</html>
