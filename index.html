<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Habit Master Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb; --card:#ffffff; --text:#1b2433; --muted:#6f7f98; --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08); --blue:#2f39f6; --green:#8bb26a;
      --pink:#ba81a7; --move:#2f39f6; --mind:#7ea765; --create:#e3aed0; --slow:#6f87d8;
      --today:#f3e39c; --dark:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text);}
    .hidden{display:none !important}
    
    /* Auth */
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
    .auth-card{width:100%; max-width:500px; background:#f7f8fc; border-radius:28px; padding:32px; box-shadow:var(--shadow); text-align:center;}
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:14px; padding:14px 16px; font-size:16px; background:#fff; font-family: inherit;}
    .button{border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer; transition:0.2s;}
    .button:active{transform:scale(0.98);}
    .button.primary{background:var(--blue);color:#fff}
    .button.green{background:var(--green);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    
    /* Layout */
    .app{max-width:1480px; margin:0 auto; padding:20px;}
    .topbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;}
    .tab{background:rgba(255,255,255,.72); border:1px solid var(--border); border-radius:16px; padding:14px 18px; text-align:center; cursor:pointer; font-weight:600; flex-grow:1;}
    .tab.active{background:#fff; font-weight:800; border-color: var(--blue);}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; margin-bottom:20px;}
    
    /* Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
    #ringsWrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .ring-card{min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; transition:0.3s;}
    .ring{width:110px; height:110px; border-radius:50%; position:relative; border:1px solid #d2d9e4;}
    .ring::after{content:""; position:absolute; inset:12px; background:#fff; border-radius:50%;}
    .ring-value{font-size:22px; font-weight:800; position:absolute; z-index:10; top:50%; left:50%; transform:translate(-50%, -50%);}
    .side-block{color:#fff; min-height:75px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; font-size:17px; font-weight:700; border-radius:22px; margin-bottom:12px;}
    
    /* Оновлений Focus: Чіпи для множинного вибору */
    .focus-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
    .focus-chip {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; border-radius: 12px; padding: 8px 12px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; user-select: none;
    }
    .focus-chip:hover { background: rgba(255,255,255,0.3); }
    .focus-chip.active { background: #fff; color: var(--pink); border-color: #fff; }

    /* Tracker */
    .tracker-section{overflow-x:auto; margin-bottom:25px; background:#fff; border-radius:20px; border:1px solid var(--border); padding-bottom:5px; -webkit-overflow-scrolling: touch;}
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px) 70px; align-items: center; min-width: 1510px; }
    .tracker-head { color:#fff; font-size:12px; font-weight:700; height:45px; background: #333;}
    .tracker-row { border-bottom: 1px solid #f0f0f0; height:50px; font-size:14px; }
    .tracker-head > div, .tracker-row > div { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid rgba(0,0,0,0.03); }
    .today-cell { background: var(--today) !important; color: #000; font-weight: 800;}
    .checkbox{width:22px; height:22px; border:2px solid #cbd5e1; border-radius:7px; cursor:pointer;}

    /* Community Chat */
    .community-layout{display:grid; grid-template-columns: 280px 1fr; gap:20px; align-items: start;}
    .spaces-sidebar { display: flex; flex-direction: column; gap: 10px; }
    .space-btn{width:100%; border:1px solid var(--border); border-radius:18px; padding:16px; text-align:left; font-size:16px; font-weight:700; cursor:pointer; background:#fff; box-shadow: var(--shadow); transition: 0.2s;}
    .chat-box { height: 500px; overflow-y: auto; background: #f8fbff; border-radius: 22px; padding: 20px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
    .msg { max-width: 85%; padding: 14px 18px; padding-right: 65px; border-radius: 20px; background: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.04); color: var(--text); position: relative; word-wrap: break-word; line-height:1.4;}
    .msg.own { align-self: flex-end; background: var(--blue); color: #fff; }
    .post-img { max-width: 100%; border-radius: 14px; margin-top: 10px; display: block; border: 1px solid rgba(0,0,0,0.1); }
    .action-btns { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; }
    .action-btn { cursor: pointer; opacity: 0.8; font-size: 14px; transition: 0.2s; user-select: none; background: rgba(255,255,255,0.7); border-radius: 6px; padding: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:center;}
    .action-btn:hover { opacity: 1; transform: scale(1.1); background: #fff; }

    /* Mobile Setup */
    @media (max-width: 768px) {
      .app { padding: 12px; }
      .card { padding: 16px; border-radius: 20px;}
      .auth-card { padding: 24px; }
      .topbar { gap: 8px; }
      .tab { padding: 12px; font-size: 14px; border-radius: 12px; }
      .topbar > button { width: 100%; margin-top: 5px; }
      .dashboard-grid { grid-template-columns: 1fr; gap: 15px; }
      #ringsWrap { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .ring-card { min-height: 180px; }
      .ring { width: 90px; height: 90px; }
      .ring::after { inset: 10px; }
      .ring-value { font-size: 18px; }
      .community-layout { grid-template-columns: 1fr; gap: 15px;}
      .spaces-sidebar { flex-direction: row; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
      .space-btn { min-width: 140px; text-align: center; }
      .chat-box { height: 400px; padding: 15px; }
      #communityView .card > div[style*="display:flex"] { flex-wrap: wrap; }
      #postInput { width: 100%; }
      #sendBtn, #cancelEditBtn { flex-grow: 1; }
    }
    input[type="password"]::-ms-reveal, input[type="password"]::-ms-clear { display: none; }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 style="margin:0 0 10px 0;">🔥 EK Habit Tracker</h1>
      <p style="color:var(--muted); margin-bottom:20px;">Увійдіть або створіть акаунт</p>
      
      <input id="emailInput" class="input" type="email" placeholder="Email" style="margin-bottom:12px;"/>
      
      <div style="position: relative; margin-bottom: 12px;">
        <input id="passwordInput" class="input" type="password" placeholder="Пароль (мін. 6 символів)" style="padding-right: 40px;" />
        <div id="eyeIcon" onclick="togglePassword()" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6; font-size: 18px; user-select: none;">👁️</div>
      </div>

      <div id="loginError" style="color:red; font-size:12px; margin-top:5px; min-height:15px;"></div>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
        <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
        <button class="button green" onclick="signUp()">Створити</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div class="dashboard-grid">
         <div>
            <div id="levelPanel" class="side-block" style="background:var(--green)">🏆 LEVEL: Novice 🥚</div>
            <div id="streakPanel" class="side-block" style="background:#ff9800">🔥 STREAK: 0 DAYS</div>
            <div id="motivationPanel" class="side-block" style="background:var(--blue)">✨ Nice start!</div>
            <div class="card" style="text-align:center; padding:15px;">
              <div style="color:var(--muted); font-size:14px; margin-bottom:5px;">Active Days</div>
              <div id="activeVal" style="font-size:32px; font-weight:800">0</div>
            </div>
            
            <div class="card" style="background:var(--pink); color:#fff; padding: 20px 15px; border-radius: 22px; text-align:center;">
              <div style="font-size: 14px; margin-bottom: 12px; opacity: 0.9; font-weight:700;">🎯 YOUR FOCUS:</div>
              <div class="focus-chips" id="focusChipsContainer">
                <div class="focus-chip" data-val="MOVE" onclick="toggleFocusChip('MOVE')">🏃 MOVE</div>
                <div class="focus-chip" data-val="MIND" onclick="toggleFocusChip('MIND')">🧠 MIND</div>
                <div class="focus-chip" data-val="CREATE" onclick="toggleFocusChip('CREATE')">🎨 CREATE</div>
                <div class="focus-chip" data-val="SLOW" onclick="toggleFocusChip('SLOW')">🌿 SLOW</div>
              </div>
              <hr style="border:0; border-top:1px solid rgba(255,255,255,0.3); margin:15px 0;">
              <div style="font-size: 15px; font-weight:800;">🎁 REWARD: <span style="opacity:0.9; font-weight:normal;">merch</span></div>
            </div>
         </div>
         <div id="ringsWrap"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout">
        <div id="spacesWrap" class="spaces-sidebar"></div>
        <div>
          <div class="card" style="margin-bottom:15px;">
            <h3 id="communityTitle" style="margin:0 0 15px 0;">Community</h3>
            <div id="postsWrap" class="chat-box"></div>
            
            <div style="margin-top:15px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
              <div id="attachWrap" style="display:flex; align-items:center; gap:8px;">
                <label class="button dark" style="padding:14px; cursor:pointer; margin:0;">
                  📎<input type="file" id="fileInput" class="hidden" onchange="updateFileName()">
                </label>
                <span id="fileNameDisplay" style="font-size: 12px; color: var(--muted); max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
              </div>
              
              <textarea id="postInput" class="textarea" style="min-height:50px; flex-grow:1;" placeholder="Поділися успіхом..."></textarea>
              
              <button id="cancelEditBtn" class="button dark hidden" style="height:50px;" onclick="cancelEdit()">Скасувати</button>
              <button id="sendBtn" class="button primary" style="height:50px;" onclick="createPost()">Надіслати</button>
            </div>
            <div id="uploadStatus" style="font-size:12px; color:var(--blue); margin-top:5px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h2 style="margin-top:0">Налаштування</h2>
           <p style="word-wrap: break-word;">Email: <strong id="userEmailLabel"></strong></p>
           <button id="notifBtn" class="button primary" style="width:100%; margin-bottom:15px;" onclick="enableNotifications()">🔔 Увімкнути сповіщення</button>
           
           <div id="adminSection" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:20px;">
              <h3 style="color:var(--blue); margin-top:0;">👑 Панель власника</h3>
              <div id="adminStats" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px;"></div>
           </div>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ⚠️ ТВІЙ EMAIL
    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let currentUser = null, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "";
    let editingPostId = null;
    let selectedFocuses = []; // Масив для зберігання обраних фокусів

    const TODAY_DAY = new Date().getDate();

    const META = {
      MOVE: { color: "#2F39F6", emoji: "🏃" },
      MIND: { color: "#7EA765", emoji: "🧠" },
      CREATE: { color: "#E3AED0", emoji: "🎨" },
      SLOW: { color: "#6F87D8", emoji: "🌿" }
    };

    const DEFAULT_HABITS = {
      MOVE: ["10–20 min walk", "Stretching", "Short workout"],
      MIND: ["Journaling", "Reading", "Meditation"],
      CREATE: ["Sketching", "Drawing", "New recipe"],
      SLOW: ["No phone tea", "Early bed", "Self-care"]
    };

    const getEl = id => document.getElementById(id);
    function getMeta(slug) { return META[slug?.toUpperCase()] || { emoji: "📌", color: "#6f7f98" }; }

    // --- Функції Фокусу ---
    function toggleFocusChip(val) {
      const idx = selectedFocuses.indexOf(val);
      if (idx > -1) {
        selectedFocuses.splice(idx, 1);
      } else {
        selectedFocuses.push(val);
      }
      updateFocusUI();
      saveFocus();
    }

    function updateFocusUI() {
      const chips = document.querySelectorAll('.focus-chip');
      chips.forEach(chip => {
        if(selectedFocuses.includes(chip.dataset.val)) {
          chip.classList.add('active');
        } else {
          chip.classList.remove('active');
        }
      });
      renderDashboard(); // Оновлюємо кільця
    }

    function updateFileName() {
      const file = getEl('fileInput').files[0];
      getEl('fileNameDisplay').innerText = file ? file.name : '';
    }

    function togglePassword() {
      const input = getEl('passwordInput');
      const icon = getEl('eyeIcon');
      if (input.type === 'password') { input.type = 'text'; icon.innerText = '🙈'; } 
      else { input.type = 'password'; icon.innerText = '👁️'; }
    }

    async function signUp(){
      try {
        getEl('loginError').innerText = "";
        const email = getEl('emailInput').value.trim();
        const password = getEl('passwordInput').value;
        
        if(!email || !password) return getEl('loginError').innerText = "Введи email та пароль";
        if(password.length < 6) return getEl('loginError').innerText = "Пароль має містити мінімум 6 символів";
        
        const { error } = await sb.auth.signUp({ email, password });
        if(error) throw error;
        alert("Акаунт створено! Тепер натисни 'Увійти'.");
      } catch (err) { getEl('loginError').innerText = err.message; }
    }

    async function signIn(){
      try {
        getEl('loginError').innerText = "";
        getEl('loginBtn').innerText = "Завантаження...";
        
        const email = getEl('emailInput').value.trim();
        const password = getEl('passwordInput').value;
        
        if(!email || !password) throw new Error("Введи email та пароль");

        const { error } = await sb.auth.signInWithPassword({ email, password });
        if(error) throw error;
        
        await bootstrap();
      } catch (err) { 
        getEl('loginError').innerText = err.message; 
        getEl('loginBtn').innerText = "Увійти";
      }
    }

    async function logout(){ 
      await sb.auth.signOut(); 
      location.reload(); 
    }

    async function bootstrap(){
      try {
        const { data } = await sb.auth.getSession();
        currentUser = data.session?.user;
        
        if(!currentUser) {
            getEl('loginBtn').innerText = "Увійти";
            return;
        }

        getEl('authView').classList.add('hidden');
        getEl('appView').classList.remove('hidden');
        getEl('userEmailLabel').innerText = currentUser.email;

        if(currentUser.email === OWNER_EMAIL) {
            getEl('adminSection').classList.remove('hidden');
        }

        await loadCategories();
        await syncHabits();
        await loadCheckIns();
        await loadPosts();
        await loadProfile();
        renderAll();
      } catch (err) { 
        console.error("Bootstrap Error:", err);
        alert("Системна помилка: " + err.message);
        getEl('loginBtn').innerText = "Увійти";
      }
    }

    async function loadProfile() {
      try {
        const { data } = await sb.from('profiles').select('focus_text').eq('id', currentUser.id).single();
        if(data && data.focus_text) {
            selectedFocuses = data.focus_text.split(',').filter(Boolean); // Розбиваємо рядок в масив
            updateFocusUI();
        }
      } catch(e) { console.warn("Профіль не знайдено, ігноруємо."); }
    }

    async function saveFocus() {
      try {
        const focusStr = selectedFocuses.join(','); // Зберігаємо масив як рядок
        await sb.from('profiles').upsert({ id: currentUser.id, focus_text: focusStr });
      } catch(e) { console.error("Помилка збереження фокусу", e); }
    }

    async function loadCategories(){ 
      try {
        const { data } = await sb.from('categories').select('*').order('sort_order'); 
        categories = data || []; 
        if (categories.length > 0 && !selectedSpace) selectedSpace = categories[0].slug;
      } catch(e) { console.error("Помилка категорій", e); }
    }
    
    async function syncHabits(){
      try {
        const { data } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
        if(!data || data.length === 0){
          let ins = [];
          categories.forEach(c => {
            (DEFAULT_HABITS[c.slug?.toUpperCase()] || []).forEach(t => ins.push({ user_id:currentUser.id, category_id:c.id, title:t }));
          });
          if(ins.length > 0) await sb.from('habits').insert(ins);
        }
        const { data: fresh } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
        habits = fresh || [];
      } catch(e) { console.error("Помилка звичок", e); }
    }

    async function loadCheckIns(){ 
      try {
        const { data } = await sb.from('check_ins').select('*').eq('user_id', currentUser.id); 
        checkIns = data || []; 
      } catch(e) { console.error("Помилка відміток", e); }
    }

    async function toggleCheck(habitId, day){
      try {
        const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
        const exist = checkIns.find(c => c.habit_id === habitId && c.check_in_date === dateStr);
        
        if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
        else await sb.from('check_ins').insert({ user_id:currentUser.id, habit_id:habitId, check_in_date:dateStr });
        
        await loadCheckIns(); 
        renderAll();
      } catch(e) { alert("Помилка: " + e.message); }
    }

    async function loadPosts(){ 
      try {
        const { data } = await sb.from('community_posts').select('*').order('created_at', { ascending: true }); 
        posts = data || []; 
        renderCommunity();
      } catch(e) { console.error("Помилка постів", e); }
    }

    function startEdit(id) {
      const post = posts.find(p => p.id === id);
      if(!post) return;
      
      editingPostId = id;
      getEl('postInput').value = post.body || '';
      getEl('sendBtn').innerText = 'Зберегти';
      getEl('cancelEditBtn').classList.remove('hidden');
      getEl('attachWrap').classList.add('hidden');
      getEl('postInput').focus();
    }

    function cancelEdit() {
      editingPostId = null;
      getEl('postInput').value = '';
      getEl('sendBtn').innerText = 'Надіслати';
      getEl('cancelEditBtn').classList.add('hidden');
      getEl('attachWrap').classList.remove('hidden');
    }

    async function createPost(){
      const body = getEl('postInput').value.trim();
      const file = getEl('fileInput').files[0];
      let fileUrl = null;

      if(!body && !file && !editingPostId) return;
      getEl('uploadStatus').innerText = "⏳ Обробка...";

      try {
          if (editingPostId) {
             const { error } = await sb.from('community_posts').update({ body }).eq('id', editingPostId);
             if(error) throw error;
             cancelEdit(); 
          } else {
             if(file){
               const fName = `${currentUser.id}/${Date.now()}_${file.name}`;
               const { error: upErr } = await sb.storage.from('community').upload(fName, file);
               if(upErr) throw new Error("Не вдалося завантажити фото: " + upErr.message);
               fileUrl = sb.storage.from('community').getPublicUrl(fName).data.publicUrl;
             }

             const catId = categories.find(c => c.slug === selectedSpace)?.id;
             const { error } = await sb.from('community_posts').insert({ 
               user_id: currentUser.id, category_id: catId, body, media_url: fileUrl, user_email: currentUser.email 
             });

             if(error) throw error;
             
             getEl('postInput').value = ''; 
             getEl('fileInput').value = ''; 
             getEl('fileNameDisplay').innerText = ''; 
          }
          
          getEl('uploadStatus').innerText = "";
          await loadPosts();
      } catch (e) {
          alert("Помилка: " + e.message); 
          getEl('uploadStatus').innerText = "";
      }
    }

    async function deletePost(id, url) {
        if(!confirm("Видалити цей пост?")) return;
        if(url) {
            const path = url.split('community/')[1];
            await sb.storage.from('community').remove([path]);
        }
        await sb.from('community_posts').delete().eq('id', id);
        await loadPosts();
    }

    function getStreak(){
      const dates = [...new Set(checkIns.map(c => c.check_in_date))].sort().reverse();
      let streak = 0; let checkDate = new Date().toISOString().split('T')[0];
      for(let d of dates){
        if(d === checkDate || d === new Date(Date.now()-86400000).toISOString().split('T')[0]){
          streak++; checkDate = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0];
        } else break;
      }
      return streak;
    }

    function renderAll(){ 
      const sections = document.querySelectorAll('.tracker-section');
      const scrollPositions = Array.from(sections).map(sec => sec.scrollLeft);

      renderDashboard(); renderTracker(); renderCommunity(); renderAdmin(); bindTabs(); 

      const newSections = document.querySelectorAll('.tracker-section');
      newSections.forEach((sec, i) => { if(scrollPositions[i]) sec.scrollLeft = scrollPositions[i]; });
    }

    function renderDashboard(){
      getEl('streakPanel').innerText = `🔥 STREAK: ${getStreak()} DAYS`;
      getEl('activeVal').innerText = [...new Set(checkIns.map(c => c.check_in_date))].length;
      getEl('levelPanel').innerText = `🏆 LEVEL: ${checkIns.length < 20 ? 'Novice 🥚' : checkIns.length < 80 ? 'Apprentice 🌱' : 'Warrior ⚔️'}`;
      
      const totalPossible = habits.length * 31;
      const totalPerc = totalPossible > 0 ? Math.min(100, Math.round((checkIns.length / totalPossible) * 100)) : 0;

      let ringsHtml = `<div class="card ring-card" style="border: 2px solid var(--blue)"><div style="font-weight:800; font-size:14px; color:var(--blue)">🏆 TOTAL PROGRESS</div><div class="ring" style="background: conic-gradient(var(--blue) ${totalPerc*3.6}deg, #dfe3ea 0deg);"><div class="ring-value">${totalPerc}%</div></div></div>`;

      ringsHtml += categories.map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        const done = checkIns.filter(c => catHabits.some(h => h.id === c.habit_id)).length;
        const perc = (catHabits.length * 31) > 0 ? Math.min(100, Math.round((done / (catHabits.length * 31)) * 100)) : 0;
        
        // Підсвітка обраних фокусів
        const isFocused = selectedFocuses.includes(cat.slug);
        const ringStyle = isFocused ? `transform: scale(1.05); box-shadow: 0 0 20px ${cat.color}60; border: 2px solid ${cat.color};` : '';
        const focusBadge = isFocused ? `<span style="font-size:14px;">🎯</span> ` : '';

        return `<div class="card ring-card" style="${ringStyle}"><div style="font-weight:800; font-size:14px;">${focusBadge}${getMeta(cat.slug).emoji} ${cat.slug}</div><div class="ring" style="background: conic-gradient(${cat.color} ${perc*3.6}deg, #dfe3ea 0deg);"><div class="ring-value">${perc}%</div></div></div>`;
      }).join('');
      getEl('ringsWrap').innerHTML = ringsHtml;
    }

    function renderTracker(){
      getEl('trackerWrap').innerHTML = categories.map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        return `<div class="tracker-section"><div class="tracker-head" style="background:${cat.color}"><div style="justify-content:flex-start; padding-left:15px; border-right: 1px solid rgba(255,255,255,0.2);">${getMeta(cat.slug).emoji} ${cat.slug}</div>${Array.from({length:31}, (_,i)=>`<div class="${i+1===TODAY_DAY?'today-cell':''}">${i+1}</div>`).join('')}<div style="border:0">%</div></div>${catHabits.map(h => {
            const hChecks = checkIns.filter(c => c.habit_id === h.id);
            return `<div class="tracker-row"><div style="justify-content:flex-start; padding-left:15px; font-weight:600; border-right: 1px solid #eee;">${h.title}</div>${Array.from({length:31}, (_,i)=>{
                const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), i+2).toISOString().split('T')[0];
                const checked = hChecks.some(c => c.check_in_date === dStr);
                return `<div class="${i+1===TODAY_DAY?'today-cell':''}"><div class="checkbox" style="${checked?`background:${cat.color}; border-color:${cat.color}`:''}" onclick="toggleCheck('${h.id}', ${i+1})"></div></div>`;
              }).join('')}<div style="font-weight:bold; color:${cat.color}; border:0">${Math.round((hChecks.length/31)*100)}%</div></div>`;
          }).join('')}</div>`;
      }).join('');
    }

    function renderCommunity(){
      getEl('spacesWrap').innerHTML = categories.map(cat => {
        return `<button class="space-btn" style="${selectedSpace===cat.slug?`background:${cat.color}; color:#fff`:''}" onclick="selectedSpace='${cat.slug}'; cancelEdit(); renderCommunity();">${getMeta(cat.slug).emoji} ${cat.slug}</button>`;
      }).join('');
      
      const filtered = posts.filter(p => categories.find(c => c.id === p.category_id)?.slug === selectedSpace);
      
      getEl('postsWrap').innerHTML = filtered.map(p => `<div class="msg ${p.user_id===currentUser.id?'own':''}">
        ${p.user_id===currentUser.id ? `
        <div class="action-btns">
          <span class="action-btn" title="Редагувати" onclick="startEdit('${p.id}')">✏️</span>
          <span class="action-btn" title="Видалити" onclick="deletePost('${p.id}','${p.media_url}')">🗑️</span>
        </div>` : ''}
        <div style="font-size:10px; opacity:0.8; margin-bottom:4px;">${p.user_email || 'Member'}</div>
        <div style="white-space: pre-wrap;">${p.body || ''}</div>${p.media_url ? `<img src="${p.media_url}" class="post-img">` : ''}
      </div>`).join('');
      
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
      getEl('communityTitle').innerText = `${getMeta(selectedSpace).emoji} ${selectedSpace} Community`;
    }

    async function renderAdmin() {
        if(!currentUser || currentUser.email !== OWNER_EMAIL) return;
        try {
            const { data: allPosts } = await sb.from('community_posts').select('category_id');
            const stats = {};
            allPosts?.forEach(p => {
                const cat = categories.find(c => c.id === p.category_id);
                if(cat) stats[cat.slug] = (stats[cat.slug] || 0) + 1;
            });
            const adminEl = getEl('adminStats');
            if(adminEl) {
                adminEl.innerHTML = categories.map(cat => `
                    <div class="card" style="padding:15px; text-align:center; border-bottom: 4px solid ${cat.color}">
                        <div style="font-size:12px; color:var(--muted)">${cat.slug} Posts</div>
                        <div style="font-size:20px; font-weight:800">${stats[cat.slug] || 0}</div>
                    </div>`).join('');
            }
        } catch(e) { console.error("Admin stats error:", e); }
    }

    async function enableNotifications(){ 
      if(!("Notification" in window)) {
        return alert("Ваш браузер не підтримує веб-сповіщення.\n\nЯкщо ви на iPhone: натисніть 'Поділитися' ➡️ 'На початковий екран'. Відкрийте додаток з екрана і спробуйте знову!");
      }
      if (Notification.permission === "granted") {
        getEl('notifBtn').innerText = "✅ Сповіщення увімкнені";
        getEl('notifBtn').classList.replace('primary', 'green');
        return alert("Сповіщення вже працюють! Ми нагадаємо тобі про звички.");
      }
      if (Notification.permission === "denied") {
        return alert("❌ Браузер блокує сповіщення.\n\nНатисніть на іконку 🔒 зліва від адреси сайту вгорі екрана, знайдіть 'Сповіщення' і змініть на 'Дозволити'. Потім оновіть сторінку.");
      }
      try {
        const perm = await Notification.requestPermission();
        if(perm === "granted") {
          getEl('notifBtn').innerText = "✅ Сповіщення увімкнені";
          getEl('notifBtn').classList.replace('primary', 'green');
          new Notification("Habit Master Pro", { body: "Супер! Тепер ми на зв'язку 🔥" });
        } else { alert("Ви не надали дозвіл на сповіщення."); }
      } catch (e) { alert("Помилка запиту: " + e.message); }
    }

    function bindTabs(){ 
      document.querySelectorAll('.tab').forEach(t => t.onclick = () => { 
        document.querySelectorAll('.tab, .view').forEach(x => x.classList.remove('active')); 
        t.classList.add('active'); 
        getEl(t.dataset.view).classList.add('active'); 
      }); 
    }
    
    window.addEventListener('DOMContentLoaded', bootstrap);
  </script>
</body>
</html>
