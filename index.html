<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --card: #111111;
      --card-blue: #0024f0;
      --accent-lime: #ccff00;
      --text: #ffffff;
      --muted: #888888;
      --border: #222222;
      --today-bg: rgba(204, 255, 0, 0.1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
    .hidden { display: none !important; }

    /* --- AUTH --- */
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 420px; background: var(--card); border-radius: 24px; padding: 40px; border: 1px solid var(--border); text-align: center; }
    .auth-card h1 { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 30px; }
    
    .input, .textarea { 
      width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; 
      padding: 14px 16px; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; transition: 0.3s;
    }
    .input:focus { border-color: var(--card-blue); }
    .button { border: 0; border-radius: 100px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
    .button.primary { background: var(--accent-lime); color: #000; width: 100%; }
    .button.dark { background: transparent; color: #fff; border: 1px solid var(--border); }
    .button.blue { background: var(--card-blue); color: #fff; }

    /* --- LAYOUT --- */
    .app { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 15px; margin-bottom: 40px; align-items: center; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 22px; font-weight: 800; margin-right: 20px; white-space: nowrap; }
    .tab { color: var(--muted); font-weight: 700; cursor: pointer; padding: 10px 0; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: var(--accent-lime); border-bottom: 2px solid var(--accent-lime); }
    .view { display: none; } .view.active { display: block; }
    .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }

    /* --- DASHBOARD --- */
    .dash-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
    .side-block { padding: 20px; border-radius: 16px; margin-bottom: 12px; font-weight: 800; text-align: center; }
    .focus-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .focus-chip { padding: 8px 16px; border-radius: 100px; background: #1a1a1a; border: 1px solid var(--border); font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted); }
    .focus-chip.active { background: var(--accent-lime); color: #000; border-color: var(--accent-lime); }
    .ring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }

    /* --- TRACKER --- */
    .tracker-box { overflow-x: auto; background: #080808; border-radius: 16px; border: 1px solid var(--border); }
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px) 60px; align-items: center; min-width: 1500px; }
    .tracker-head { height: 45px; background: #111; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
    .tracker-row { height: 55px; border-top: 1px solid #1a1a1a; }
    .tracker-cell { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid #1a1a1a; }
    .habit-title { justify-content: space-between !important; padding: 0 15px; font-weight: 600; color: #fff; font-size: 13px; text-align: left; }
    .square { width: 22px; height: 22px; border: 2px solid #222; border-radius: 5px; cursor: pointer; transition: 0.15s; }
    .square.active { background: var(--card-blue); border-color: var(--card-blue); box-shadow: 0 0 10px var(--card-blue); }
    .today-cell { background: var(--today-bg); }

    /* --- CHAT --- */
    .chat-box { height: 500px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
    .msg { max-width: 80%; padding: 15px; border-radius: 18px; background: #1a1a1a; border: 1px solid var(--border); position: relative; font-size: 14px; }
    .msg.own { align-self: flex-end; background: var(--card-blue); border: 0; }
    .msg-user { font-size: 10px; font-weight: 800; margin-bottom: 5px; opacity: 0.6; display: flex; align-items: center; gap: 6px; }
    .avatar-chat { width: 20px; height: 20px; border-radius: 50%; background: #333; }
    .space-btn { padding: 10px 18px; border-radius: 100px; font-size: 12px; font-weight: 700; cursor: pointer; background: #111; border: 1px solid var(--border); color: var(--muted); margin-right: 8px; white-space: nowrap; transition: 0.2s; }
    .space-btn.active { background: var(--card-blue); color: #fff; border-color: var(--card-blue); }

    @media (max-width: 768px) { .dash-grid { grid-template-columns: 1fr; } .tracker-row, .tracker-head { grid-template-columns: 150px repeat(31, 40px) 60px; } }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1>EK Habit Tracker</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <div style="position: relative;">
        <input id="passwordInput" class="input" type="password" placeholder="Пароль (мін. 6 символів)" />
        <span onclick="togglePassword()" style="position:absolute; right:15px; top:13px; cursor:pointer; font-size:18px; opacity:0.5;">👁️</span>
      </div>
      <div id="loginError" style="color:#ff4444; font-size:12px; margin-bottom:15px; min-height:15px;"></div>
      <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="signUp()">Створити</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div class="nav-logo">EK Habit Tracker</div>
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="supportView">Support</div>
      <div class="tab" data-view="settingsView">Profile</div>
      <button class="button dark" style="margin-left:auto; padding:8px 15px; font-size:11px;" onclick="logout()">Вихід</button>
    </nav>

    <div id="dashboardView" class="view active">
      <div class="dash-grid">
        <div>
          <div id="streakPanel" class="side-block" style="background: var(--card-blue);">🔥 0 DAYS STREAK</div>
          <div id="levelPanel" class="side-block" style="background: var(--accent-lime); color:#000;">🏆 NOVICE LEVEL 🥚</div>
          <div class="card" style="text-align: center;">
            <div style="color:var(--muted); font-size:10px; text-transform:uppercase; font-weight:800; letter-spacing:1px; margin-bottom:8px;">Active Days</div>
            <div id="activeVal" style="font-size:48px; font-weight:800;">0</div>
          </div>
          <div class="card">
            <div style="font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase;">Target Focus</div>
            <div class="focus-chips">
              <div class="focus-chip" data-val="MOVE" onclick="toggleFocus('MOVE')">🏃 MOVE</div>
              <div class="focus-chip" data-val="MIND" onclick="toggleFocus('MIND')">🧠 MIND</div>
              <div class="focus-chip" data-val="CREATE" onclick="toggleFocus('CREATE')">🎨 CREATE</div>
              <div class="focus-chip" data-val="SLOW" onclick="toggleFocus('SLOW')">🌿 SLOW</div>
            </div>
          </div>
        </div>
        <div class="card">
          <div id="ringsWrap" class="ring-grid"></div>
        </div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="card">
        <div id="spacesWrap" style="display:flex; overflow-x:auto; margin-bottom:20px; padding-bottom:10px;"></div>
        <div id="postsWrap" class="chat-box"></div>
        <div style="margin-top:20px; display:flex; gap:12px; align-items:center;">
          <label class="button dark" style="padding:12px;">📎<input type="file" id="postFile" class="hidden" onchange="getEl('fileStat').innerText = this.files[0].name"></label>
          <textarea id="postInput" class="textarea" style="margin:0; height:50px; padding-top:14px;" placeholder="Що у вас нового?"></textarea>
          <button class="button blue" style="width:100px; margin:0;" onclick="sendPost()">Надіслати</button>
        </div>
        <div id="fileStat" style="font-size:10px; color:var(--accent-lime); margin-top:5px;"></div>
      </div>
    </div>

    <div id="supportView" class="view">
      <div class="card" style="max-width: 650px; margin: 0 auto;">
        <h2 style="margin-top:0">Support</h2>
        <textarea id="supportMsg" class="textarea" placeholder="Напишіть своє запитання..."></textarea>
        <button class="button primary" onclick="sendSupport()">Відправити</button>
        <div id="adminPanel" class="hidden" style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px;">
          <h3 style="color:var(--accent-lime); font-size:14px;">👑 Адмін-панель (Тікети)</h3>
          <div id="adminTickets" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
      <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <div style="position: relative; width: 110px; height: 110px; margin: 0 auto 25px;">
          <img id="profileAvatar" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:2px solid var(--card-blue); background:#111;" src="https://ui-avatars.com/api/?name=EK">
          <label style="position:absolute; bottom:0; right:0; background:var(--card-blue); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:3px solid var(--bg);">
            📷<input type="file" class="hidden" id="avatarFile" onchange="uploadAvatar()">
          </label>
        </div>
        <input id="profileName" class="input" style="text-align:center;" placeholder="Ваше ім'я" onchange="saveProfileName()">
        <p style="color: var(--muted); font-size: 13px;" id="userEmailLabel"></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let user = null, habits = [], checks = [], posts = [], profile = {}, curSpace = "GENERAL", focuses = [];
    const cats = [
      { id: 'MOVE', color: '#0024f0', emoji: '🏃' },
      { id: 'MIND', color: '#10b981', emoji: '🧠' },
      { id: 'CREATE', color: '#f43f5e', emoji: '🎨' },
      { id: 'SLOW', color: '#8b5cf6', emoji: '🌿' }
    ];

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user; if(!user) return;
      getEl('authView').classList.add('hidden');
      getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = user.email;
      if(user.email === OWNER_EMAIL) { getEl('adminPanel').classList.remove('hidden'); loadTickets(); }
      await refreshData();
    }

    async function refreshData() {
      const [h, c, pr, po] = await Promise.all([
        sb.from('habits').select('*').eq('user_id', user.id),
        sb.from('check_ins').select('*').eq('user_id', user.id),
        sb.from('profiles').select('*').eq('id', user.id).single(),
        sb.from('community_posts').select('*').order('created_at')
      ]);
      habits = h.data || []; checks = c.data || []; profile = pr.data || {}; posts = po.data || [];
      focuses = (profile.focus_text || "").split(',').filter(Boolean);
      
      if(habits.length === 0) {
        await sb.from('habits').insert(cats.map(cat => ({user_id:user.id, title:`Daily ${cat.id}`, category_id:cat.id})));
        return refreshData();
      }
      renderAll();
    }

    // --- TRACKER LOGIC ---
    async function toggleCheck(hId, day) {
      const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), day).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === hId && c.check_in_date === dStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({user_id:user.id, habit_id:hId, check_in_date:dStr});
      await refreshData();
    }

    async function addHabit(catId) {
      const t = prompt("Назва нової звички:");
      if(t) { await sb.from('habits').insert({user_id:user.id, title:t, category_id:catId}); await refreshData(); }
    }

    async function deleteHabit(id) { if(confirm("Видалити?")) { await sb.from('habits').delete().eq('id', id); await refreshData(); } }

    async function toggleFocus(id) {
      const idx = focuses.indexOf(id);
      if(idx > -1) focuses.splice(idx, 1); else focuses.push(id);
      await sb.from('profiles').upsert({ id: user.id, focus_text: focuses.join(',') });
      renderAll();
    }

    // --- COMMUNITY & SUPPORT ---
    async function sendPost() {
      const b = getEl('postInput').value.trim(); const file = getEl('postFile').files[0];
      if(!b && !file) return;
      let url = null;
      if(file) {
        const path = `${user.id}/c_${Date.now()}.png`;
        await sb.storage.from('community').upload(path, file);
        url = sb.storage.from('community').getPublicUrl(path).data.publicUrl;
      }
      await sb.from('community_posts').insert({
        user_id: user.id, body: b, space: curSpace, media_url: url, user_email: profile.username || user.email
      });
      getEl('postInput').value = ""; getEl('postFile').value = ""; getEl('fileStat').innerText = "";
      await refreshData();
    }

    function setSpace(s) { curSpace = s; document.querySelectorAll('.space-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(s))); renderChat(); }

    async function sendSupport() {
      const m = getEl('supportMsg').value; if(!m) return;
      await sb.from('support_tickets').insert({user_id:user.id, user_email:user.email, message:m});
      alert("Відправлено!"); getEl('supportMsg').value = "";
    }

    async function loadTickets() {
      const { data } = await sb.from('support_tickets').select('*').order('created_at', {ascending:false});
      getEl('adminTickets').innerHTML = (data || []).map(t => `<div class="msg" style="font-size:12px;"><b>${t.user_email}</b>: ${t.message}</div>`).join('');
    }

    // --- PROFILE ---
    async function uploadAvatar() {
      const file = getEl('avatarFile').files[0];
      const path = `${user.id}/av_${Date.now()}.png`;
      await sb.storage.from('avatars').upload(path, file);
      const url = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
      await sb.from('profiles').upsert({ id: user.id, avatar_url: url });
      refreshData();
    }
    async function saveProfileName() { await sb.from('profiles').upsert({ id: user.id, username: getEl('profileName').value }); }

    // --- RENDERERS ---
    function renderAll() {
      const streak = calculateStreak();
      getEl('streakPanel').innerText = `🔥 ${streak} DAYS STREAK`;
      getEl('levelPanel').innerText = streak > 10 ? '🏆 WARRIOR LEVEL' : '🏆 NOVICE LEVEL 🥚';
      getEl('activeVal').innerText = [...new Set(checks.map(c => c.check_in_date))].length;
      
      const today = new Date().getDate();
      document.querySelectorAll('.focus-chip').forEach(c => c.classList.toggle('active', focuses.includes(c.dataset.val)));

      getEl('ringsWrap').innerHTML = cats.map(cat => {
        const catHabits = habits.filter(h => h.category_id === cat.id);
        const done = checks.filter(c => catHabits.some(h => h.id === c.habit_id)).length;
        const perc = catHabits.length ? Math.round((done / (catHabits.length * 31)) * 100) : 0;
        const isFoc = focuses.includes(cat.id);
        return `<div class="card" style="text-align:center; padding:15px; ${isFoc?'border-color:var(--accent-lime)':''}"><div style="width:60px; height:60px; border-radius:50%; margin:0 auto 10px; background:conic-gradient(${cat.color} ${perc*3.6}deg, #222 0deg); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">${perc}%</div><div style="font-size:10px; font-weight:800; color:var(--muted)">${cat.id}</div></div>`;
      }).join('');

      getEl('trackerWrap').innerHTML = cats.map(cat => {
        const catH = habits.filter(h => h.category_id === cat.id);
        return `<div style="margin-bottom:35px;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><span style="font-weight:800; font-size:20px; color:${cat.color}">${cat.emoji} ${cat.id}</span><button class="button dark" style="padding:6px 12px; font-size:11px;" onclick="addHabit('${cat.id}')">+ ADD</button></div><div class="tracker-box"><div class="tracker-head"><div class="habit-title">Habit</div>${Array.from({length:31}, (_,i)=>`<div class="${i+1===today?'today-cell':''}">${i+1}</div>`).join('')}<div>%</div></div>${catH.map(h => {
          const hChecks = checks.filter(c => c.habit_id === h.id);
          return `<div class="tracker-row"><div class="tracker-cell habit-title">${h.title} <span style="opacity:0.2; cursor:pointer;" onclick="deleteHabit('${h.id}')">✕</span></div>${Array.from({length:31}, (_, i) => {
            const active = hChecks.some(c => new Date(c.check_in_date).getDate() === i+1);
            return `<div class="tracker-cell ${i+1===today?'today-cell':''}"><div class="square ${active?'active':''}" onclick="toggleCheck('${h.id}',${i+1})"></div></div>`;
          }).join('')}<div class="tracker-cell" style="font-weight:800; color:${cat.color}">${Math.round((hChecks.length/31)*100)}%</div></div>`;
        }).join('')}</div></div>`;
      }).join('');

      let spHtml = `<button class="space-btn ${curSpace==='GENERAL'?'active':''}" onclick="setSpace('GENERAL')">💬 GENERAL</button>`;
      cats.forEach(c => spHtml += `<button class="space-btn ${curSpace===c.id?'active':''}" onclick="setSpace('${c.id}')">${c.emoji} ${c.id}</button>`);
      getEl('spacesWrap').innerHTML = spHtml;
      renderChat();
      if(profile.avatar_url) getEl('profileAvatar').src = profile.avatar_url;
      getEl('profileName').value = profile.username || "";
    }

    function renderChat() {
      const filtered = posts.filter(p => (p.space || 'GENERAL') === curSpace);
      getEl('postsWrap').innerHTML = filtered.map(p => `<div class="msg ${p.user_id===user.id?'own':''}"><div class="msg-user"><img class="avatar-chat" src="https://ui-avatars.com/api/?name=${p.user_email}"><span>${p.user_email}</span></div><div>${p.body}</div>${p.media_url ? `<img src="${p.media_url}" style="width:100%; border-radius:12px; margin-top:10px;">` : ''}</div>`).join('');
      getEl('postsWrap').scrollTop = 9999;
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date().toISOString().split('T')[0];
      for(let d of dates) { if(d === now || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) { s++; now = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    async function signIn() { const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value }); if(!error) bootstrap(); else getEl('loginError').innerText = error.message; }
    async function signUp() { const { error } = await sb.auth.signUp({ email: getEl('emailInput').value, password: getEl('passwordInput').value }); if(!error) alert("Check email!"); else getEl('loginError').innerText = error.message; }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    function togglePassword() { const i = getEl('passwordInput'); i.type = i.type==='password'?'text':'password'; }
    const getEl = id => document.getElementById(id);

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active'); getEl(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
