<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Habit Master Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb; --card:#ffffff; --text:#1b2433; --muted:#6f7f98; --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08); --blue:#2f39f6; --green:#8bb26a;
      --pink:#ba81a7; --move:#2f39f6; --mind:#7ea765; --create:#e3aed0; --slow:#6f87d8;
      --today:#f3e39c; --dark:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text);}
    .hidden{display:none !important}
    
    /* Auth */
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
    .auth-card{width:100%; max-width:500px; background:#f7f8fc; border-radius:28px; padding:32px; box-shadow:var(--shadow); text-align:center;}
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:14px; padding:14px 16px; font-size:16px; background:#fff; font-family: inherit;}
    .button{border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer; transition:0.2s;}
    .button.primary{background:var(--blue);color:#fff}
    .button.green{background:var(--green);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    
    /* Layout */
    .app{max-width:1480px; margin:0 auto; padding:20px;}
    .topbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;}
    .tab{background:rgba(255,255,255,.72); border:1px solid var(--border); border-radius:16px; padding:14px 18px; text-align:center; cursor:pointer; font-weight:600; flex-grow:1;}
    .tab.active{background:#fff; font-weight:800; border-color: var(--blue);}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; margin-bottom:20px;}
    
    /* Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
    #ringsWrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .ring-card{min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center;}
    .ring{width:110px; height:110px; border-radius:50%; position:relative; border:1px solid #d2d9e4;}
    .ring::after{content:""; position:absolute; inset:12px; background:#fff; border-radius:50%;}
    .ring-value{font-size:22px; font-weight:800; position:absolute; z-index:10; top:50%; left:50%; transform:translate(-50%, -50%);}
    .side-block{color:#fff; min-height:75px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; font-size:17px; font-weight:700; border-radius:22px; margin-bottom:12px;}
    .focus-input { background: rgba(255,255,255,0.2); border: 0; color: #fff; width: 100%; border-radius: 10px; padding: 8px 10px; font-family: inherit; font-size: 16px; text-align: center; font-weight: 800;}

    /* Tracker */
    .tracker-section{overflow-x:auto; margin-bottom:25px; background:#fff; border-radius:20px; border:1px solid var(--border); padding-bottom:5px; -webkit-overflow-scrolling: touch;}
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px) 70px; align-items: center; min-width: 1510px; }
    .tracker-head { color:#fff; font-size:12px; font-weight:700; height:45px; background: #333;}
    .tracker-row { border-bottom: 1px solid #f0f0f0; height:50px; font-size:14px; }
    .tracker-head > div, .tracker-row > div { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid rgba(0,0,0,0.03); }
    .today-cell { background: var(--today) !important; color: #000; font-weight: 800;}
    .checkbox{width:22px; height:22px; border:2px solid #cbd5e1; border-radius:7px; cursor:pointer;}

    /* Community Chat */
    .community-layout{display:grid; grid-template-columns: 280px 1fr; gap:20px; align-items: start;}
    .spaces-sidebar { display: flex; flex-direction: column; gap: 10px; }
    .space-btn{width:100%; border:1px solid var(--border); border-radius:18px; padding:16px; text-align:left; font-size:16px; font-weight:700; cursor:pointer; background:#fff; box-shadow: var(--shadow); transition: 0.2s;}
    .chat-box { height: 500px; overflow-y: auto; background: #f8fbff; border-radius: 22px; padding: 20px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
    .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; background: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.04); color: var(--text); position: relative;}
    .msg.own { align-self: flex-end; background: var(--blue); color: #fff; }
    .post-img { max-width: 100%; border-radius: 14px; margin-top: 10px; display: block; }
    .del-btn { position: absolute; top: 10px; right: 10px; cursor: pointer; opacity: 0.5; font-size: 14px; }
    .del-btn:hover { opacity: 1; color: red; }

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      #ringsWrap { grid-template-columns: repeat(2, 1fr); }
      .community-layout { grid-template-columns: 1fr; }
      .spaces-sidebar { flex-direction: row; overflow-x: auto; }
      .space-btn { min-width: 130px; }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 style="margin:0 0 10px 0;">🔥 EK Habit Tracker</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" style="margin-bottom:12px;"/>
      <input id="passwordInput" class="input" type="password" placeholder="Пароль" />
      <div id="loginError" style="color:red; font-size:12px; margin-top:5px;"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
        <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
        <button class="button green" onclick="signUp()">Створити</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div class="dashboard-grid">
         <div>
            <div id="levelPanel" class="side-block" style="background:var(--green)">🏆 LEVEL: Novice 🥚</div>
            <div id="streakPanel" class="side-block" style="background:#ff9800">🔥 STREAK: 0 DAYS</div>
            <div id="motivationPanel" class="side-block" style="background:var(--blue)">✨ Nice start!</div>
            <div class="card" style="text-align:center">
              <div style="color:var(--muted); font-size:14px;">Active Days</div>
              <div id="activeVal" style="font-size:32px; font-weight:800">0</div>
            </div>
            <div class="card" style="background:var(--pink); color:#fff; padding: 20px 15px; border-radius: 22px; text-align:center;">
              <div style="font-size: 12px; margin-bottom: 5px; opacity: 0.9;">🎯 YOUR FOCUS:</div>
              <input id="focusInput" class="focus-input" placeholder="write your goal..." onchange="saveFocus()">
              <hr style="border:0; border-top:1px solid rgba(255,255,255,0.3); margin:15px 0;">
              <div style="font-size: 14px; font-weight:800;">🎁 REWARD: merch</div>
            </div>
         </div>
         <div id="ringsWrap"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout">
        <div id="spacesWrap" class="spaces-sidebar"></div>
        <div>
          <div class="card" style="margin-bottom:15px;">
            <h3 id="communityTitle" style="margin:0 0 15px 0;">Community</h3>
            <div id="postsWrap" class="chat-box"></div>
            <div style="margin-top:15px; display:flex; gap:10px;">
              <label class="button dark" style="padding:14px; cursor:pointer;">📎<input type="file" id="fileInput" class="hidden"></label>
              <textarea id="postInput" class="textarea" style="min-height:54px;" placeholder="Поділися успіхом..."></textarea>
              <button class="button primary" onclick="createPost()">Надіслати</button>
            </div>
            <div id="uploadStatus" style="font-size:12px; color:var(--blue); margin-top:5px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h2>Налаштування</h2>
           <p>Email: <strong id="userEmailLabel"></strong></p>
           <button class="button primary" onclick="enableNotifications()">🔔 Увімкнути сповіщення</button>
           <div id="adminSection" class="hidden" style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
              <h3 style="color:var(--blue)">👑 Панель власника</h3>
              <div id="adminStats" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:10px;"></div>
           </div>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gamil.com"; 

    let currentUser = null, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "";
    const TODAY_DAY = new Date().getDate();

    const META = { MOVE: { color: "#2F39F6", emoji: "🏃" }, MIND: { color: "#7EA765", emoji: "🧠" }, CREATE: { color: "#E3AED0", emoji: "🎨" }, SLOW: { color: "#6F87D8", emoji: "🌿" } };
    const DEFAULT_HABITS = { MOVE: ["10–20 min walk", "Stretching", "Short workout"], MIND: ["Journaling", "Reading", "Meditation"], CREATE: ["Sketching", "Drawing", "New recipe"], SLOW: ["No phone tea", "Early bed", "Self-care"] };

    const getEl = id => document.getElementById(id);
    function getMeta(slug) { return META[slug?.toUpperCase()] || { emoji: "📌", color: "#6f7f98" }; }

    async function signUp(){
      const email = getEl('emailInput').value.trim();
      const password = getEl('passwordInput').value;
      const { error } = await sb.auth.signUp({ email, password });
      if(error) getEl('loginError').innerText = error.message; else alert("Підтвердіть пошту та увійдіть!");
    }
    async function signIn(){
      getEl('loginBtn').innerText = "⏳...";
      const email = getEl('emailInput').value.trim();
      const password = getEl('passwordInput').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) { getEl('loginError').innerText = error.message; getEl('loginBtn').innerText = "Увійти"; } else bootstrap();
    }
    function logout(){ sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      const { data } = await sb.auth.getSession();
      currentUser = data.session?.user;
      if(!currentUser) return;
      getEl('authView').classList.add('hidden');
      getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = currentUser.email;
      if(currentUser.email === OWNER_EMAIL) getEl('adminSection').classList.remove('hidden');
      await loadCategories();
      await syncHabits();
      await loadCheckIns();
      await loadPosts();
      await loadProfile();
      renderAll();
    }

    async function loadProfile() {
      const { data } = await sb.from('profiles').select('focus_text').eq('id', currentUser.id).single();
      if(data) getEl('focusInput').value = data.focus_text || '';
    }
    async function saveFocus() {
      await sb.from('profiles').upsert({ id: currentUser.id, focus_text: getEl('focusInput').value });
    }

    async function loadCategories(){ const { data } = await sb.from('categories').select('*').order('sort_order'); categories = data || []; if(categories.length && !selectedSpace) selectedSpace = categories[0].slug; }
    
    async function syncHabits(){
      const { data } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      if(!data?.length){
        let ins = [];
        categories.forEach(c => (DEFAULT_HABITS[c.slug?.toUpperCase()] || []).forEach(t => ins.push({ user_id:currentUser.id, category_id:c.id, title:t })));
        if(ins.length) await sb.from('habits').insert(ins);
      }
      const { data: fresh } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      habits = fresh || [];
    }

    async function loadCheckIns(){ const { data } = await sb.from('check_ins').select('*').eq('user_id', currentUser.id); checkIns = data || []; }
    async function loadPosts(){ const { data } = await sb.from('community_posts').select('*').order('created_at', { ascending: true }); posts = data || []; renderCommunity(); }

    async function toggleCheck(habitId, day){
      const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
      const exist = checkIns.find(c => c.habit_id === habitId && c.check_in_date === dateStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({ user_id:currentUser.id, habit_id:habitId, check_in_date:dateStr });
      await loadCheckIns(); renderAll();
    }

    async function createPost(){
      const body = getEl('postInput').value.trim();
      const file = getEl('fileInput').files[0];
      let fileUrl = null;
      if(!body && !file) return;
      getEl('uploadStatus').innerText = "⏳...";
      if(file){
        const fName = `${currentUser.id}/${Date.now()}_${file.name}`;
        const { error: upErr } = await sb.storage.from('community').upload(fName, file);
        if(!upErr) fileUrl = sb.storage.from('community').getPublicUrl(fName).data.publicUrl;
      }
      const catId = categories.find(c => c.slug === selectedSpace)?.id;
      await sb.from('community_posts').insert({ user_id: currentUser.id, category_id: catId, body, media_url: fileUrl, user_email: currentUser.email });
      getEl('postInput').value = ''; getEl('fileInput').value = ''; getEl('uploadStatus').innerText = "";
      await loadPosts();
    }

    async function deletePost(id, url) {
        if(!confirm("Видалити цей пост?")) return;
        if(url) {
            const path = url.split('community/')[1];
            await sb.storage.from('community').remove([path]);
        }
        await sb.from('community_posts').delete().eq('id', id);
        await loadPosts();
    }

    function getStreak() {
        const dates = [...new Set(checkIns.map(c => c.check_in_date))].sort();
        if(!dates.length) return 0;
        let streak = 0;
        let check = new Date();
        const fmt = d => d.toISOString().split('T')[0];
        let today = fmt(check);
        check.setDate(check.getDate() - 1);
        let yesterday = fmt(check);
        if(!dates.includes(today) && !dates.includes(yesterday)) return 0;
        let curr = dates.includes(today) ? today : yesterday;
        let idx = dates.indexOf(curr);
        for(let i = idx; i >= 0; i--) {
            if(i === idx) { streak = 1; }
            else {
                let d1 = new Date(dates[i+1]); d1.setDate(d1.getDate()-1);
                if(dates[i] === fmt(d1)) streak++; else break;
            }
        }
        return streak;
    }

    function renderAll(){ renderDashboard(); renderTracker(); renderCommunity(); renderAdmin(); bindTabs(); }

    function renderDashboard(){
      const streak = getStreak();
      getEl('streakPanel').innerText = `🔥 STREAK: ${streak} DAYS`;
      getEl('activeVal').innerText = [...new Set(checkIns.map(c => c.check_in_date))].length;
      getEl('levelPanel').innerText = `🏆 LEVEL: ${checkIns.length < 20 ? 'Novice 🥚' : 'Warrior ⚔️'}`;
      const totalPerc = habits.length ? Math.min(100, Math.round((checkIns.length / (habits.length * 31)) * 100)) : 0;
      let html = `<div class="card ring-card" style="border: 2px solid var(--blue)"><div style="font-weight:800; font-size:14px; color:var(--blue)">🏆 TOTAL</div><div class="ring" style="background: conic-gradient(var(--blue) ${totalPerc*3.6}deg, #dfe3ea 0deg);"><div class="ring-value">${totalPerc}%</div></div></div>`;
      html += categories.map(cat => {
        const hbits = habits.filter(h => h.category_id === cat.id);
        const done = checkIns.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.min(100, Math.round((done / (hbits.length * 31)) * 100)) : 0;
        return `<div class="card ring-card"><div style="font-weight:800; font-size:14px;">${getMeta(cat.slug).emoji} ${cat.slug}</div><div class="ring" style="background: conic-gradient(${cat.color} ${perc*3.6}deg, #dfe3ea 0deg);"><div class="ring-value">${perc}%</div></div></div>`;
      }).join('');
      getEl('ringsWrap').innerHTML = html;
    }

    function renderTracker(){
      getEl('trackerWrap').innerHTML = categories.map(cat => {
        const hbits = habits.filter(h => h.category_id === cat.id);
        return `<div class="tracker-section">
          <div class="tracker-head" style="background:${cat.color}"><div style="justify-content:flex-start; padding-left:15px;">${getMeta(cat.slug).emoji} ${cat.slug}</div>${Array.from({length:31}, (_,i)=>`<div class="${i+1===TODAY_DAY?'today-cell':''}">${i+1}</div>`).join('')}<div>%</div></div>
          ${hbits.map(h => {
            const hChecks = checkIns.filter(c => c.habit_id === h.id);
            return `<div class="tracker-row"><div style="justify-content:flex-start; padding-left:15px; font-weight:600;">${h.title}</div>${Array.from({length:31}, (_,i)=>{
                const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), i+2).toISOString().split('T')[0];
                return `<div class="${i+1===TODAY_DAY?'today-cell':''}"><div class="checkbox" style="${hChecks.some(c=>c.check_in_date===dStr)?`background:${cat.color}; border-color:${cat.color}`:''}" onclick="toggleCheck('${h.id}', ${i+1})"></div></div>`;
            }).join('')}<div style="font-weight:bold; color:${cat.color}">${Math.round((hChecks.length/31)*100)}%</div></div>`;
          }).join('')}</div>`;
      }).join('');
    }

    function renderCommunity(){
      getEl('spacesWrap').innerHTML = categories.map(cat => `<button class="space-btn" style="${selectedSpace===cat.slug?`background:${cat.color}; color:#fff`:''}" onclick="selectedSpace='${cat.slug}'; renderCommunity();">${getMeta(cat.slug).emoji} ${cat.slug}</button>`).join('');
      const filtered = posts.filter(p => categories.find(c => c.id === p.category_id)?.slug === selectedSpace);
      getEl('postsWrap').innerHTML = filtered.map(p => `<div class="msg ${p.user_id===currentUser.id?'own':''}">
        ${p.user_id===currentUser.id?`<span class="del-btn" onclick="deletePost('${p.id}','${p.media_url}')">🗑️</span>`:''}
        <div style="font-size:10px; opacity:0.8; margin-bottom:4px;">${p.user_email || 'Member'}</div>
        <div>${p.body || ''}</div>${p.media_url ? `<img src="${p.media_url}" class="post-img">` : ''}
      </div>`).join('');
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
      getEl('communityTitle').innerText = `${getMeta(selectedSpace).emoji} ${selectedSpace} Community`;
    }

    async function renderAdmin() {
        if(currentUser?.email !== OWNER_EMAIL) return;
        const { data } = await sb.from('community_posts').select('category_id');
        const stats = {}; data?.forEach(p => { const cat = categories.find(c => c.id === p.category_id); if(cat) stats[cat.slug] = (stats[cat.slug] || 0) + 1; });
        getEl('adminStats').innerHTML = categories.map(cat => `<div class="card" style="padding:10px; text-align:center; border-bottom: 3px solid ${cat.color}"><div style="font-size:10px; color:var(--muted)">${cat.slug}</div><div style="font-size:18px; font-weight:800">${stats[cat.slug] || 0}</div></div>`).join('');
    }

    function enableNotifications(){ Notification.requestPermission(); }
    function bindTabs(){ document.querySelectorAll('.tab').forEach(t => t.onclick = () => { document.querySelectorAll('.tab, .view').forEach(x => x.classList.remove('active')); t.classList.add('active'); getEl(t.dataset.view).classList.add('active'); }); }
    bootstrap();
  </script>
</body>
</html>
