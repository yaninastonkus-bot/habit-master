<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb; --card:#ffffff; --text:#1b2433; --muted:#6f7f98; --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08); --blue:#2f39f6; --green:#8bb26a;
      --pink:#ba81a7; --move:#2f39f6; --mind:#7ea765; --create:#e3aed0; --slow:#6f87d8;
      --today:#f3e39c; --dark:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text);}
    .hidden{display:none !important}
    
    /* Auth */
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
    .auth-card{width:100%; max-width:500px; background:#f7f8fc; border-radius:28px; padding:32px; box-shadow:var(--shadow); text-align:center;}
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:14px; padding:12px 16px; font-size:16px; background:#fff; font-family: inherit; outline:none;}
    .button{border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer; transition:0.2s;}
    .button:active{transform:scale(0.98);}
    .button.primary{background:var(--blue);color:#fff}
    .button.green{background:var(--green);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    
    /* Layout */
    .app{max-width:1480px; margin:0 auto; padding:20px;}
    .topbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;}
    .tab{background:rgba(255,255,255,.72); border:1px solid var(--border); border-radius:16px; padding:14px 18px; text-align:center; cursor:pointer; font-weight:600; flex-grow:1;}
    .tab.active{background:#fff; font-weight:800; border-color: var(--blue);}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; margin-bottom:20px;}
    
    /* Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
    #ringsWrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .ring-card{min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; transition:0.3s;}
    .ring{width:110px; height:110px; border-radius:50%; position:relative; border:1px solid #d2d9e4;}
    .ring::after{content:""; position:absolute; inset:12px; background:#fff; border-radius:50%;}
    .ring-value{font-size:22px; font-weight:800; position:absolute; z-index:10; top:50%; left:50%; transform:translate(-50%, -50%);}
    .side-block{color:#fff; min-height:75px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; font-size:17px; font-weight:700; border-radius:22px; margin-bottom:12px;}
    
    /* Profiles & Avatars */
    .avatar-circle { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #eee; }
    .avatar-large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #eee; margin-bottom: 10px; border: 3px solid #fff; box-shadow: var(--shadow); }
    
    /* Mentions */
    .mention { color: #fff; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 6px; font-weight: 800; }
    .msg.own .mention { background: rgba(255,255,255,0.3); }

    /* Community */
    .chat-box { height: 500px; overflow-y: auto; background: #f8fbff; border-radius: 22px; padding: 20px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border); }
    .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; background: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.04); position: relative; }
    .msg.own { align-self: flex-end; background: var(--blue); color: #fff; }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
    .msg-user { font-size: 13px; font-weight: 800; }
    
    /* Tracker */
    .tracker-section{overflow-x:auto; margin-bottom:25px; background:#fff; border-radius:20px; border:1px solid var(--border); padding-bottom:5px; -webkit-overflow-scrolling: touch;}
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px) 70px; align-items: center; min-width: 1510px; }
    .tracker-head { color:#fff; font-size:12px; font-weight:700; height:45px; background: #333;}
    .tracker-row { border-bottom: 1px solid #f0f0f0; height:50px; font-size:14px; }
    .checkbox{width:22px; height:22px; border:2px solid #cbd5e1; border-radius:7px; cursor:pointer;}

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      #ringsWrap { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .chat-box { height: 400px; }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1>🔥 EK Habit Tracker</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" style="margin-bottom:12px;"/>
      <div style="position: relative; margin-bottom: 12px;">
        <input id="passwordInput" class="input" type="password" placeholder="Пароль (мін. 6 символів)" style="padding-right: 40px;" />
        <div id="eyeIcon" onclick="togglePassword()" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6;">👁️</div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
        <button class="button green" onclick="signUp()">Створити</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="settingsView" class="view">
       <div class="card" style="text-align:center;">
           <h2>Мій Профіль</h2>
           <div style="margin-bottom:20px;">
              <img id="myAvatar" class="avatar-large" src="">
              <br>
              <label class="button dark" style="padding:10px 15px; font-size:12px; cursor:pointer;">
                Змінити фото 📷 <input type="file" id="avatarInput" class="hidden" onchange="uploadAvatar()">
              </label>
           </div>
           <div style="max-width:300px; margin:0 auto;">
              <p style="text-align:left; font-size:14px; font-weight:700; margin-bottom:5px;">Твоє Ім'я (нікнейм):</p>
              <input id="usernameInput" class="input" placeholder="Наприклад: Інна" style="margin-bottom:15px;">
              <button class="button green" style="width:100%" onclick="saveProfileData()">Зберегти зміни</button>
           </div>
           <hr style="margin:30px 0; border:0; border-top:1px solid #eee;">
           <p style="color:var(--muted)">Email: <span id="userEmailLabel"></span></p>
       </div>
    </div>

    <div id="dashboardView" class="view active">
       <div class="dashboard-grid">
         <div>
            <div id="levelPanel" class="side-block" style="background:var(--green)">🏆 LEVEL: Novice 🥚</div>
            <div id="streakPanel" class="side-block" style="background:#ff9800">🔥 STREAK: 0 DAYS</div>
            <div class="card" style="text-align:center; padding:15px;">
              <div style="color:var(--muted); font-size:12px;">Active Days</div>
              <div id="activeVal" style="font-size:28px; font-weight:800">0</div>
            </div>
         </div>
         <div id="ringsWrap"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="card">
        <div id="spacesWrap" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto;"></div>
        <div id="postsWrap" class="chat-box"></div>
        <div style="margin-top:15px; display:flex; gap:10px; align-items:center;">
          <textarea id="postInput" class="textarea" style="min-height:50px; flex-grow:1;" placeholder="Напиши повідомлення (використовуй @ для тегу)..."></textarea>
          <button class="button primary" onclick="createPost()">Надіслати</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null, profile = {}, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "";

    const getEl = id => document.getElementById(id);

    async function signIn(){
      const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(error) alert(error.message); else bootstrap();
    }
    async function logout(){ await sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      const { data } = await sb.auth.getSession();
      currentUser = data.session?.user; if(!currentUser) return;
      getEl('authView').classList.add('hidden'); getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = currentUser.email;
      
      await loadProfile();
      await loadCategories();
      await loadPosts();
      await loadHabitsAndChecks();
      renderAll();
    }

    // --- ПРОФІЛЬ ---
    async function loadProfile(){
      const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      if(data){
        profile = data;
        getEl('usernameInput').value = data.username || "";
        getEl('myAvatar').src = data.avatar_url || "https://ui-avatars.com/api/?name=" + currentUser.email;
      }
    }

    async function saveProfileData(){
      const username = getEl('usernameInput').value.trim();
      await sb.from('profiles').upsert({ id: currentUser.id, username });
      alert("Дані оновлено!");
      await loadProfile();
    }

    async function uploadAvatar(){
      const file = getEl('avatarInput').files[0];
      if(!file) return;
      const path = `${currentUser.id}/avatar_${Date.now()}.png`;
      const { error } = await sb.storage.from('avatars').upload(path, file);
      if(!error){
        const url = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
        await sb.from('profiles').upsert({ id: currentUser.id, avatar_url: url });
        await loadProfile();
      }
    }

    // --- КОМ'ЮНІТІ ---
    async function loadPosts(){
      // Завантажуємо пости разом з даними профілів (якщо ти налаштувала зв'язки)
      // Для простоти зараз завантажимо просто пости
      const { data } = await sb.from('community_posts').select('*').order('created_at');
      posts = data || [];
      renderCommunity();
    }

    function tagUser(name) {
        if(!name) return;
        getEl('postInput').value += `@${name} `;
        getEl('postInput').focus();
    }

    function formatBody(text) {
        if(!text) return "";
        // Підсвічуємо @username
        return text.replace(/@(\w+|[а-яА-ЯёЁіІїЇєЄ]+)/g, '<span class="mention">@$1</span>');
    }

    async function createPost(){
      const body = getEl('postInput').value.trim();
      if(!body) return;
      const catId = categories.find(c => c.slug === selectedSpace)?.id;
      // Зберігаємо також ім'я та аватар у пост для швидкості (або краще робити Join у SQL)
      await sb.from('community_posts').insert({ 
        user_id: currentUser.id, 
        category_id: catId, 
        body, 
        user_email: profile.username || currentUser.email,
        // Додай колонку avatar_url у community_posts, якщо хочеш щоб старі пости не втрачали фото
      });
      getEl('postInput').value = "";
      await loadPosts();
    }

    // --- РЕНДЕРИНГ ---
    function renderCommunity(){
      getEl('spacesWrap').innerHTML = categories.map(cat => `<button class="tab ${selectedSpace===cat.slug?'active':''}" onclick="selectedSpace='${cat.slug}'; renderCommunity();">${cat.slug}</button>`).join('');
      const filtered = posts.filter(p => categories.find(c => c.id === p.category_id)?.slug === selectedSpace);
      
      getEl('postsWrap').innerHTML = filtered.map(p => {
        const isOwn = p.user_id === currentUser.id;
        return `
          <div class="msg ${isOwn?'own':''}">
            <div class="msg-header" onclick="tagUser('${p.user_email}')">
              <img src="https://ui-avatars.com/api/?name=${p.user_email}" class="avatar-circle">
              <span class="msg-user">${p.user_email}</span>
            </div>
            <div>${formatBody(p.body)}</div>
          </div>
        `;
      }).join('');
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
    }

    // (Інші функції Tracker та Dashboard залишаються як були у попередніх версіях)
    async function loadCategories(){ const { data } = await sb.from('categories').select('*').order('sort_order'); categories = data || []; if(categories.length && !selectedSpace) selectedSpace = categories[0].slug; }
    async function loadHabitsAndChecks(){ /* ... твій код завантаження звичок ... */ }
    function renderAll(){ renderCommunity(); /* ... інший рендер ... */ }
    function bindTabs(){ document.querySelectorAll('.tab[data-view]').forEach(t => t.onclick = () => { document.querySelectorAll('.tab, .view').forEach(x => x.classList.remove('active')); t.classList.add('active'); getEl(t.dataset.view).classList.add('active'); }); }
    
    bootstrap();
    bindTabs();
    function togglePassword() { const i = getEl('passwordInput'); i.type = i.type==='password'?'text':'password'; }
  </script>
</body>
</html>
