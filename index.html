<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Support Inside</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.6);
      --accent: #3b82f6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glass: blur(12px);
      --green: #10b981;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; }
    .hidden { display: none !important; }
    .input, .textarea { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; color: #fff; font-size: 15px; margin-bottom: 15px; font-family: inherit; outline: none; transition: 0.3s; }
    .textarea { resize: none; min-height: 120px; }
    .input:focus, .textarea:focus { border-color: var(--accent); background: rgba(15, 23, 42, 0.8); }
    .button { border: 0; border-radius: 14px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; font-family: inherit; }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    .app { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 20px; margin-bottom: 40px; align-items: center; overflow-x: auto; padding-bottom: 10px; }
    .nav-logo { font-weight: 800; font-size: 22px; color: #fff; margin-right: 10px; text-decoration:none; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 8px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 25px; }
    
    /* Таблиця адміна для тікетів */
    .ticket-item { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
    
    .category-group { margin-bottom: 40px; }
    .tracker-container { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--border); }
    .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px); align-items: center; border-bottom: 1px solid var(--border); }
    .tracker-cell { height: 50px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
    .check-btn { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.15); border-radius: 6px; cursor: pointer; }
    .check-btn.active { background: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card" style="max-width:400px; margin: 100px auto; text-align:center; background:var(--card); padding:40px; border-radius:28px; border:1px solid var(--border);">
      <h1 class="nav-logo">EK.</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <input id="passwordInput" class="input" type="password" placeholder="Password" />
      <button class="button primary" onclick="handleSignIn()">Sign In</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="handleSignUp()">Create Account</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div class="nav-logo">EK.</div>
      <div class="tab active" data-view="dashView">Overview</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="supportView">Support</div>
      <button class="button dark" style="margin-left:auto;" onclick="logout()">Exit</button>
    </nav>

    <div id="supportView" class="view">
      <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2>Support & Feedback</h2>
        <textarea id="supportMessage" class="textarea" placeholder="Напишіть своє запитання тут..."></textarea>
        <button id="supportBtn" class="button primary" onclick="sendSupport()">Надіслати</button>
        <div id="supportStatus" style="margin-top:15px; text-align:center;"></div>
      </div>

      <div id="adminPanel" class="hidden" style="margin-top:40px;">
        <h3 style="text-align:center; color:var(--accent);">👑 Список звернень (Адмін)</h3>
        <div id="adminTicketsWrap"></div>
      </div>
    </div>

    <div id="dashView" class="view active"><div id="streakVal" style="font-size:40px; font-weight:800; text-align:center;"></div><div id="ringsWrap" style="display:flex; justify-content:center; gap:20px; margin-top:20px;"></div></div>
    <div id="trackerView" class="view"><div id="trackerSections"></div></div>
    <div id="chatView" class="view"><div class="card"><div id="postsWrap" style="height:300px; overflow-y:auto;"></div></div></div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let user = null, habits = [], checks = [], posts = [];

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user;
      if(!user) return;
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      
      // Якщо ти адмін — показуємо тікети
      if(user.email === OWNER_EMAIL) {
          document.getElementById('adminPanel').classList.remove('hidden');
          loadAdminTickets();
      }
      refreshData();
    }

    // --- ВІДПРАВКА В БАЗУ ---
    async function sendSupport() {
      const msg = document.getElementById('supportMessage').value.trim();
      if(!msg) return;

      const { error } = await sb.from('support_tickets').insert({
          user_id: user.id,
          user_email: user.email,
          message: msg
      });

      if(!error) {
          document.getElementById('supportStatus').innerHTML = "<span style='color:var(--green)'>✅ Повідомлення надіслано в базу!</span>";
          document.getElementById('supportMessage').value = "";
          if(user.email === OWNER_EMAIL) loadAdminTickets();
      } else {
          alert("Помилка: " + error.message);
      }
    }

    // --- ЧИТАННЯ ДЛЯ АДМІНА ---
    async function loadAdminTickets() {
      const { data } = await sb.from('support_tickets').select('*').order('created_at', { ascending: false });
      const wrap = document.getElementById('adminTicketsWrap');
      if(data) {
          wrap.innerHTML = data.map(t => `
            <div class="ticket-item">
              <div style="font-size:11px; color:var(--muted);">${new Date(t.created_at).toLocaleString()}</div>
              <div style="font-weight:800; margin:5px 0;">Від: ${t.user_email}</div>
              <div style="font-size:14px;">${t.message}</div>
            </div>
          `).join('');
      }
    }

    async function handleSignIn() { 
        const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value });
        if(!error) bootstrap(); else alert(error.message);
    }
    async function handleSignUp() { 
        const { error } = await sb.auth.signUp({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value });
        if(!error) alert("Перевірте пошту!"); else alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }

    // Твої старі функції (refreshData, renderAll тощо) мають бути тут
    async function refreshData() { /* завантаження звичок і т.д. */ }

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
