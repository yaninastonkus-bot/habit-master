<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Master</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb; --card:#ffffff; --text:#1b2433; --muted:#6f7f98; --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08); --blue:#2f39f6; --green:#8bb26a;
      --pink:#ba81a7; --move:#2f39f6; --mind:#7ea765; --create:#e3aed0; --slow:#6f87d8;
      --today:#f3e39c; --dark:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text);}
    .hidden{display:none !important}
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
    .auth-card{width:100%; max-width:560px; background:#f7f8fc; border-radius:28px; padding:32px; box-shadow:var(--shadow); text-align:center;}
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:14px; padding:14px 16px; font-size:16px; background:#fff;}
    .textarea{resize:vertical; min-height:100px; font-family:inherit;}
    .button{border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer;}
    .button.primary{background:var(--blue);color:#fff}
    .button.green{background:var(--green);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    .app{max-width:1480px; margin:0 auto; padding:20px;}
    .topbar{display:grid; grid-template-columns:repeat(5,1fr) auto; gap:12px; margin-bottom:18px;}
    .tab{background:rgba(255,255,255,.72); border:1px solid var(--border); border-radius:16px; padding:16px 18px; text-align:center; cursor:pointer; font-weight:600;}
    .tab.active{background:#fff; font-weight:800;}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; margin-bottom:20px;}
    .today-row{background:#fff; border:1px solid var(--border); border-radius:18px; padding:16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
    .tracker-section{overflow-x:auto; margin-bottom:20px;}
    .tracker-head,.tracker-row{display:grid; grid-template-columns:170px repeat(31, 34px) 104px; align-items:center;}
    .tracker-head{color:#fff; font-size:12px; font-weight:700; background: var(--blue);}
    .tracker-row{background:#fff; border-bottom:1px solid var(--border);}
    .checkbox{width:18px; height:18px; border:2px solid #4b5563; border-radius:4px; cursor:pointer;}
    .community-layout{display:grid; grid-template-columns:260px 1fr; gap:20px;}
    .space-btn{width:100%; border:0; border-radius:18px; padding:14px 16px; text-align:left; font-size:16px; font-weight:700; cursor:pointer; background:#fff; margin-bottom:8px;}
    .post{margin-top:14px; border:1px solid var(--border);}
    .post-meta{font-size:14px; color:var(--muted); margin-bottom:8px;}
    .post-body{font-size:16px; line-height:1.5;}
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <div style="font-size:30px; font-weight:800; margin-bottom:10px;">🔥 Habit Master</div>
      <div class="auth-grid">
        <input id="emailInput" class="input" type="email" placeholder="твій email" style="margin-bottom:10px;"/>
        <input id="passwordInput" class="input" type="password" placeholder="пароль" />
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
          <button class="button primary" onclick="signIn()">Увійти</button>
          <button class="button green" onclick="signUp()">Зареєструватися</button>
        </div>
      </div>
      <div id="authStatus" class="status" style="margin-top:15px;"></div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="todayView">Today</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div class="card">Вітаємо у Habit Master! Виберіть вкладку для роботи.</div>
       <div id="ringsWrap" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:15px;"></div>
    </div>

    <div id="todayView" class="view">
        <div class="card">
            <h2 style="margin-top:0">Today's Habits</h2>
            <div id="todayList"></div>
        </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap" class="card" style="padding:0; overflow:hidden;"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout">
        <div id="spacesWrap" class="spaces"></div>
        <div>
          <div class="card">
            <h3 id="communityTitle">Community</h3>
            <textarea id="postInput" class="textarea" placeholder="Напиши щось для спільноти..."></textarea>
            <button class="button primary" style="margin-top:10px; width:100%" onclick="createPost()">Опублікувати</button>
          </div>
          <div id="postsWrap"></div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h3>Налаштування</h3>
           <button class="button dark" onclick="logout()">Вийти з акаунту</button>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser, profile, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "MOVE";

    const META = {
      MOVE: { color: "#2F39F6", emoji: "🏃" },
      MIND: { color: "#7EA765", emoji: "🧠" },
      CREATE: { color: "#E3AED0", emoji: "🎨" },
      SLOW: { color: "#6F87D8", emoji: "🌿" }
    };

    const DEFAULT_HABITS = {
      MOVE: ["10–20 min walk", "Stretching", "Short workout"],
      MIND: ["Journaling", "Reading", "Meditation"],
      CREATE: ["Sketching", "Drawing", "New recipe"],
      SLOW: ["No phone tea", "Early bed", "Self-care"]
    };

    // --- Auth Functions ---
    async function signUp(){
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { data, error } = await sb.auth.signUp({ email, password });
      if(error) alert(error.message); else alert("Перевір пошту або увійди!");
    }

    async function signIn(){
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if(error) alert(error.message); else bootstrap();
    }

    function logout(){ sb.auth.signOut(); location.reload(); }

    // --- Data Logic ---
    async function bootstrap(){
      const { data } = await sb.auth.getSession();
      currentUser = data.session?.user;
      if(!currentUser) return;

      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');

      await loadCategories();
      await ensureDefaultHabits();
      await loadCheckIns();
      await loadPosts();
      renderAll();
    }

    async function loadCategories(){
      const { data } = await sb.from('categories').select('*').order('sort_order');
      categories = data || [];
    }

    async function ensureDefaultHabits(){
      // 1. Отримуємо існуючі звички
      const { data: existing } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      habits = existing || [];

      // 2. Якщо порожньо, додаємо дефолтні БЕЗ ДУБЛІКАТІВ
      if(habits.length === 0){
        let toInsert = [];
        categories.forEach(cat => {
          (DEFAULT_HABITS[cat.slug] || []).forEach(hName => {
            toInsert.push({ user_id: currentUser.id, category_id: cat.id, title: hName });
          });
        });
        await sb.from('habits').insert(toInsert);
        const { data: fresh } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
        habits = fresh || [];
      }
    }

    async function loadCheckIns(){
      const { data } = await sb.from('check_ins').select('*').eq('user_id', currentUser.id);
      checkIns = data || [];
    }

    async function loadPosts(){
      // Спрощений запит без складних Join для стабільності
      const { data } = await sb.from('community_posts').select('*').order('created_at', { ascending: false });
      posts = data || [];
    }

    async function toggleCheck(habitId, day){
      const date = new Date(); date.setDate(day);
      const dateStr = date.toISOString().split('T')[0];
      const exist = checkIns.find(c => c.habit_id === habitId && c.check_in_date === dateStr);
      
      if(exist){
        await sb.from('check_ins').delete().eq('id', exist.id);
      } else {
        await sb.from('check_ins').insert({ user_id: currentUser.id, habit_id: habitId, check_in_date: dateStr });
      }
      await loadCheckIns();
      renderAll();
    }

    async function createPost(){
      const body = document.getElementById('postInput').value.trim();
      if(!body) return;
      const cat = categories.find(c => c.slug === selectedSpace);
      await sb.from('community_posts').insert({
        user_id: currentUser.id,
        category_id: cat.id,
        body: body,
        user_email: currentUser.email // Зберігаємо імейл для відображення
      });
      document.getElementById('postInput').value = '';
      await loadPosts();
      renderCommunity();
    }

    // --- Rendering ---
    function renderAll(){
        renderToday();
        renderTracker();
        renderCommunity();
        bindTabs();
    }

    function renderToday(){
        const list = document.getElementById('todayList');
        list.innerHTML = habits.map(h => {
            const cat = categories.find(c => c.id === h.category_id);
            const isDone = checkIns.some(c => c.habit_id === h.id && c.check_in_date === new Date().toISOString().split('T')[0]);
            return `
              <div class="today-row">
                <div><strong>${h.title}</strong><br><small>${cat?.slug}</small></div>
                <button class="button" style="background:${isDone? (cat?.color || '#eee') : '#eee'}; color:${isDone?'#fff':'#000'}" 
                        onclick="toggleCheck('${h.id}', ${new Date().getDate()})">
                  ${isDone ? 'Done' : 'Check in'}
                </button>
              </div>`;
        }).join('');
    }

    function renderTracker(){
        const wrap = document.getElementById('trackerWrap');
        wrap.innerHTML = categories.map(cat => {
            const catHabits = habits.filter(h => h.category_id === cat.id);
            return `
              <div class="tracker-section">
                <div class="tracker-head" style="background:${cat.color}">
                  <div style="padding-left:10px">${META[cat.slug].emoji} ${cat.slug}</div>
                  ${Array.from({length:31}, (_,i)=>`<div>${i+1}</div>`).join('')}
                  <div>%</div>
                </div>
                ${catHabits.map(h => {
                    const hChecks = checkIns.filter(c => c.habit_id === h.id);
                    const percent = Math.round((hChecks.length / 31) * 100);
                    return `
                      <div class="tracker-row">
                        <div style="padding-left:10px">${h.title}</div>
                        ${Array.from({length:31}, (_,i)=>{
                            const day = i+1;
                            const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
                            const checked = hChecks.some(c => c.check_in_date === dStr);
                            return `<div style="display:flex; justify-content:center">
                                      <div class="checkbox" style="background:${checked?cat.color:'transparent'}" onclick="toggleCheck('${h.id}', ${day})"></div>
                                    </div>`;
                        }).join('')}
                        <div style="text-align:center; font-weight:bold; color:${cat.color}">${percent}%</div>
                      </div>`;
                }).join('')}
              </div>`;
        }).join('');
    }

    function renderCommunity(){
        const spaces = document.getElementById('spacesWrap');
        const postsList = document.getElementById('postsWrap');
        
        spaces.innerHTML = categories.map(cat => `
            <button class="space-btn" style="${selectedSpace===cat.slug?`background:${cat.color}; color:#fff`:''}" 
                    onclick="selectedSpace='${cat.slug}'; renderCommunity();">
                ${META[cat.slug].emoji} ${cat.slug}
            </button>
        `).join('');

        const filtered = posts.filter(p => {
            const cat = categories.find(c => c.id === p.category_id);
            return cat?.slug === selectedSpace;
        });

        postsList.innerHTML = filtered.map(p => `
            <div class="card post">
                <div class="post-meta">Від: ${p.user_email || 'Анонім'} • ${new Date(p.created_at).toLocaleDateString()}</div>
                <div class="post-body">${p.body}</div>
            </div>
        `).join('');
        
        document.getElementById('communityTitle').innerText = `${META[selectedSpace].emoji} ${selectedSpace} community`;
    }

    function bindTabs(){
      document.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          document.getElementById(t.dataset.view).classList.add('active');
        }
      });
    }

    bootstrap();
  </script>
</body>
</html>
