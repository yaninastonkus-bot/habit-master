<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Premium</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --card: rgba(30, 41, 59, 0.6); --accent: #3b82f6; --text: #f8fafc;
      --muted: #94a3b8; --border: rgba(255, 255, 255, 0.08); --glass: blur(12px); --green: #10b981;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh;
    }
    .hidden { display: none !important; }
    .input, .textarea { 
      width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; color: #fff; font-size: 15px; margin-bottom: 12px; font-family: inherit; outline: none;
    }
    .button { 
      border: 0; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
    }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    
    .app { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; overflow-x: auto; padding-bottom: 10px; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 8px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }

    /* Tracker */
    .category-group { margin-bottom: 35px; }
    .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 15px; }
    .tracker-wrap { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
    .tracker-row { display: grid; grid-template-columns: 180px repeat(31, 38px); border-bottom: 1px solid var(--border); align-items: center; }
    .tracker-cell { height: 48px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); font-size: 12px; }
    .habit-title { justify-content: space-between; padding: 0 15px; font-weight: 600; color: #fff; text-align: left; }
    .check-btn { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15); border-radius: 5px; cursor: pointer; }
    .check-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .check-btn.disabled { opacity: 0.1; cursor: not-allowed; border-style: dashed; }

    /* Ring */
    .ring-val { font-size: 11px; font-weight: 800; }
    .msg { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
    .msg.own { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

    @media (max-width: 768px) { .tracker-row { grid-template-columns: 140px repeat(31, 38px); } }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card" style="max-width:400px; margin: 80px auto; background:var(--card); padding:40px; border-radius:28px; border:1px solid var(--border); text-align:center;">
      <h1 style="font-weight:800; letter-spacing:-2px;">EK.</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <input id="passwordInput" class="input" type="password" placeholder="Password" />
      <button class="button primary" onclick="handleSignIn()">Sign In</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="handleSignUp()">Create Account</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div style="font-weight: 800; font-size: 20px; color: #fff; margin-right: 10px;">EK.</div>
      <div class="tab active" data-view="dashView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="supportView">Support</div>
      <button class="button dark" style="margin-left:auto; padding:6px 12px; font-size:11px;" onclick="logout()">Exit</button>
    </nav>

    <div id="dashView" class="view active">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
        <div class="card">
          <div style="color: var(--muted); font-size: 10px; text-transform: uppercase; font-weight: 800;">Current Streak</div>
          <div id="streakVal" style="font-size: 48px; font-weight: 800; margin: 5px 0;">0</div>
          <div id="levelVal" style="font-size: 13px; color: var(--accent);">Novice</div>
        </div>
        <div class="card" id="ringsWrap" style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;"></div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerSections"></div>
    </div>

    <div id="chatView" class="view">
      <div class="card">
        <div id="postsWrap" style="height:350px; overflow-y:auto; margin-bottom:20px; padding-right:10px;"></div>
        <div style="display:flex; gap:10px;">
          <input id="postInput" class="input" style="margin:0;" placeholder="Message..." />
          <button class="button primary" style="width:80px;" onclick="sendPost()">Post</button>
        </div>
      </div>
    </div>

    <div id="supportView" class="view">
      <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2 style="margin-top:0">Support</h2>
        <textarea id="supportMessage" class="textarea" placeholder="Як ми можемо допомогти?"></textarea>
        <button id="supportBtn" class="button primary" onclick="sendSupport()">Send Request</button>
        <div id="supportStatus" style="margin-top:15px;"></div>
        <div id="adminPanel" class="hidden" style="margin-top:30px; border-top: 1px solid var(--border); padding-top:20px;">
          <h3 style="color:var(--accent)">👑 Admin View</h3>
          <div id="adminTicketsWrap"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let user = null, habits = [], checks = [], posts = [];
    const categories = [{id:'MOVE', color:'#3b82f6'}, {id:'MIND', color:'#10b981'}, {id:'CREATE', color:'#f43f5e'}, {id:'SLOW', color:'#8b5cf6'}];
    const DEFAULTS = { MOVE:['Stretch','Walk'], MIND:['Read','Journal'], CREATE:['Sketch'], SLOW:['No Phone'] };

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user;
      if(!user) return;
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      if(user.email === OWNER_EMAIL) {
        document.getElementById('adminPanel').classList.remove('hidden');
        loadAdminTickets();
      }
      await refreshData();
    }

    async function refreshData() {
      const h = await sb.from('habits').select('*').eq('user_id', user.id);
      habits = h.data || [];
      if(habits.length === 0) {
        let ins = [];
        categories.forEach(c => DEFAULTS[c.id].forEach(t => ins.push({user_id:user.id, category:c.id, title:t})));
        await sb.from('habits').insert(ins);
        const fresh = await sb.from('habits').select('*').eq('user_id', user.id);
        habits = fresh.data || [];
      }
      const c = await sb.from('check_ins').select('*').eq('user_id', user.id);
      checks = c.data || [];
      const p = await sb.from('community_posts').select('*').order('created_at');
      posts = p.data || [];
      renderAll();
    }

    async function addHabit(catId) {
      const t = prompt(`New habit for ${catId}:`);
      if(t) { await sb.from('habits').insert({user_id:user.id, title:t, category:catId}); await refreshData(); }
    }

    async function toggleCheck(hId, day) {
      const d = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === hId && c.check_in_date === d);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({user_id:user.id, habit_id:hId, check_in_date:d});
      await refreshData();
    }

    async function sendSupport() {
      const msg = document.getElementById('supportMessage').value;
      if(!msg) return;
      await sb.from('support_tickets').insert({user_id:user.id, user_email:user.email, message:msg});
      document.getElementById('supportStatus').innerText = "Sent successfully!";
      document.getElementById('supportMessage').value = "";
      if(user.email === OWNER_EMAIL) loadAdminTickets();
    }

    async function loadAdminTickets() {
      const { data } = await sb.from('support_tickets').select('*').order('created_at', {ascending:false});
      if(data) document.getElementById('adminTicketsWrap').innerHTML = data.map(t => `<div class="msg"><b>${t.user_email}</b>: ${t.message}</div>`).join('');
    }

    async function sendPost() {
      const b = document.getElementById('postInput').value;
      if(b) { await sb.from('community_posts').insert({user_id:user.id, user_email:user.email, body:b}); document.getElementById('postInput').value=""; await refreshData(); }
    }

    function renderAll() {
      const today = new Date().getDate();
      document.getElementById('trackerSections').innerHTML = categories.map(cat => {
        const catH = habits.filter(h => h.category === cat.id);
        return `
          <div class="category-group">
            <div class="category-header"><span style="font-weight:800">${cat.id}</span><button class="button dark" style="padding:4px 10px; font-size:11px" onclick="addHabit('${cat.id}')">+ Add</button></div>
            <div class="tracker-wrap">
              ${catH.map(h => `
                <div class="tracker-row">
                  <div class="tracker-cell habit-title">${h.title}</div>
                  ${Array.from({length:31}, (_, i) => {
                    const active = checks.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === i+1);
                    return `<div class="tracker-cell" style="${i+1===today?'background:rgba(255,255,255,0.05)':''}"><div class="check-btn ${active?'active':''}" onclick="toggleCheck('${h.id}',${i})"></div></div>`;
                  }).join('')}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('streakVal').innerText = calculateStreak();
      document.getElementById('ringsWrap').innerHTML = categories.map(cat => {
        const hbits = habits.filter(h => h.category === cat.id);
        const done = checks.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.round((done/(hbits.length*31))*100) : 0;
        return `<div style="width:50px; height:50px; border-radius:50%; background:conic-gradient(${cat.color} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg); display:flex; align-items:center; justify-content:center;"><span class="ring-val">${perc}%</span></div>`;
      }).join('');

      document.getElementById('postsWrap').innerHTML = posts.map(p => `<div class="msg ${p.user_id===user.id?'own':''}"><b>${p.user_email}</b><br>${p.body}</div>`).join('');
      document.getElementById('postsWrap').scrollTop = document.getElementById('postsWrap').scrollHeight;
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date().toISOString().split('T')[0];
      for(let d of dates) { if(d === now || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) { s++; now = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    async function handleSignIn() { 
      const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value });
      if(!error) bootstrap(); else alert(error.message);
    }
    async function handleSignUp() { 
      const { error } = await sb.auth.signUp({ email: document.getElementById('emailInput').value, password: document.getElementById('passwordInput').value });
      if(!error) alert("Check email!"); else alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
