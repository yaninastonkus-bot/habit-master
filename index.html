<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#eaf2fb; --card:#ffffff; --text:#1b2433; --muted:#6f7f98; --border:#dbe3ee;
      --shadow:0 10px 28px rgba(46,65,96,.08); --blue:#2f39f6; --green:#8bb26a;
      --pink:#ba81a7; --move:#2f39f6; --mind:#7ea765; --create:#e3aed0; --slow:#6f87d8;
      --today:#f3e39c; --dark:#111827;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,Arial,sans-serif; background:var(--bg); color:var(--text);}
    .hidden{display:none !important}
    
    /* Auth */
    .auth-shell{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
    .auth-card{width:100%; max-width:500px; background:#f7f8fc; border-radius:28px; padding:32px; box-shadow:var(--shadow); text-align:center;}
    .input,.textarea{width:100%; border:1px solid var(--border); border-radius:14px; padding:14px 16px; font-size:16px; background:#fff; font-family: inherit;}
    .button{border:0; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; cursor:pointer; transition:0.2s;}
    .button:active{transform:scale(0.98);}
    .button.primary{background:var(--blue);color:#fff}
    .button.green{background:var(--green);color:#fff}
    .button.dark{background:var(--dark);color:#fff}
    
    /* Layout */
    .app{max-width:1480px; margin:0 auto; padding:20px;}
    .topbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;}
    .tab{background:rgba(255,255,255,.72); border:1px solid var(--border); border-radius:16px; padding:14px 18px; text-align:center; cursor:pointer; font-weight:600; flex-grow:1;}
    .tab.active{background:#fff; font-weight:800; border-color: var(--blue);}
    .view{display:none} .view.active{display:block}
    .card{background:var(--card); border-radius:28px; box-shadow:var(--shadow); padding:22px; margin-bottom:20px;}
    
    /* Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
    #ringsWrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .ring-card{min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; transition:0.3s;}
    .ring{width:110px; height:110px; border-radius:50%; position:relative; border:1px solid #d2d9e4;}
    .ring::after{content:""; position:absolute; inset:12px; background:#fff; border-radius:50%;}
    .ring-value{font-size:22px; font-weight:800; position:absolute; z-index:10; top:50%; left:50%; transform:translate(-50%, -50%);}
    .side-block{color:#fff; min-height:75px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:15px; font-size:17px; font-weight:700; border-radius:22px; margin-bottom:12px;}
    
    /* Focus Chips */
    .focus-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
    .focus-chip { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 12px; padding: 8px 12px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; user-select: none; }
    .focus-chip.active { background: #fff; color: var(--pink); border-color: #fff; transform: scale(1.05); }

    /* Tracker */
    .tracker-category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; margin-top: 20px; padding: 0 10px; }
    .tracker-category-header h2 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
    .add-habit-btn { background: #bbf706; color: #000; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(187, 247, 6, 0.3); transition: 0.2s; user-select: none; }
    .add-habit-btn:hover { transform: scale(1.1); }

    .tracker-section{overflow-x:auto; margin-bottom:30px; background:#fff; border-radius:20px; border:1px solid var(--border); padding-bottom:5px; -webkit-overflow-scrolling: touch; border-collapse: separate;}
    .tracker-head, .tracker-row { display: grid; grid-template-columns: 220px repeat(31, 40px) 70px; align-items: center; min-width: 1530px; }
    .tracker-head { color:#fff; font-size:12px; font-weight:700; height:45px; background: #333;}
    .tracker-row { border-bottom: 1px solid #f0f0f0; height:54px; font-size:14px; position: relative;}
    .tracker-head > div, .tracker-row > div { display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid rgba(0,0,0,0.03); }
    
    /* ФІКСОВАНА КОЛОНКА */
    .tracker-head > div:first-child, .tracker-row > div:first-child { position: sticky; left: 0; z-index: 2; }
    .tracker-head > div:first-child { z-index: 3; background: inherit; }
    .tracker-row > div:first-child { background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.03); justify-content: space-between !important; padding: 0 15px; }
    
    .today-cell { background: var(--today) !important; color: #000; font-weight: 800;}
    .checkbox{width:22px; height:22px; border:2px solid #cbd5e1; border-radius:7px; cursor:pointer; transition: 0.1s;}
    .checkbox:active { transform: scale(0.9); }

    /* Кнопки Редагувати / Видалити у трекері */
    .habit-actions { display: flex; gap: 8px; opacity: 0.2; transition: 0.2s; background: #fff; padding-left: 5px; }
    .tracker-row > div:first-child:hover .habit-actions { opacity: 1; }
    .action-icon { cursor: pointer; font-size: 12px; }
    .action-icon:hover { transform: scale(1.2); }

    /* Community */
    .community-layout{display:grid; grid-template-columns: 280px 1fr; gap:20px; align-items: start;}
    .spaces-sidebar { display: flex; flex-direction: column; gap: 10px; }
    .space-btn{width:100%; border:1px solid var(--border); border-radius:18px; padding:16px; text-align:left; font-size:16px; font-weight:700; cursor:pointer; background:#fff; box-shadow: var(--shadow); transition: 0.2s;}
    .chat-box { height: 500px; overflow-y: auto; background: #f8fbff; border-radius: 22px; padding: 20px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border); }
    .msg { max-width: 85%; padding: 14px 18px; padding-right: 65px; border-radius: 20px; background: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.04); color: var(--text); position: relative; word-wrap: break-word; line-height:1.4;}
    .msg.own { align-self: flex-end; background: var(--blue); color: #fff; }
    .post-img { max-width: 100%; border-radius: 14px; margin-top: 10px; display: block; border: 1px solid rgba(0,0,0,0.1); }
    .action-btns { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; }
    .action-btn { cursor: pointer; opacity: 0.8; font-size: 14px; transition: 0.2s; user-select: none; background: rgba(255,255,255,0.7); border-radius: 6px; padding: 4px; display:flex; align-items:center; justify-content:center;}
    .action-btn:hover { opacity: 1; transform: scale(1.1); background: #fff; }

    @media (max-width: 768px) {
      .app { padding: 12px; }
      .topbar { gap: 8px; }
      .dashboard-grid { grid-template-columns: 1fr; }
      #ringsWrap { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .ring-card { min-height: 180px; }
      .ring { width: 90px; height: 90px; }
      .community-layout { grid-template-columns: 1fr; gap: 15px;}
      .spaces-sidebar { flex-direction: row; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
      .space-btn { min-width: 140px; text-align: center; }
      .chat-box { height: 400px; padding: 15px; }
      .habit-actions { opacity: 0.8; } 
    }
    input[type="password"]::-ms-reveal, input[type="password"]::-ms-clear { display: none; }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 style="margin:0 0 10px 0;">🔥 EK Habit Tracker</h1>
      <p style="color:var(--muted); margin-bottom:20px;">Увійдіть або створіть акаунт</p>
      <input id="emailInput" class="input" type="email" placeholder="Email" style="margin-bottom:12px;"/>
      <div style="position: relative; margin-bottom: 12px;">
        <input id="passwordInput" class="input" type="password" placeholder="Пароль (мін. 6 символів)" style="padding-right: 40px;" />
        <div id="eyeIcon" onclick="togglePassword()" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6; font-size: 18px;">👁️</div>
      </div>
      <div id="loginError" style="color:red; font-size:12px; margin-top:5px; min-height:15px;"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
        <button id="loginBtn" class="button primary" onclick="signIn()">Увійти</button>
        <button class="button green" onclick="signUp()">Створити</button>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div class="tab active" data-view="dashboardView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="communityView">Community</div>
      <div class="tab" data-view="settingsView">Settings</div>
      <button class="button dark" onclick="logout()">Logout</button>
    </div>

    <div id="dashboardView" class="view active">
       <div id="debugLog" style="color:red; font-size:12px; margin-bottom:10px; font-weight:bold;"></div>
       <div class="dashboard-grid">
         <div>
            <div id="levelPanel" class="side-block" style="background:var(--green)">🏆 LEVEL: Novice 🥚</div>
            <div id="streakPanel" class="side-block" style="background:#ff9800">🔥 STREAK: 0 DAYS</div>
            <div id="motivationPanel" class="side-block" style="background:var(--blue)">✨ Nice start!</div>
            <div class="card" style="text-align:center; padding:15px;">
              <div style="color:var(--muted); font-size:14px;">Active Days</div>
              <div id="activeVal" style="font-size:32px; font-weight:800">0</div>
            </div>
            <div class="card" style="background:var(--pink); color:#fff; padding: 20px 15px; border-radius: 22px; text-align:center;">
              <div style="font-size: 14px; margin-bottom: 12px; opacity: 0.9; font-weight:700;">🎯 YOUR FOCUS:</div>
              <div class="focus-chips">
                <div class="focus-chip" data-val="MOVE" onclick="toggleFocusChip('MOVE')">🏃 MOVE</div>
                <div class="focus-chip" data-val="MIND" onclick="toggleFocusChip('MIND')">🧠 MIND</div>
                <div class="focus-chip" data-val="CREATE" onclick="toggleFocusChip('CREATE')">🎨 CREATE</div>
                <div class="focus-chip" data-val="SLOW" onclick="toggleFocusChip('SLOW')">🌿 SLOW</div>
              </div>
              <hr style="border:0; border-top:1px solid rgba(255,255,255,0.3); margin:15px 0;">
              <div style="font-size: 15px; font-weight:800;">🎁 REWARD: <span style="opacity:0.9; font-weight:normal;">merch</span></div>
            </div>
         </div>
         <div id="ringsWrap"></div>
       </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerWrap"></div>
    </div>

    <div id="communityView" class="view">
      <div class="community-layout">
        <div id="spacesWrap" class="spaces-sidebar"></div>
        <div>
          <div class="card">
            <h3 id="communityTitle" style="margin:0 0 15px 0;">Community</h3>
            <div id="postsWrap" class="chat-box"></div>
            <div style="margin-top:15px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
              <div id="attachWrap" style="display:flex; align-items:center; gap:8px;">
                <label class="button dark" style="padding:14px; cursor:pointer;">📎<input type="file" id="fileInput" class="hidden" onchange="updateFileName()"></label>
                <span id="fileNameDisplay" style="font-size: 10px; color: var(--muted); max-width: 80px; overflow: hidden;"></span>
              </div>
              <textarea id="postInput" class="textarea" style="min-height:50px; flex-grow:1;" placeholder="Поділися успіхом..."></textarea>
              <button id="cancelEditBtn" class="button dark hidden" onclick="cancelEdit()">Скасувати</button>
              <button id="sendBtn" class="button primary" onclick="createPost()">Надіслати</button>
            </div>
            <div id="uploadStatus" style="font-size:12px; color:var(--blue); margin-top:5px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="settingsView" class="view">
       <div class="card">
           <h2 style="margin:0 0 15px 0;">Налаштування</h2>
           <p>Email: <strong id="userEmailLabel"></strong></p>
           <button id="notifBtn" class="button primary" style="width:100%" onclick="enableNotifications()">🔔 Увімкнути сповіщення</button>
           <div id="adminSection" class="hidden" style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
              <h3 style="color:var(--blue)">👑 Панель власника</h3>
              <div id="adminStats" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px;"></div>
           </div>
       </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let currentUser = null, categories = [], habits = [], checkIns = [], posts = [], selectedSpace = "", editingPostId = null, selectedFocuses = [];
    const TODAY_DAY = new Date().getDate();

    const META = { MOVE: { color: "#2F39F6", emoji: "🏃" }, MIND: { color: "#7EA765", emoji: "🧠" }, CREATE: { color: "#E3AED0", emoji: "🎨" }, SLOW: { color: "#6F87D8", emoji: "🌿" } };
    const DEFAULT_HABITS = { MOVE: ["10–20 min walk", "Stretching", "Short workout"], MIND: ["Journaling", "Reading", "Meditation"], CREATE: ["Sketching", "Drawing", "New recipe"], SLOW: ["No phone tea", "Early bed", "Self-care"] };

    const getEl = id => document.getElementById(id);
    function getMeta(slug) { return META[slug?.toUpperCase()] || { emoji: "📌", color: "#6f7f98" }; }
    function logError(msg) { const el = getEl('debugLog'); if(el) el.innerHTML += msg + "<br>"; console.error(msg); }

    function updateFileName() { const file = getEl('fileInput').files[0]; getEl('fileNameDisplay').innerText = file ? file.name : ''; }
    function togglePassword() { const input = getEl('passwordInput'); const icon = getEl('eyeIcon'); if (input.type === 'password') { input.type = 'text'; icon.innerText = '🙈'; } else { input.type = 'password'; icon.innerText = '👁️'; } }

    async function signUp(){
      const email = getEl('emailInput').value.trim(); const password = getEl('passwordInput').value;
      if(!email || password.length < 6) return alert("Перевірте дані (пароль від 6 симв.)");
      const { error } = await sb.auth.signUp({ email, password });
      if(error) alert(error.message); else alert("Акаунт створено! Увійдіть.");
    }
    
    async function signIn(){
      getEl('loginBtn').innerText = "⏳...";
      const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(error) { alert(error.message); getEl('loginBtn').innerText = "Увійти"; } else bootstrap();
    }
    
    async function logout(){ await sb.auth.signOut(); location.reload(); }

    async function bootstrap(){
      try {
        const { data } = await sb.auth.getSession();
        currentUser = data.session?.user; if(!currentUser) return;
        getEl('authView').classList.add('hidden'); getEl('appView').classList.remove('hidden');
        getEl('userEmailLabel').innerText = currentUser.email;
        if(currentUser.email === OWNER_EMAIL) getEl('adminSection').classList.remove('hidden');
        
        await loadCategories(); 
        await initProfile(); 
        await syncHabits();  
        await loadCheckIns(); 
        await loadPosts(); 
        
        renderAll();
      } catch (err) {
        alert("Помилка завантаження: " + err.message);
      }
    }

    async function initProfile() { 
      const { data, error } = await sb.from('profiles').select('focus_text').eq('id', currentUser.id).single(); 
      if (error && error.code === 'PGRST116') {
          const { error: insErr } = await sb.from('profiles').insert({ id: currentUser.id });
          if (insErr) logError("Помилка створення профілю: " + insErr.message);
      } else if (error) { logError("Помилка завантаження профілю: " + error.message); }
      if(data?.focus_text) { selectedFocuses = data.focus_text.split(',').filter(Boolean); updateFocusUI(); } 
    }
    
    function toggleFocusChip(val) { const idx = selectedFocuses.indexOf(val); if (idx > -1) selectedFocuses.splice(idx, 1); else selectedFocuses.push(val); updateFocusUI(); saveFocus(); }
    function updateFocusUI() { document.querySelectorAll('.focus-chip').forEach(c => selectedFocuses.includes(c.dataset.val) ? c.classList.add('active') : c.classList.remove('active')); renderDashboard(); }
    async function saveFocus() { await sb.from('profiles').upsert({ id: currentUser.id, focus_text: selectedFocuses.join(',') }); }

    async function loadCategories(){ 
      const { data, error } = await sb.from('categories').select('*').order('sort_order'); 
      if(error) { logError("Помилка категорій. Перевірте RLS: " + error.message); return; }
      categories = data || []; 
      if(categories.length && !selectedSpace) selectedSpace = categories[0].slug; 
    }
    
    async function syncHabits(){
      const { data, error } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      if(error) { logError("Помилка доступу до habits: " + error.message); return; }
      
      if(!data || data.length === 0){
        let ins = []; categories.forEach(c => (DEFAULT_HABITS[c.slug?.toUpperCase()] || []).forEach(t => ins.push({ user_id:currentUser.id, category_id:c.id, title:t })));
        if(ins.length) {
            const { error: insErr } = await sb.from('habits').insert(ins);
            if(insErr) logError("Помилка збереження звичок: " + insErr.message);
        }
      }
      const { data: fresh } = await sb.from('habits').select('*').eq('user_id', currentUser.id);
      habits = fresh || [];
    }

    async function addCustomHabit(categoryId) {
        const title = prompt("Введіть назву нової звички:");
        if(!title || !title.trim()) return;
        try {
            const { error } = await sb.from('habits').insert({ user_id: currentUser.id, category_id: categoryId, title: title.trim() });
            if(error) throw error;
            await syncHabits(); renderAll();
        } catch(e) { alert("Помилка створення: " + e.message); }
    }

    async function editHabit(habitId, currentTitle) {
        const newTitle = prompt("Редагувати звичку:", currentTitle);
        if(!newTitle || newTitle.trim() === "" || newTitle === currentTitle) return;
        try {
            const { error } = await sb.from('habits').update({ title: newTitle.trim() }).eq('id', habitId);
            if(error) throw error;
            await syncHabits(); renderAll();
        } catch(e) { alert("Помилка редагування: " + e.message); }
    }

    async function deleteHabit(habitId) {
        if(!confirm("Ви впевнені? Всі відмітки для цієї звички також зникнуть.")) return;
        try {
            await sb.from('check_ins').delete().eq('habit_id', habitId);
            const { error } = await sb.from('habits').delete().eq('id', habitId);
            if(error) throw error;
            await loadCheckIns(); await syncHabits(); renderAll();
        } catch(e) { alert("Помилка видалення: " + e.message); }
    }
    
    async function loadCheckIns(){ 
      const { data, error } = await sb.from('check_ins').select('*').eq('user_id', currentUser.id); 
      if(error) logError("Помилка відміток (check_ins): " + error.message);
      checkIns = data || []; 
    }

    async function toggleCheck(habitId, day){
      const dateStr = new Date(new Date().getFullYear(), new Date().getMonth(), day+1).toISOString().split('T')[0];
      const exist = checkIns.find(c => c.habit_id === habitId && c.check_in_date === dateStr);
      try {
        if(exist) {
          const { error } = await sb.from('check_ins').delete().eq('id', exist.id);
          if(error) throw error;
        } else {
          const { error } = await sb.from('check_ins').insert({ user_id:currentUser.id, habit_id:habitId, check_in_date:dateStr });
          if(error) throw error;
        }
        await loadCheckIns(); renderAll();
      } catch (e) { alert("Помилка відмітки: " + e.message); }
    }

    async function loadPosts(){ 
      const { data, error } = await sb.from('community_posts').select('*').order('created_at', { ascending: true }); 
      if(error) logError("Помилка чату (community_posts): " + error.message);
      posts = data || []; 
      renderCommunity(); 
    }

    async function createPost(){
      const body = getEl('postInput').value.trim(); const file = getEl('fileInput').files[0];
      if(!body && !file && !editingPostId) return;
      getEl('uploadStatus').innerText = "⏳...";
      try {
        if(editingPostId) { 
            const { error } = await sb.from('community_posts').update({ body }).eq('id', editingPostId); 
            if(error) throw error;
            cancelEdit(); 
        } else {
          let url = null;
          if(file){
            const fName = `${currentUser.id}/${Date.now()}_${file.name}`;
            const { error: upErr } = await sb.storage.from('community').upload(fName, file);
            if(!upErr) url = sb.storage.from('community').getPublicUrl(fName).data.publicUrl;
            else throw upErr;
          }
          const { error } = await sb.from('community_posts').insert({ user_id: currentUser.id, category_id: categories.find(c => c.slug === selectedSpace)?.id, body, media_url: url, user_email: currentUser.email });
          if(error) throw error;
          getEl('postInput').value = ''; getEl('fileInput').value = ''; getEl('fileNameDisplay').innerText = '';
        }
        await loadPosts(); getEl('uploadStatus').innerText = "";
      } catch(e) { alert("Помилка відправки в чат: " + e.message); getEl('uploadStatus').innerText = ""; }
    }
    
    function startEdit(id) { editingPostId = id; const p = posts.find(x => x.id === id); getEl('postInput').value = p.body; getEl('sendBtn').innerText = "Зберегти"; getEl('cancelEditBtn').classList.remove('hidden'); getEl('attachWrap').classList.add('hidden'); }
    function cancelEdit() { editingPostId = null; getEl('postInput').value = ''; getEl('sendBtn').innerText = "Надіслати"; getEl('cancelEditBtn').classList.add('hidden'); getEl('attachWrap').classList.remove('hidden'); }
    async function deletePost(id, url) { 
      if(!confirm("Видалити?")) return; 
      try {
        if(url) await sb.storage.from('community').remove([url.split('community/')[1]]); 
        const { error } = await sb.from('community_posts').delete().eq('id', id); 
        if(error) throw error;
        await loadPosts(); 
      } catch(e) { alert("Помилка видалення: " + e.message); }
    }

    function getStreak(){
      const dates = [...new Set(checkIns.map(c => c.check_in_date))].sort().reverse();
      let s = 0, check = new Date().toISOString().split('T')[0];
      for(let d of dates){ if(d === check || d === new Date(Date.now()-86400000).toISOString().split('T')[0]){ s++; check = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    function renderAll(){
      const sections = document.querySelectorAll('.tracker-section');
      const scrolls = Array.from(sections).map(s => s.scrollLeft);
      renderDashboard(); renderTracker(); renderCommunity(); renderAdmin(); bindTabs();
      document.querySelectorAll('.tracker-section').forEach((s, i) => { if(scrolls[i]) s.scrollLeft = scrolls[i]; });
    }

    function renderDashboard(){
      getEl('streakPanel').innerText = `🔥 STREAK: ${getStreak()} DAYS`;
      getEl('activeVal').innerText = [...new Set(checkIns.map(c => c.check_in_date))].length;
      getEl('levelPanel').innerText = `🏆 LEVEL: ${checkIns.length < 20 ? 'Novice 🥚' : 'Warrior ⚔️'}`;
      const totalPerc = habits.length ? Math.min(100, Math.round((checkIns.length / (habits.length * 31)) * 100)) : 0;
      let html = `<div class="card ring-card" style="border: 2px solid var(--blue)"><div style="font-weight:800; font-size:14px; color:var(--blue)">🏆 TOTAL</div><div class="ring" style="background: conic-gradient(var(--blue) ${totalPerc*3.6}deg, #dfe3ea 0deg);"><div class="ring-value">${totalPerc}%</div></div></div>`;
      
      if(categories.length === 0) html += "<div style='grid-column: 1/-1; color:red;'>Категорії не завантажено. Перевірте RLS.</div>";

      html += categories.map(cat => {
        const hbits = habits.filter(h => h.category_id === cat.id);
        const done = checkIns.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.min(100, Math.round((done / (hbits.length * 31)) * 100)) : 0;
        const foc = selectedFocuses.includes(cat.slug);
        return `<div class="card ring-card" style="${foc?'border:2px solid '+cat.color:''}"><div style="font-weight:800; font-size:14px;">${foc?'🎯':''}${getMeta(cat.slug).emoji} ${cat.slug}</div><div class="ring" style="background: conic-gradient(${cat.color} ${perc*3.6}deg, #dfe3ea 0deg);"><div class="ring-value">${perc}%</div></div></div>`;
      }).join('');
      getEl('ringsWrap').innerHTML = html;
    }

    function renderTracker(){
      if(categories.length === 0) return getEl('trackerWrap').innerHTML = "<div style='text-align:center; padding: 20px; color: var(--muted);'>Помилка завантаження. Перевірте налаштування бази даних (RLS).</div>";
      
      getEl('trackerWrap').innerHTML = categories.map(cat => {
        const hbits = habits.filter(h => h.category_id === cat.id);
        
        let html = `
        <div class="tracker-category-header">
            <h2>${cat.slug}</h2>
            <div class="add-habit-btn" onclick="addCustomHabit('${cat.id}')" title="Додати звичку">+</div>
        </div>
        <div class="tracker-section">
            <div class="tracker-head" style="background:${cat.color}">
                <div style="justify-content:flex-start; padding-left:15px;">HABIT</div>
                ${Array.from({length:31}, (_,i)=>`<div class="${i+1===TODAY_DAY?'today-cell':''}">${i+1}</div>`).join('')}
                <div>%</div>
            </div>`;
            
        html += hbits.map(h => {
            const hChecks = checkIns.filter(c => c.habit_id === h.id);
            const safeTitle = h.title.replace(/'/g, "\\'");
            return `<div class="tracker-row">
                <div style="font-weight:600;">
                    <span style="flex-grow:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${h.title}</span>
                    <div class="habit-actions">
                        <span class="action-icon" onclick="editHabit('${h.id}', '${safeTitle}')" title="Редагувати">✏️</span>
                        <span class="action-icon" onclick="deleteHabit('${h.id}')" title="Видалити">❌</span>
                    </div>
                </div>
                ${Array.from({length:31}, (_,i)=>{
                    const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), i+2).toISOString().split('T')[0];
                    return `<div class="${i+1===TODAY_DAY?'today-cell':''}"><div class="checkbox" style="${hChecks.some(c=>c.check_in_date===dStr)?'background:'+cat.color+'; border-color:'+cat.color:''}" onclick="toggleCheck('${h.id}', ${i+1})"></div></div>`;
                }).join('')}
                <div style="font-weight:bold; color:${cat.color}">${Math.round((hChecks.length/31)*100)}%</div>
            </div>`;
        }).join('');
        
        html += `</div>`;
        return html;
      }).join('');
    }

    function renderCommunity(){
      getEl('spacesWrap').innerHTML = categories.map(cat => `<button class="space-btn" style="${selectedSpace===cat.slug?'background:'+cat.color+'; color:#fff':''}" onclick="selectedSpace='${cat.slug}'; cancelEdit(); renderCommunity();">${getMeta(cat.slug).emoji} ${cat.slug}</button>`).join('');
      const filtered = posts.filter(p => categories.find(c => c.id === p.category_id)?.slug === selectedSpace);
      getEl('postsWrap').innerHTML = filtered.map(p => `<div class="msg ${p.user_id===currentUser.id?'own':''}">
        ${p.user_id===currentUser.id?`<div class="action-btns"><span class="action-btn" onclick="startEdit('${p.id}')">✏️</span><span class="action-btn" onclick="deletePost('${p.id}','${p.media_url}')">🗑️</span></div>`:''}
        <div style="font-size:10px; opacity:0.8; margin-bottom:4px;">${p.user_email || 'Member'}</div><div style="white-space: pre-wrap;">${p.body || ''}</div>${p.media_url ? `<img src="${p.media_url}" class="post-img">` : ''}</div>`).join('');
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
      getEl('communityTitle').innerText = selectedSpace ? `${getMeta(selectedSpace).emoji} ${selectedSpace} Community` : "Community";
    }

    async function renderAdmin() { if(currentUser?.email !== OWNER_EMAIL) return; const { data } = await sb.from('community_posts').select('category_id'); const s = {}; data?.forEach(p => { const c = categories.find(x => x.id === p.category_id); if(c) s[c.slug] = (s[c.slug] || 0) + 1; }); getEl('adminStats').innerHTML = categories.map(c => `<div class="card" style="padding:15px; text-align:center; border-bottom:4px solid ${c.color}"><div style="font-size:12px; color:var(--muted)">${c.slug} Posts</div><div style="font-size:20px; font-weight:800">${s[c.slug] || 0}</div></div>`).join(''); }

    async function enableNotifications(){ if(!("Notification" in window)) return alert("Не підтримується"); const p = await Notification.requestPermission(); if(p === "granted") { getEl('notifBtn').innerText = "✅ Увімкнено"; getEl('notifBtn').classList.replace('primary', 'green'); } else alert("Блокується браузером"); }
    function bindTabs(){ document.querySelectorAll('.tab').forEach(t => t.onclick = () => { document.querySelectorAll('.tab, .view').forEach(x => x.classList.remove('active')); t.classList.add('active'); getEl(t.dataset.view).classList.add('active'); }); }
    
    window.addEventListener('DOMContentLoaded', bootstrap);
  </script>
</body>
</html>
