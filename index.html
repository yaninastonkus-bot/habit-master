<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Tracker | Elite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a; --card: rgba(23, 28, 41, 0.8); --accent: #3b82f6; --text: #f8fafc;
      --muted: #64748b; --border: rgba(255, 255, 255, 0.06); --glass: blur(20px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); background-image: radial-gradient(circle at 0% 0%, #1e293b 0%, #0b0f1a 50%); min-height: 100vh; }
    .hidden { display: none !important; }

    /* --- UI ELEMENTS --- */
    .input, .textarea { 
      width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 18px; color: #fff; font-size: 15px; outline: none; transition: 0.3s;
    }
    .input:focus { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
    .button { border: 0; border-radius: 12px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .button.primary { background: var(--accent); color: #fff; }
    .button.dark { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--border); }
    .button:active { transform: scale(0.98); }

    /* --- LAYOUT --- */
    .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .topbar { display: flex; gap: 24px; margin-bottom: 32px; align-items: center; overflow-x: auto; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .nav-logo { font-weight: 800; font-size: 22px; letter-spacing: -1px; color: #fff; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 12px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 14px; white-space: nowrap; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .view { display: none; } .view.active { display: block; }

    /* --- DASHBOARD --- */
    .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
    .stat-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; border: 2px solid rgba(255,255,255,0.05); }

    /* --- TRACKER ELITE --- */
    .tracker-box { overflow-x: auto; background: rgba(0,0,0,0.15); border-radius: 20px; border: 1px solid var(--border); }
    .tracker-row { display: grid; grid-template-columns: 220px repeat(31, 38px); border-bottom: 1px solid var(--border); align-items: center; }
    .tracker-row:last-child { border: 0; }
    .tracker-cell { height: 48px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
    .habit-title-cell { justify-content: space-between; padding: 0 16px; font-weight: 600; color: #f1f5f9; font-size: 13px; text-align: left; }
    .square { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.08); border-radius: 5px; cursor: pointer; transition: 0.2s; }
    .square.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(59, 130, 246, 0.5); }
    .square.today { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

    /* --- COMMUNITY --- */
    .space-nav { display: flex; gap: 8px; margin-bottom: 20px; }
    .space-btn { padding: 10px 18px; border-radius: 14px; font-size: 13px; font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid var(--border); transition: 0.2s; }
    .space-btn.active { background: var(--accent); color: #fff; }
    .chat-box { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 10px; }
    .msg { max-width: 75%; padding: 14px 18px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); position: relative; font-size: 14px; line-height: 1.5; }
    .msg.own { align-self: flex-end; background: var(--accent); border: 0; }
    .post-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }

    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } .tracker-row { grid-template-columns: 160px repeat(31, 38px); } }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card">
      <h1 class="nav-logo" style="font-size: 32px; margin-bottom: 8px;">EK.</h1>
      <p style="color:var(--muted); margin-bottom: 32px; font-size: 14px;">Your journey starts here.</p>
      <input id="emailInput" class="input" type="email" placeholder="Email" style="margin-bottom:12px;"/>
      <div style="position: relative; margin-bottom: 24px;">
        <input id="passwordInput" class="input" type="password" placeholder="Password (6+ chars)" />
        <span onclick="togglePass()" style="position:absolute; right:16px; top:14px; cursor:pointer; opacity:0.4;">👁️</span>
      </div>
      <button id="loginBtn" class="button primary" style="width:100%" onclick="signIn()">Sign In</button>
      <button class="button dark" style="width:100%; margin-top:12px;" onclick="signUp()">Create Account</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div class="nav-logo">EK.</div>
      <div class="tab active" data-view="dashView">Overview</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="profileView">Settings</div>
      <button class="button dark" style="margin-left:auto; padding:8px 16px; font-size:12px;" onclick="logout()">Exit</button>
    </nav>

    <div id="dashView" class="view active">
      <div class="dashboard-grid">
        <div>
          <div class="card" style="text-align: center;">
            <div style="color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Current Streak</div>
            <p style="font-size: 64px; font-weight: 800; margin: 8px 0;" id="streakVal">0</p>
            <div id="levelVal" style="color:var(--accent); font-weight:800; font-size:13px; text-transform: uppercase;">Novice Level</div>
          </div>
          <div class="card">
            <div style="color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 800; margin-bottom: 12px;">My Main Goal</div>
            <textarea id="goalInput" class="textarea" style="background:transparent; padding:0; border:0; min-height:60px;" placeholder="Введіть свою головну ціль..." onchange="saveGoal()"></textarea>
          </div>
        </div>
        <div class="card">
          <div style="color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 800; margin-bottom: 20px;">Progress by Category</div>
          <div style="display: flex; flex-wrap: wrap; gap: 20px;" id="ringsGrid"></div>
        </div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerSections"></div>
    </div>

    <div id="chatView" class="view">
      <div class="card">
        <div class="space-nav">
          <div class="space-btn active" onclick="setSpace('GENERAL')">General</div>
          <div class="space-btn" onclick="setSpace('MOVE')">MOVE</div>
          <div class="space-btn" onclick="setSpace('MIND')">MIND</div>
          <div class="space-btn" onclick="setSpace('CREATE')">CREATE</div>
          <div class="space-btn" onclick="setSpace('SLOW')">SLOW</div>
        </div>
        <div id="postsWrap" class="chat-box"></div>
        <div style="display:flex; gap:12px; margin-top:20px; align-items: center;">
          <label class="button dark" style="padding:14px; margin:0;">📎<input type="file" id="postFile" class="hidden" onchange="getEl('fileStat').innerText = this.files[0].name"></label>
          <input id="postInput" class="input" style="margin:0;" placeholder="Write message..." />
          <button class="button primary" onclick="sendPost()">Send</button>
        </div>
        <div id="fileStat" style="font-size:10px; color:var(--accent); margin-top:6px;"></div>
      </div>
    </div>

    <div id="profileView" class="view">
      <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 24px;">
          <img id="profileAvatar" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); background:#1e293b;" src="https://ui-avatars.com/api/?name=EK">
          <label style="position:absolute; bottom:0; right:0; background:var(--accent); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:3px solid var(--bg);">
            📷<input type="file" class="hidden" id="avatarFile" onchange="uploadAvatar()">
          </label>
        </div>
        <input id="profileName" class="input" style="text-align:center; margin-bottom:8px;" placeholder="Your Name" onchange="saveProfileName()">
        <p style="color: var(--muted); font-size: 13px;" id="userEmailLabel"></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null, habits = [], checks = [], posts = [], profile = {}, curSpace = "GENERAL";
    const cats = [{id:'MOVE', c:'#3b82f6'}, {id:'MIND', c:'#10b981'}, {id:'CREATE', c:'#f43f5e'}, {id:'SLOW', c:'#8b5cf6'}];

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user; if(!user) return;
      getEl('authView').classList.add('hidden'); getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = user.email;
      await refreshData();
    }

    async function refreshData() {
      const [h, c, pr, po] = await Promise.all([
        sb.from('habits').select('*').eq('user_id', user.id),
        sb.from('check_ins').select('*').eq('user_id', user.id),
        sb.from('profiles').select('*').eq('id', user.id).single(),
        sb.from('community_posts').select('*').order('created_at')
      ]);
      habits = h.data || []; checks = c.data || []; profile = pr.data || {}; posts = po.data || [];
      if(habits.length === 0) {
        await sb.from('habits').insert(cats.map(cat => ({user_id:user.id, title:`Daily ${cat.id}`, category:cat.id})));
        return refreshData();
      }
      renderAll();
    }

    // --- TRACKER LOGIC (FIXED DATES) ---
    async function toggleCheck(hId, dayNum) {
      const dStr = new Date(new Date().getFullYear(), new Date().getMonth(), dayNum).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === hId && c.check_in_date === dStr);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({user_id:user.id, habit_id:hId, check_in_date:dStr});
      await refreshData();
    }

    async function addHabit(catId) {
      const t = prompt("Назва звички:");
      if(t) { await sb.from('habits').insert({user_id:user.id, title:t, category:catId}); await refreshData(); }
    }

    async function deleteHabit(id) { if(confirm("Видалити?")) { await sb.from('habits').delete().eq('id', id); await refreshData(); } }

    // --- COMMUNITY & FILE ---
    async function sendPost() {
      const b = getEl('postInput').value.trim(); const file = getEl('postFile').files[0];
      if(!b && !file) return;
      let url = null;
      if(file) {
        const path = `${user.id}/c_${Date.now()}`;
        await sb.storage.from('community').upload(path, file);
        url = sb.storage.from('community').getPublicUrl(path).data.publicUrl;
      }
      await sb.from('community_posts').insert({user_id:user.id, body:b, space:curSpace, media_url:url, user_email: profile.username || user.email});
      getEl('postInput').value = ""; getEl('postFile').value = ""; getEl('fileStat').innerText = "";
      await refreshData();
    }

    function setSpace(s) { 
      curSpace = s; 
      document.querySelectorAll('.space-btn').forEach(b => b.classList.toggle('active', b.innerText === s));
      renderChat(); 
    }

    // --- DASHBOARD GOAL ---
    async function saveGoal() { await sb.from('profiles').upsert({id:user.id, goal_text: getEl('goalInput').value}); }

    // --- RENDERERS ---
    function renderAll() {
      const today = new Date().getDate();
      getEl('streakVal').innerText = calculateStreak();
      getEl('goalInput').value = profile.goal_text || "";
      
      // Tracker Squares
      getEl('trackerSections').innerHTML = cats.map(cat => {
        const catH = habits.filter(h => h.category === cat.id);
        return `
          <div class="category-group">
            <div class="category-header"><span style="font-weight:800; font-size:16px; color:${cat.c}">${cat.id}</span><button class="button dark" style="padding:4px 10px; font-size:10px" onclick="addHabit('${cat.id}')">+ Add</button></div>
            <div class="tracker-box">
              ${catH.map(h => `
                <div class="tracker-row">
                  <div class="tracker-cell habit-title-cell">${h.title} <span style="opacity:0.2; cursor:pointer;" onclick="deleteHabit('${h.id}')">✕</span></div>
                  ${Array.from({length:31}, (_, i) => {
                    const dNum = i + 1;
                    const active = checks.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === dNum);
                    return `<div class="tracker-cell"><div class="square ${active?'active':''} ${dNum===today?'today':''}" onclick="toggleCheck('${h.id}',${dNum})"></div></div>`;
                  }).join('')}
                </div>`).join('')}
            </div>
          </div>`;
      }).join('');

      // Rings
      getEl('ringsGrid').innerHTML = cats.map(cat => {
        const hbits = habits.filter(h => h.category === cat.id);
        const done = checks.filter(c => hbits.some(h => h.id === c.habit_id)).length;
        const perc = hbits.length ? Math.round((done/(hbits.length*31))*100) : 0;
        return `<div style="text-align:center;"><div class="stat-circle" style="background:conic-gradient(${cat.c} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg)">${perc}%</div><div style="font-size:10px; font-weight:800; color:var(--muted); margin-top:8px">${cat.id}</div></div>`;
      }).join('');

      renderChat();
      if(profile.avatar_url) getEl('profileAvatar').src = profile.avatar_url;
      getEl('profileName').value = profile.username || "";
    }

    function renderChat() {
      const filtered = posts.filter(p => (p.space || 'GENERAL') === curSpace);
      getEl('postsWrap').innerHTML = filtered.map(p => `<div class="msg ${p.user_id===user.id?'own':''}">
          <div style="font-size:11px; font-weight:800; margin-bottom:4px; opacity:0.6;">${p.user_email}</div>
          <div>${p.body}</div>
          ${p.media_url ? `<img src="${p.media_url}" class="post-img">` : ''}
        </div>`).join('');
      getEl('postsWrap').scrollTop = 9999;
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date().toISOString().split('T')[0];
      for(let d of dates) { if(d === now || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) { s++; now = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    async function handleSignIn() { 
      const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(!error) bootstrap(); else getEl('authError').innerText = error.message;
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    const getEl = id => document.getElementById(id);

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active'); getEl(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
