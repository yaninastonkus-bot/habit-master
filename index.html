<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Master</title>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#eaf2fb;
}

.container {
  max-width:1200px;
  margin:20px auto;
  padding:20px;
}

.nav {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab {
  padding:10px 18px;
  border-radius:12px;
  background:#fff;
  cursor:pointer;
  font-weight:600;
}

.layout {
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.sidebar {
  overflow:hidden;
  border-radius:20px;
}

.blue {
  background:#3b44f6;
  color:white;
  padding:30px;
  font-size:26px;
  font-weight:700;
}

.green {
  background:#8ab36f;
  padding:20px;
  color:white;
}

.pink {
  background:#b97a9a;
  padding:20px;
  color:white;
}

.stats {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.stat {
  text-align:center;
}

.big {
  font-size:22px;
  font-weight:700;
}

.community-post {
  padding:15px;
  border-bottom:1px solid #eee;
}

textarea {
  width:100%;
  border-radius:10px;
  padding:10px;
}

button {
  background:#3b44f6;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

</style>
</head>

<body>
<div class="container">

<div class="nav">
  <div class="tab">Dashboard</div>
  <div class="tab">Today</div>
  <div class="tab">Tracker</div>
  <div class="tab">Community</div>
</div>

<div class="layout">

<!-- LEFT -->
<div class="sidebar">
  <div class="blue">HABIT MASTER</div>
  <div class="green">
    LEVEL: Novice<br><br>
    STREAK: 0<br><br>
    Ready 🚀
  </div>
  <div class="pink">
    Focus:<br>
    <input style="width:100%; padding:10px; border-radius:10px; border:none">
    <br><br>
    Reward: merch
  </div>
</div>

<!-- RIGHT -->
<div>

<div class="card stats">
  <div class="stat"><div>TOTAL</div><div class="big">0%</div></div>
  <div class="stat"><div>MOVE</div><div class="big">0%</div></div>
  <div class="stat"><div>MIND</div><div class="big">0%</div></div>
  <div class="stat"><div>CREATE</div><div class="big">0%</div></div>
</div>

<div style="height:20px"></div>

<div class="card">
  <h3>Community</h3>

  <textarea placeholder="Поділись прогресом..."></textarea>
  <button>Post</button>

  <div class="community-post">
    <b>MOVE</b><br>
    Сьогодні тренування 💪
  </div>

  <div class="community-post">
    <b>MIND</b><br>
    Медитація 10 хв
  </div>

</div>

</div>

</div>

</div>
</body>
</html>
