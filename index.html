<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EK Habit Tracker | Premium</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --card: rgba(30, 41, 59, 0.6); --accent: #3b82f6; --text: #f8fafc;
      --muted: #94a3b8; --border: rgba(255, 255, 255, 0.08); --glass: blur(12px); --green: #10b981;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* --- UI ELEMENTS --- */
    .input, .textarea { 
      width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; transition: 0.3s;
    }
    .input:focus { border-color: var(--accent); background: rgba(15, 23, 42, 0.8); }

    .button { 
      border: 0; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; 
      cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
    }
    .button.primary { background: var(--accent); color: #fff; width: 100%; }
    .button.dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    
    /* --- LAYOUT --- */
    .app { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .topbar { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; overflow-x: auto; padding-bottom: 10px; }
    .nav-logo { font-weight: 800; font-size: 24px; letter-spacing: -1.5px; margin-right: 15px; }
    .tab { color: var(--muted); font-weight: 600; cursor: pointer; padding: 8px 0; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: #fff; border-bottom-color: var(--accent); }
    .card { background: var(--card); backdrop-filter: var(--glass); border-radius: 24px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
    .view { display: none; } .view.active { display: block; }

    /* --- DASHBOARD --- */
    .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
    .ring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .focus-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .chip { padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* --- TRACKER --- */
    .category-group { margin-bottom: 40px; }
    .tracker-wrap { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 22px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
    .tracker-row { display: grid; grid-template-columns: 200px repeat(31, 40px); border-bottom: 1px solid var(--border); align-items: center; }
    .tracker-cell { height: 50px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
    .habit-title { justify-content: space-between; padding: 0 15px; font-weight: 600; color: #fff; font-size: 14px; }
    .check-btn { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.15); border-radius: 6px; cursor: pointer; }
    .check-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .check-btn.disabled { opacity: 0.15; cursor: not-allowed; border-style: dashed; }

    /* --- COMMUNITY --- */
    .chat-box { height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; }
    .msg { max-width: 80%; padding: 15px; border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); position: relative; }
    .msg.own { align-self: flex-end; background: var(--accent); border: 0; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
    .avatar-sm { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #334155; }
    .action-btns { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; opacity: 0.5; }
    .action-btns:hover { opacity: 1; }

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .tracker-row { grid-template-columns: 150px repeat(31, 40px); }
    }
  </style>
</head>
<body>

  <div id="authView" class="auth-shell">
    <div class="auth-card" style="max-width:400px; margin: 80px auto; background:var(--card); padding:40px; border-radius:28px; border:1px solid var(--border); text-align:center; backdrop-filter:var(--glass);">
      <h1 class="nav-logo">EK.</h1>
      <input id="emailInput" class="input" type="email" placeholder="Email" />
      <div style="position: relative;">
        <input id="passwordInput" class="input" type="password" placeholder="Password (6+ chars)" />
        <span onclick="togglePass()" style="position:absolute; right:15px; top:13px; cursor:pointer; opacity:0.5;">👁️</span>
      </div>
      <button class="button primary" onclick="handleSignIn()">Sign In</button>
      <button class="button dark" style="width:100%; margin-top:10px;" onclick="handleSignUp()">Create Account</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <nav class="topbar">
      <div class="nav-logo">EK.</div>
      <div class="tab active" data-view="dashView">Dashboard</div>
      <div class="tab" data-view="trackerView">Tracker</div>
      <div class="tab" data-view="chatView">Community</div>
      <div class="tab" data-view="supportView">Support</div>
      <div class="tab" data-view="profileView">Profile</div>
      <button class="button dark" style="margin-left:auto; padding:6px 12px; font-size:11px;" onclick="logout()">Logout</button>
    </nav>

    <div id="dashView" class="view active">
      <div class="dashboard-grid">
        <div>
          <div class="card" style="padding: 20px;">
            <div style="color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Current Streak</div>
            <div id="streakVal" style="font-size: 48px; font-weight: 800; margin: 10px 0;">0</div>
            <div id="levelVal" style="font-size: 14px; color: var(--accent); font-weight: 700;">Novice</div>
          </div>
          <div class="card" style="padding: 20px;">
            <div style="font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase;">Active Focus</div>
            <div class="focus-chips" id="focusChipsContainer">
              <div class="chip" onclick="toggleFocus('MOVE')">🏃 MOVE</div>
              <div class="chip" onclick="toggleFocus('MIND')">🧠 MIND</div>
              <div class="chip" onclick="toggleFocus('CREATE')">🎨 CREATE</div>
              <div class="chip" onclick="toggleFocus('SLOW')">🌿 SLOW</div>
            </div>
          </div>
        </div>
        <div id="ringsWrap" class="ring-grid"></div>
      </div>
    </div>

    <div id="trackerView" class="view">
      <div id="trackerSections"></div>
    </div>

    <div id="chatView" class="view">
      <div class="card">
        <div id="postsWrap" class="chat-box"></div>
        <div style="margin-top:20px; display:flex; gap:12px; align-items:center;">
          <label class="button dark" style="padding:12px;">📎<input type="file" id="postFile" class="hidden" onchange="getEl('fileStatus').innerText = this.files[0].name"></label>
          <textarea id="postInput" class="textarea" style="margin:0; height:50px; resize:none; padding-top:14px;" placeholder="Message..."></textarea>
          <button id="cancelEdit" class="button dark hidden" onclick="cancelEditPost()">Cancel</button>
          <button id="postBtn" class="button primary" style="width:100px; margin:0;" onclick="sendPost()">Send</button>
        </div>
        <div id="fileStatus" style="font-size:10px; color:var(--accent); margin-top:5px;"></div>
      </div>
    </div>

    <div id="supportView" class="view">
      <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2 style="margin-top:0">Support</h2>
        <textarea id="supportMsg" class="textarea" placeholder="Як ми можемо допомогти?"></textarea>
        <button class="button primary" onclick="sendSupport()">Send Request</button>
        <div id="adminPanel" class="hidden" style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px;">
          <h3 style="color:var(--accent)">👑 Admin Dashboard</h3>
          <div id="adminTickets"></div>
        </div>
      </div>
    </div>

    <div id="profileView" class="view">
      <div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 20px;">
          <img id="profileAvatar" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid var(--accent);" src="https://ui-avatars.com/api/?name=EK">
          <label style="position:absolute; bottom:0; right:0; background:var(--accent); width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">
            📷<input type="file" class="hidden" id="avatarFile" onchange="uploadAvatar()">
          </label>
        </div>
        <input id="profileName" class="input" placeholder="Display Name" onchange="saveProfileName()">
        <p style="color: var(--muted); font-size: 13px;" id="userEmailLabel"></p>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vnbcelodaueayobcvkjy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yfG2qoR_Cx8QKwEbNpzeUA_4VNjItCT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const OWNER_EMAIL = "yaninastonkus@gmail.com"; 

    let user = null, profile = {}, habits = [], checks = [], posts = [], focuses = [], editingId = null;
    const cats = [
      { id: 'MOVE', color: '#3b82f6', emoji: '🏃' },
      { id: 'MIND', color: '#10b981', emoji: '🧠' },
      { id: 'CREATE', color: '#f43f5e', emoji: '🎨' },
      { id: 'SLOW', color: '#8b5cf6', emoji: '🌿' }
    ];
    const DEFAULTS = { MOVE:['15 min Walk','Stretch'], MIND:['Read 10 pages','Journal'], CREATE:['New Sketch'], SLOW:['No Phone Tea'] };

    async function bootstrap() {
      const { data } = await sb.auth.getSession();
      user = data.session?.user;
      if(!user) return;
      getEl('authView').classList.add('hidden');
      getEl('appView').classList.remove('hidden');
      getEl('userEmailLabel').innerText = user.email;
      if(user.email === OWNER_EMAIL) { getEl('adminPanel').classList.remove('hidden'); loadTickets(); }
      await refreshData();
    }

    async function refreshData() {
      const [p, h, c, po] = await Promise.all([
        sb.from('profiles').select('*').eq('id', user.id).single(),
        sb.from('habits').select('*').eq('user_id', user.id),
        sb.from('check_ins').select('*').eq('user_id', user.id),
        sb.from('community_posts').select('*').order('created_at')
      ]);
      
      profile = p.data || {};
      focuses = (profile.focus_text || "").split(',').filter(Boolean);
      habits = h.data || [];
      
      if(habits.length === 0) {
        let ins = [];
        cats.forEach(cat => DEFAULTS[cat.id].forEach(t => ins.push({user_id:user.id, category:cat.id, title:t, created_at: new Date().toISOString()})));
        await sb.from('habits').insert(ins);
        const { data: freshH } = await sb.from('habits').select('*').eq('user_id', user.id);
        habits = freshH;
      }
      
      checks = c.data || [];
      posts = po.data || [];
      renderAll();
    }

    // --- TRACKER LOGIC ---
    async function addHabit(catId) {
      const t = prompt(`New habit for ${catId}:`);
      if(!t) return;
      await sb.from('habits').insert({user_id:user.id, title:t, category:catId, created_at: new Date().toISOString()});
      await refreshData();
    }

    async function deleteHabit(id) {
      if(!confirm("Delete?")) return;
      await sb.from('habits').delete().eq('id', id);
      await refreshData();
    }

    async function toggleCheck(hId, day) {
      const d = new Date(new Date().getFullYear(), new Date().getMonth(), day + 1).toISOString().split('T')[0];
      const exist = checks.find(c => c.habit_id === hId && c.check_in_date === d);
      if(exist) await sb.from('check_ins').delete().eq('id', exist.id);
      else await sb.from('check_ins').insert({user_id:user.id, habit_id:hId, check_in_date:d});
      await refreshData();
    }

    // --- COMMUNITY LOGIC ---
    async function sendPost() {
      const b = getEl('postInput').value.trim();
      const file = getEl('postFile').files[0];
      if(!b && !file && !editingId) return;

      if(editingId) {
        await sb.from('community_posts').update({ body: b }).eq('id', editingId);
        cancelEditPost();
      } else {
        let url = null;
        if(file) {
          const path = `${user.id}/c_${Date.now()}.png`;
          await sb.storage.from('community').upload(path, file);
          url = sb.storage.from('community').getPublicUrl(path).data.publicUrl;
        }
        await sb.from('community_posts').insert({
          user_id: user.id, body: b, media_url: url, user_email: profile.username || user.email
        });
      }
      getEl('postInput').value = ""; getEl('postFile').value = ""; getEl('fileStatus').innerText = "";
      await refreshData();
    }

    function editPost(id) {
      const p = posts.find(x => x.id === id);
      editingId = id; getEl('postInput').value = p.body;
      getEl('postBtn').innerText = "Update"; getEl('cancelEdit').classList.remove('hidden');
    }
    function cancelEditPost() { editingId = null; getEl('postInput').value = ""; getEl('postBtn').innerText = "Send"; getEl('cancelEdit').classList.add('hidden'); }
    async function deletePost(id) { if(confirm("Delete post?")) { await sb.from('community_posts').delete().eq('id', id); await refreshData(); } }

    // --- OTHER ---
    async function toggleFocus(id) {
      const idx = focuses.indexOf(id);
      if(idx > -1) focuses.splice(idx, 1); else focuses.push(id);
      await sb.from('profiles').upsert({ id: user.id, focus_text: focuses.join(',') });
      renderAll();
    }

    async function sendSupport() {
      const m = getEl('supportMsg').value;
      if(!m) return;
      await sb.from('support_tickets').insert({user_id:user.id, user_email:user.email, message:m});
      alert("Sent!"); getEl('supportMsg').value = "";
    }

    async function loadTickets() {
      const { data } = await sb.from('support_tickets').select('*').order('created_at', {ascending:false});
      getEl('adminTickets').innerHTML = data.map(t => `<div class="msg" style="margin-bottom:10px;"><b>${t.user_email}</b>: ${t.message}</div>`).join('');
    }

    async function uploadAvatar() {
      const file = getEl('avatarFile').files[0];
      const path = `${user.id}/av_${Date.now()}.png`;
      await sb.storage.from('avatars').upload(path, file);
      const url = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
      await sb.from('profiles').upsert({ id: user.id, avatar_url: url });
      refreshData();
    }

    async function saveProfileName() { await sb.from('profiles').upsert({ id: user.id, username: getEl('profileName').value }); }

    // --- RENDERERS ---
    function renderAll() {
      renderDash();
      renderTracker();
      renderChat();
      if(profile.avatar_url) getEl('profileAvatar').src = profile.avatar_url;
      getEl('profileName').value = profile.username || "";
      document.querySelectorAll('.chip').forEach(c => focuses.includes(c.innerText.split(' ')[1]) ? c.classList.add('active') : c.classList.remove('active'));
    }

    function renderDash() {
      const streak = calculateStreak();
      getEl('streakVal').innerText = streak;
      getEl('levelVal').innerText = streak > 5 ? 'Warrior' : 'Novice';
      getEl('ringsWrap').innerHTML = cats.map(cat => {
        const catH = habits.filter(h => h.category === cat.id);
        const done = checks.filter(c => catH.some(h => h.id === c.habit_id)).length;
        const perc = catH.length ? Math.round((done / (catH.length * 31)) * 100) : 0;
        const isFoc = focuses.includes(cat.id);
        return `
          <div class="card ring-card" style="text-align:center; padding:15px; ${isFoc?'border:1px solid '+cat.color:''}">
            <div style="width:60px; height:60px; border-radius:50%; margin:0 auto 10px; background:conic-gradient(${cat.color} ${perc*3.6}deg, rgba(255,255,255,0.05) 0deg); display:flex; align-items:center; justify-content:center;">
              <span class="ring-val">${perc}%</span>
            </div>
            <div style="font-size:10px; font-weight:800; color:var(--muted);">${cat.emoji} ${cat.id}</div>
          </div>`;
      }).join('');
    }

    function renderTracker() {
      const today = new Date().getDate();
      getEl('trackerSections').innerHTML = cats.map(cat => {
        const catH = habits.filter(h => h.category === cat.id);
        return `
          <div class="category-group">
            <div class="category-header">
              <span style="font-weight:800; font-size:16px;">${cat.emoji} ${cat.id}</span>
              <button class="button dark" style="padding:4px 10px; font-size:11px" onclick="addHabit('${cat.id}')">+ Add</button>
            </div>
            <div class="tracker-wrap">
              ${catH.map(h => {
                const startDay = new Date(h.created_at).getDate();
                const startMonth = new Date(h.created_at).getMonth();
                const isNew = startMonth === new Date().getMonth();
                return `
                  <div class="tracker-row">
                    <div class="tracker-cell habit-title">${h.title} <span style="cursor:pointer; opacity:0.3;" onclick="deleteHabit('${h.id}')">✕</span></div>
                    ${Array.from({length:31}, (_, i) => {
                      const d = i + 1;
                      const locked = isNew && d < startDay;
                      const active = checks.some(c => c.habit_id === h.id && new Date(c.check_in_date).getDate() === d);
                      return `<div class="tracker-cell" style="${d===today?'background:rgba(59,130,246,0.1)':''}"><div class="check-btn ${active?'active':''} ${locked?'disabled':''}" onclick="${locked?'':`toggleCheck('${h.id}',${i})`}"></div></div>`;
                    }).join('')}
                  </div>`;
              }).join('')}
            </div>
          </div>`;
      }).join('');
    }

    function renderChat() {
      getEl('postsWrap').innerHTML = posts.map(p => {
        const isOwn = p.user_id === user.id;
        const body = p.body.replace(/@(\w+|[а-яА-ЯёЁіІїЇєЄ]+)/g, '<span style="color:#fff; font-weight:800;">@$1</span>');
        return `
          <div class="msg ${isOwn?'own':''}">
            ${isOwn ? `<div class="action-btns"><span onclick="editPost('${p.id}')">✏️</span><span onclick="deletePost('${p.id}')">🗑️</span></div>` : ''}
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer;" onclick="getEl('postInput').value += '@${p.user_email.split('@')[0]} '">
              <img class="avatar-sm" src="https://ui-avatars.com/api/?name=${p.user_email}">
              <span style="font-size:11px; font-weight:800;">${p.user_email}</span>
            </div>
            <div style="font-size:14px; line-height:1.4;">${body}</div>
            ${p.media_url ? `<img src="${p.media_url}" style="width:100%; border-radius:12px; margin-top:10px;">` : ''}
          </div>`;
      }).join('');
      getEl('postsWrap').scrollTop = getEl('postsWrap').scrollHeight;
    }

    function calculateStreak() {
      const dates = [...new Set(checks.map(c => c.check_in_date))].sort().reverse();
      if(!dates.length) return 0;
      let s = 0, now = new Date().toISOString().split('T')[0];
      for(let d of dates) { if(d === now || d === new Date(Date.now()-86400000).toISOString().split('T')[0]) { s++; now = new Date(new Date(d).getTime()-86400000).toISOString().split('T')[0]; } else break; }
      return s;
    }

    async function handleSignIn() {
      const { error } = await sb.auth.signInWithPassword({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(!error) bootstrap(); else alert(error.message);
    }
    async function handleSignUp() {
      const { error } = await sb.auth.signUp({ email: getEl('emailInput').value, password: getEl('passwordInput').value });
      if(!error) alert("Check email!"); else alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); location.reload(); }
    function togglePass() { const i = getEl('passwordInput'); i.type = i.type==='password'?'text':'password'; }
    function getEl(id) { return document.getElementById(id); }

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      getEl(t.dataset.view).classList.add('active');
    });

    bootstrap();
  </script>
</body>
</html>
